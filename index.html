    <script>
        const manifestJSON = {
            "name": "POS Mi Ayam Abun Pro",

                "purpose": "any maskable"
            }]
        };
        const manifestBlob = new Blob([JSON.stringify(manifestJSON)], { type: 'application/json' });
        const manifestUrl = URL.createObjectURL(manifestBlob);
        const linkEl = document.createElement('link');
        linkEl.rel = 'manifest';
        linkEl.href = manifestUrl;
        document.head.appendChild(linkEl);
    </script>

    <!-- PWA Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                const CACHE_NAME = 'pos-miayam-abun-v2';
                self.addEventListener('install', (e) => {
                    self.skipWaiting();
                    e.waitUntil(
                        caches.open(CACHE_NAME).then((cache) => {
                            return cache.addAll([
                                self.location.href,
                                'https://cdn.tailwindcss.com',
                                'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js',
                                'https://cdn.sheetjs.com/xlsx-0.18.5/package/dist/xlsx.full.min.js',
                                'https://unpkg.com/@babel/standalone/babel.min.js'
                            ]).catch(() => {});
                        })
                    );
                });
                self.addEventListener('activate', (e) => {
                    e.waitUntil(self.clients.claim());
                    e.waitUntil(
                        caches.keys().then((keys) => {
                            return Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)));
                        })
                    );
                });
                self.addEventListener('fetch', (e) => {
                    e.respondWith(
                        caches.match(e.request).then((cached) => {
                            const fetchPromise = fetch(e.request).then((response) => {
                                if (response && response.status === 200) {
                                    const clone = response.clone();
                                    caches.open(CACHE_NAME).then((cache) => cache.put(e.request, clone));
                                }
                                return response;
                            }).catch(() => cached);
                            return cached || fetchPromise;
                        })
                    );
                });
                `;
                const swBlob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(swBlob);
                navigator.serviceWorker.register(swUrl, { scope: '/' })
                    .then(() => console.log('✅ PWA Service Worker aktif! Aplikasi siap di-install.'))
                    .catch((err) => console.warn('⚠️ Service Worker:', err.message));
            });

            // Tampilkan prompt install native
            let deferredPrompt;
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                const installBanner = document.createElement('div');
                installBanner.id = 'install-banner';
                installBanner.className =
                    'fixed bottom-24 left-4 right-4 bg-white rounded-2xl shadow-2xl p-4 z-[300] flex items-center gap-3 animate-slide-up border border-gray-200 max-w-md mx-auto';
                installBanner.innerHTML = `
                <img src="abun200.png" class="w-10 h-10 object-contain" alt="Logo" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iI2RkZCIvPjwvc3ZnPg=='"/>
                <div class="flex-1">
                  <p class="font-bold text-sm text-gray-800">Pasang Aplikasi</p>
                  <p class="text-xs text-gray-500">Simpan Mi Ayam Abun di layar utama</p>
                </div>
                <button id="install-btn" class="bg-[#9A1C1F] text-white px-4 py-2 rounded-xl font-bold text-sm active:scale-95 transition-all">Pasang</button>
                <button id="dismiss-btn" class="text-gray-400 p-2 active:scale-95 transition-all">✕</button>
              `;
                document.body.appendChild(installBanner);
                document.getElementById('install-btn').addEventListener('click', () => {
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then(() => {
                        deferredPrompt = null;
                        installBanner.remove();
                    });
                });
                document.getElementById('dismiss-btn').addEventListener('click', () => installBanner.remove());
            });
        }
    </script>

            const [selectedItemForAddon, setSelectedItemForAddon] = useState(null);

            const showToast = (message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
            };
            const removeToast = (id) => setToasts(prev => prev.filter(t => t.id !== id));

            const handleAddToCart = (item, addons = [], notes = '') => {
                const cartItemId = `${item.id}-${addons.map(a => a.id).join('-')}-${notes}`;
                setCart(prev => {
                    const existing = prev.find(c => c.cartItemId === cartItemId);
                    if (existing) return prev.map(c => c.cartItemId === cartItemId ? { ...c, qty: c.qty + 1 } : c);
                    return [...prev, { ...item, cartItemId, addons, notes, qty: 1 }];
                });
                showToast(`${item.name} ditambahkan`);
                setSelectedItemForAddon(null);
            };

            const updateCartQty = (cartItemId, delta) => {
                setCart(prev => prev.map(item => {
                    if (item.cartItemId === cartItemId) return { ...item, qty: item.qty + delta };
                    return item;
                }).filter(item => item.qty > 0));
            };

            const clearCart = () => {
                setDialog({
                    type: 'confirm',
                    title: 'Kosongkan Keranjang',
                    message: 'Apakah Anda yakin ingin menghapus semua pesanan?',
                    onConfirm: () => { setCart([]); setDiscount({ type: 'nominal', value: 0 }); setDialog(null); },
                });
            };

            const calculateCart = () => {
                let subtotal = 0;
                cart.forEach(item => {
                    let itemPrice = item.price;
                    if (item.addons) item.addons.forEach(addon => itemPrice += addon.price);
                    subtotal += (itemPrice * item.qty);
                });
                let discountAmount = discount.type === 'percent' ? subtotal * (discount.value / 100) : discount.value;
                const subtotalAfterDiscount = Math.max(0, subtotal - discountAmount);
                const taxAmount = subtotalAfterDiscount * (storeConfig.taxRate / 100);
                const serviceAmount = subtotalAfterDiscount * (storeConfig.serviceCharge / 100);
                const grandTotal = subtotalAfterDiscount + taxAmount + serviceAmount;
                const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
                return { subtotal, discountAmount, taxAmount, serviceAmount, grandTotal, totalItems };
            };

            const cartCalculations = calculateCart();

                text += `Tgl: ${new Date(trx.timestamp).toLocaleString('id-ID')}\n`;
                text += `Pelanggan: ${trx.orderInfo.customerName || 'Tamu'}\n`;
                text += `Tipe: ${trx.orderInfo.orderType}\n`;
                if (trx.orderInfo.orderNotes) text += `Catatan: ${trx.orderInfo.orderNotes}\n`;
                text += `--------------------------------\n`;
                trx.cart.forEach(item => {
                    let itemTotal = item.price;
                    if (item.addons) item.addons.forEach(a => itemTotal += a.price);
                    let addonStr = '';
                    if (item.addons && item.addons.length > 0) addonStr = ' (' + item.addons.map(a => a.name).join(', ') + ')';
                    text += `${item.qty}x ${item.name}${addonStr} = ${formatRp(item.qty * itemTotal)}\n`;
                });
                text += `--------------------------------\n`;
                if (trx.calculations.discountAmount > 0) text += `Diskon: -${formatRp(trx.calculations.discountAmount)}\n`;
                if (trx.calculations.taxAmount > 0) text += `PPN: ${formatRp(trx.calculations.taxAmount)}\n`;
                if (trx.calculations.serviceAmount > 0) text += `Layanan: ${formatRp(trx.calculations.serviceAmount)}\n`;
                text += `*TOTAL TAGIHAN: ${formatRp(trx.calculations.grandTotal)}*\n`;
                text += `Pembayaran: ${trx.payment.method.toUpperCase()}\n\n`;

            const exportExcel = (period) => {
                if (!window.XLSX) { showToast('Memuat modul Excel...', 'info'); return; }
                const now = new Date();
                let filtered = transactions;
                if (period === 'hari') {
                    filtered = transactions.filter(t => new Date(t.timestamp).toDateString() === now.toDateString());
                } else if (period === 'minggu') {
                    const oneWeekAgo = new Date(); oneWeekAgo.setDate(now.getDate() - 7);
                    filtered = transactions.filter(t => new Date(t.timestamp) >= oneWeekAgo);
                } else if (period === 'bulan') {
                    const oneMonthAgo = new Date(); oneMonthAgo.setMonth(now.getMonth() - 1);
                    filtered = transactions.filter(t => new Date(t.timestamp) >= oneMonthAgo);
                }
                if (filtered.length === 0) { showToast(`Tidak ada data untuk ${period} ini`, 'error'); return; }
                const excelData = filtered.map(t => ({
                    'ID Transaksi': t.id,
                    'Waktu': new Date(t.timestamp).toLocaleString('id-ID'),
                    'Pelanggan': t.orderInfo.customerName || 'Tamu',
                    'Tipe Pesanan': t.orderInfo.orderType,
                    'Catatan': t.orderInfo.orderNotes || '-',
                    'Subtotal (Rp)': t.calculations.subtotal,
                    'Diskon (Rp)': t.calculations.discountAmount,
                    'Pajak (Rp)': t.calculations.taxAmount,
                    'Layanan (Rp)': t.calculations.serviceAmount,
                    'Total Akhir (Rp)': t.calculations.grandTotal,
                    'Metode Bayar': t.payment.method.toUpperCase(),
                    'Uang Diterima (Rp)': t.payment.cashGiven,
                    'Kembalian (Rp)': t.payment.change,
                }));
                const ws = XLSX.utils.json_to_sheet(excelData);
                const wscols = [{ wch: 15 }, { wch: 20 }, { wch: 15 }, { wch: 15 }, { wch: 20 }, { wch: 15 }, { wch: 15 }, { wch: 15 }, { wch: 15 }, { wch: 15 }, { wch: 15 }, { wch: 15 }, { wch: 15 }];
                ws['!cols'] = wscols;
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Laporan Penjualan");

                            <Button variant="primary" className="flex-[2] shadow-[#9A1C1F]/40" onClick={() => { setIsCheckoutOpen(true); setCheckoutMethod('cash'); setCashGiven(''); }} disabled={cart.length === 0}>Bayar Sekarang</Button>
                        </div>
                    </div>
                );
            };

            const renderCheckout = () => {
                if (!isCheckoutOpen) return null;
                const handleNumpad = (val) => {
                    if (val === 'C') setCashGiven('');
                    else if (val === '000') setCashGiven(prev => prev + '000');
                    else setCashGiven(prev => prev + val);
                };
                const amountToPay = cartCalculations.grandTotal;
                const change = Number(cashGiven) - amountToPay;
                const isReadyToPay = checkoutMethod !== 'cash' || (checkoutMethod === 'cash' && Number(cashGiven) >= amountToPay);

                return (
                    <div className="absolute inset-0 z-50 flex flex-col bg-gray-50 animate-slide-up print:hidden">
                        <div className="bg-white px-4 py-4 flex items-center gap-3 border-b shadow-sm pt-[max(env(safe-area-inset-top),1rem)] shrink-0">
                            <button onClick={() => setIsCheckoutOpen(false)} className="p-2 -ml-2 text-gray-600 active:scale-95 transition-all"><ArrowLeft className="w-6 h-6" /></button>
                            <h2 className="font-bold text-lg text-gray-800">Pembayaran</h2>
                        </div>
                        <div className="flex-1 overflow-y-auto bg-gray-50">
                            <div className="bg-[#9A1C1F] text-white p-6 text-center shadow-inner">
                                <p className="text-sm opacity-80 mb-1">Total Tagihan</p>
                                <p className="text-4xl font-black tracking-tight">{ formatRp(amountToPay) }</p>
                            </div>
                            <div className="p-4 bg-white border-b border-gray-100">
                                <label className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3 block text-center">Metode Pembayaran</label>
                                <div className="grid grid-cols-2 gap-3">
                                    { PAYMENT_METHODS.map(m => (
                                        <button key={m.id} onClick={() => { setCheckoutMethod(m.id); setCashGiven(''); }}
                                            className={`py-3 rounded-xl border-2 flex flex-col items-center gap-2 transition-all duration-200 active:scale-95 ${checkoutMethod === m.id ? 'border-[#9A1C1F] bg-[#9A1C1F]/10 text-[#9A1C1F] shadow-sm' : 'border-gray-100 text-gray-500 bg-gray-50 hover:bg-gray-100'}`}>
                                            <m.icon className="w-6 h-6" /><span className="text-xs font-bold">{ m.name }</span>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            { checkoutMethod === 'cash' && (
                                <div className="p-4 bg-white space-y-4 animate-fade-in flex flex-col">
                                    <div className="bg-gray-50 border border-gray-200 rounded-2xl p-4 text-center transition-colors">
                                        <p className="text-xs font-bold text-gray-400 mb-1">Uang Diterima</p>
                                        <p className={`text-3xl font-black ${cashGiven ? 'text-[#9A1C1F]' : 'text-gray-300'}`}>{ cashGiven ? formatRp(Number(cashGiven)) : 'Rp 0' }</p>
                                    </div>
                                    { Number(cashGiven) > 0 && (
                                        <div className={`p-4 rounded-xl flex flex-col items-center justify-center text-center border transition-all animate-slide-up ${change >= 0 ? 'bg-green-50 border-green-200 text-green-700' : 'bg-red-50 border-red-200 text-red-700'}`}>
                                            <span className="font-bold text-xs mb-1">Kembalian</span>
                                            <span className="font-black text-xl">{ change >= 0 ? formatRp(change) : 'Kurang ' + formatRp(Math.abs(change)) }</span>
                                        </div>
                                    )}
                                    <div className="flex justify-center gap-2 overflow-x-auto pb-1 scrollbar-hide">
                                        <button onClick={() => setCashGiven(amountToPay.toString())} className="px-4 py-2 bg-blue-50 text-blue-700 font-bold text-sm rounded-xl border border-blue-200 whitespace-nowrap active:scale-95 transition-all">Uang Pas</button>
                                        <button onClick={() => setCashGiven('50000')} className="px-4 py-2 bg-gray-100 text-gray-700 font-bold text-sm rounded-xl border border-gray-200 active:scale-95 transition-all">50K</button>
                                        <button onClick={() => setCashGiven('100000')} className="px-4 py-2 bg-gray-100 text-gray-700 font-bold text-sm rounded-xl border border-gray-200 active:scale-95 transition-all">100K</button>
                                    </div>
                                    <div className="grid grid-cols-3 gap-2 mt-2">
                                        { ['1', '2', '3', '4', '5', '6', '7', '8', '9', 'C', '0', '000'].map(key => (
                                            <button key={key} onClick={() => handleNumpad(key)}
                                                className={`py-4 text-xl font-bold rounded-2xl active:scale-95 transition-transform ${key === 'C' ? 'bg-red-50 text-red-600 border border-red-100' : 'bg-gray-50 text-gray-800 border border-gray-100 hover:bg-gray-100 shadow-sm'}`}>{ key }</button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            { checkoutMethod === 'qris' && (
                                <div className="p-8 text-center bg-white flex-1 flex flex-col items-center justify-center animate-fade-in">
                                    <div className="w-64 h-64 bg-gray-100 rounded-2xl flex items-center justify-center border-2 border-dashed border-gray-300 mb-4 relative overflow-hidden">
                                        <div className="absolute inset-0 flex items-center justify-center">
                                            <QrCode className="w-24 h-24 text-gray-600" />
                                        </div>
                                    </div>
                                    <p className="text-gray-700 font-bold text-sm mb-1">Scan QRIS</p>
                                    <p className="text-gray-500 text-xs mb-3">Merchant ID: <span className="font-mono font-bold text-gray-800">{ storeConfig.qrisMerchantId || 'ID026533909051' }</span></p>
                                    <p className="text-gray-500 text-sm max-w-[250px]">Pastikan pelanggan telah melakukan pembayaran sebesar <b className="text-gray-800">{ formatRp(amountToPay) }</b> sebelum memproses transaksi.</p>
                                </div>
                            )}
                        </div>

                        <div className="shrink-0 p-4 bg-white border-t border-gray-200 pb-[max(env(safe-area-inset-bottom),1rem)] z-20 shadow-[0_-5px_15px_-5px_rgba(0,0,0,0.05)]">
                            <Button variant="primary" className="w-full text-lg py-4 shadow-[#9A1C1F]/40"
                                disabled={!isReadyToPay}
                                onClick={() => processTransaction({ method: checkoutMethod, cashGiven: checkoutMethod === 'cash' ? Number(cashGiven) : amountToPay, change: checkoutMethod === 'cash' ? change : 0 })}>
                                Selesaikan Transaksi
                            </Button>
                        </div>
                    </div>
                );
            };

            const renderBottomNav = () => {
                const navItems = [
                    { id: 'dashboard', label: 'Home', icon: Home },
                    { id: 'pos', label: 'Kasir', icon: LayoutGrid },
                    { id: 'history', label: 'Riwayat', icon: History },
                    { id: 'settings', label: 'Setelan', icon: Settings },
                ];

                return (
                    <nav className="shrink-0 bg-white border-t border-gray-200 flex justify-around px-2 py-2 pb-[max(env(safe-area-inset-bottom),0.5rem)] z-30 print:hidden shadow-[0_-4px_10px_rgba(0,0,0,0.02)]">
                        { navItems.map(item => {
                            const isActive = activeTab === item.id;
                            return (
                                <button key={item.id} onClick={() => setActiveTab(item.id)}
                                    className={`flex flex-col items-center justify-center w-16 p-2 rounded-xl transition-all duration-200 ${isActive ? 'text-[#9A1C1F] transform scale-105' : 'text-gray-400 hover:text-gray-600'}`}>
                                    <div className={`relative flex items-center justify-center w-10 h-8 rounded-full mb-1 transition-all ${isActive ? 'bg-[#9A1C1F]/10' : 'bg-transparent'}`}>
                                        <item.icon className={`w-5 h-5 ${isActive ? 'fill-current opacity-20 absolute' : 'hidden'}`} />
                                        <item.icon className={`w-5 h-5 relative z-10 transition-transform ${isActive ? 'stroke-[2.5] scale-110' : 'stroke-2'}`} />
                                    </div>
                                    <span className={`text-[10px] font-bold ${isActive ? 'text-[#9A1C1F]' : ''}`}>{ item.label }</span>
                                </button>
                            );
                        })}
                    </nav>
                );
            };

            const renderReceiptElement = () => {
                if (!receiptData) return null;
                const { id, timestamp, cart, orderInfo, calculations, payment, cashier } = receiptData;

                return (
                    <>
                        <div className="absolute top-[-9999px] left-[-9999px] z-[-9999] print:hidden">
                            <div ref={receiptRef} className="w-[300px] bg-white text-black font-mono text-[12px] leading-tight p-5 pb-8">
                                <div className="text-center mb-3">
                                    <h1 className="text-base font-extrabold mb-1">{ storeConfig.appName }</h1>
                                    <p className="text-[10px] whitespace-pre-line">{ storeConfig.address }</p>
                                    <p>{ storeConfig.instagram }</p>
                                    <div className="border-b border-black border-dashed my-2"></div>
                                </div>
                                <table className="w-full mb-2">
                                    <tbody>
                                        <tr><td className="w-14">Tgl</td><td>: { new Date(timestamp).toLocaleString('id-ID', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }) }</td></tr>
                                        <tr><td>No</td><td>: { id }</td></tr>
                                        <tr><td>Pelanggan</td><td>: { orderInfo.customerName || '-' }</td></tr>
                                        { orderInfo.orderNotes && (<tr><td>Catatan</td><td>: { orderInfo.orderNotes }</td></tr>)}
                                    </tbody>
                                </table>
                                <div className="border-b border-black border-dashed mb-2"></div>
                                <div className="w-full mb-2">
                                    { cart.map(item => {
                                        let itemTotal = item.price;
                                        if (item.addons) item.addons.forEach(a => itemTotal += a.price);
                                        let addonStr = '';
                                        if (item.addons && item.addons.length > 0) addonStr = ' (' + item.addons.map(a => a.name).join(', ') + ')';
                                        return (
                                            <div key={item.cartItemId} className="mb-1">
                                                <div className="flex justify-between font-bold"><span>{ item.name }{ addonStr }</span></div>
                                                { item.notes && <div className="pl-2 text-[10px] italic">"{ item.notes }"</div> }
                                                <div className="flex justify-between pl-2"><span>{ item.qty } x { itemTotal.toLocaleString('id-ID') }</span><span>{ (item.qty * itemTotal).toLocaleString('id-ID') }</span></div>
                                            </div>
                                        );
                                    })}
                                </div>
                                <div className="border-b border-black border-dashed mb-1"></div>
                                <table className="w-full mb-2">
                                    <tbody>
                                        <tr><td>Subtotal</td><td className="text-right">{ calculations.subtotal.toLocaleString('id-ID') }</td></tr>
                                        { calculations.discountAmount > 0 && (<tr><td>Diskon</td><td className="text-right">-{ calculations.discountAmount.toLocaleString('id-ID') }</td></tr>) }
                                        { calculations.taxAmount > 0 && (<tr><td>PPN</td><td className="text-right">{ calculations.taxAmount.toLocaleString('id-ID') }</td></tr>) }
                                        { calculations.serviceAmount > 0 && (<tr><td>Layanan</td><td className="text-right">{ calculations.serviceAmount.toLocaleString('id-ID') }</td></tr>) }
                                        <tr className="font-extrabold text-[14px]"><td className="pt-1">TOTAL</td><td className="text-right pt-1">{ calculations.grandTotal.toLocaleString('id-ID') }</td></tr>
                                        <tr><td colSpan="2"><div className="border-b border-black border-dashed my-1"></div></td></tr>
                                        <tr><td>{ payment.method.toUpperCase() }</td><td className="text-right">{ payment.cashGiven.toLocaleString('id-ID') }</td></tr>
                                        { payment.change > 0 && (<tr><td>KEMBALI</td><td className="text-right">{ payment.change.toLocaleString('id-ID') }</td></tr>) }
                                    </tbody>
                                </table>
                                <div className="text-center mt-4"><p>Terima Kasih</p><p>Selamat Menikmati</p></div>
                            </div>
                        </div>

                        <div className="hidden print:block w-full max-w-[58mm] mx-auto text-black bg-white font-mono text-[11px] leading-tight p-0 m-0">
                            <div className="text-center mb-3">
                                <h1 className="text-base font-extrabold mb-1">{ storeConfig.appName }</h1>
                                <p className="text-[10px] whitespace-pre-line">{ storeConfig.address }</p>
                                <p>{ storeConfig.instagram }</p>
                                <div className="border-b border-black border-dashed my-2"></div>
                            </div>
                            <table className="w-full mb-2">
                                <tbody>
                                    <tr><td className="w-14">Tgl</td><td>: { new Date(timestamp).toLocaleString('id-ID', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }) }</td></tr>
                                    <tr><td>No</td><td>: { id }</td></tr>
                                    <tr><td>Pelanggan</td><td>: { orderInfo.customerName || '-' }</td></tr>
                                    { orderInfo.orderNotes && (<tr><td>Catatan</td><td>: { orderInfo.orderNotes }</td></tr>)}
                                </tbody>
                            </table>
                            <div className="border-b border-black border-dashed mb-2"></div>
                            <div className="w-full mb-2">
                                { cart.map(item => {
                                    let itemTotal = item.price;
                                    if (item.addons) item.addons.forEach(a => itemTotal += a.price);
                                    let addonStr = '';
                                    if (item.addons && item.addons.length > 0) addonStr = ' (' + item.addons.map(a => a.name).join(', ') + ')';
                                    return (
                                        <div key={item.cartItemId} className="mb-1">
                                            <div className="flex justify-between font-bold"><span>{ item.name }{ addonStr }</span></div>
                                            { item.notes && <div className="pl-2 text-[10px] italic">"{ item.notes }"</div> }
                                            <div className="flex justify-between pl-2"><span>{ item.qty } x { itemTotal.toLocaleString('id-ID') }</span><span>{ (item.qty * itemTotal).toLocaleString('id-ID') }</span></div>
                                        </div>
                                    );
                                })}
                            </div>
                            <div className="border-b border-black border-dashed mb-1"></div>
                            <table className="w-full mb-2">
                                <tbody>
                                    <tr><td>Subtotal</td><td className="text-right">{ calculations.subtotal.toLocaleString('id-ID') }</td></tr>
                                    { calculations.discountAmount > 0 && (<tr><td>Diskon</td><td className="text-right">-{ calculations.discountAmount.toLocaleString('id-ID') }</td></tr>) }
                                    { calculations.taxAmount > 0 && (<tr><td>PPN</td><td className="text-right">{ calculations.taxAmount.toLocaleString('id-ID') }</td></tr>) }
                                    { calculations.serviceAmount > 0 && (<tr><td>Layanan</td><td className="text-right">{ calculations.serviceAmount.toLocaleString('id-ID') }</td></tr>) }
                                    <tr className="font-extrabold text-[12px]"><td className="pt-1">TOTAL</td><td className="text-right pt-1">{ calculations.grandTotal.toLocaleString('id-ID') }</td></tr>
                                    <tr><td colSpan="2"><div className="border-b border-black border-dashed my-1"></div></td></tr>
                                    <tr><td>{ payment.method.toUpperCase() }</td><td className="text-right">{ payment.cashGiven.toLocaleString('id-ID') }</td></tr>
                                    { payment.change > 0 && (<tr><td>KEMBALI</td><td className="text-right">{ payment.change.toLocaleString('id-ID') }</td></tr>) }
                                </tbody>
                            </table>
                            <div className="text-center mt-4"><p>Terima Kasih</p></div>
                        </div>
                    </>
                );
            };

            return (
                <div className="w-full h-full relative flex flex-col overflow-hidden font-sans text-gray-800">
                    { renderSplashScreen() }

                    <header className="bg-[#9A1C1F] text-[#F9F6F0] p-4 pt-[max(env(safe-area-inset-top),1rem)] flex justify-between items-center z-20 shrink-0 print:hidden relative overflow-hidden transition-all duration-300">
                        <div className="absolute inset-0 opacity-10" style={{ backgroundImage: 'radial-gradient(circle at 2px 2px, white 1px, transparent 0)', backgroundSize: '16px 16px', pointerEvents: 'none' }}></div>
                        <div className="flex items-center gap-3 relative z-10">
                            <HeaderLogo />
                            <div>
                                <h1 className="text-lg font-black tracking-wide leading-tight">{ storeConfig.appName }</h1>
                                <div className="flex items-center gap-1.5 text-[10px] bg-black/20 w-max px-2 py-0.5 rounded-full mt-0.5 shadow-sm">
                                    <span className={`w-2 h-2 rounded-full ${shift.isOpen ? 'bg-green-400' : 'bg-red-400'}`}></span>
                                    { shift.isOpen ? 'Kasir Aktif' : 'Kasir Tutup' }
                                </div>
                            </div>
                        </div>

                        <div className="relative z-20">
                            <button onClick={() => setIsHeaderMenuOpen(!isHeaderMenuOpen)} className="p-2 bg-white/10 rounded-full hover:bg-white/20 active:scale-95 transition-colors relative z-10">
                                <MoreVertical className="w-5 h-5" />
                            </button>
                            { isHeaderMenuOpen && (
                                <div className="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-xl overflow-hidden border border-gray-100 py-1 text-gray-800 animate-slide-up origin-top-right">
                                    <button onClick={handleResetApp} className="w-full text-left px-4 py-3 text-sm hover:bg-red-50 flex items-center gap-2 text-red-600 font-bold transition-colors">
                                        <AlertCircle className="w-4 h-4" /> Reset Data Aplikasi
                                    </button>
                                    <div className="border-b border-gray-100"></div>
                                    <button onClick={() => window.location.reload()} className="w-full text-left px-4 py-3 text-sm hover:bg-gray-50 flex items-center gap-2 text-gray-700 font-bold transition-colors">
                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                                        Muat Ulang
                                    </button>
                                </div>
                            )}
                        </div>
                    </header>

                    <main className="flex-1 overflow-hidden relative print:hidden bg-gray-50" onClick={() => isHeaderMenuOpen && setIsHeaderMenuOpen(false)}>
                        { !shift.isOpen && activeTab !== 'settings' ? renderShiftGate() : (
                            <>
                                { activeTab === 'dashboard' && renderDashboard() }
                                { activeTab === 'pos' && renderPOS() }
                                { activeTab === 'history' && renderHistory() }
                                { activeTab === 'settings' && renderSettings() }
                            </>
                        )}
                    </main>

                    { !isCartOpen && !isCheckoutOpen && renderBottomNav() }

                    { renderAddonModal() }
                    { renderCart() }
                    { renderCheckout() }
                    { renderDialog() }

                    { toasts.map(toast => <Toast key={toast.id} message={toast.message} type={toast.type} onClose={() => removeToast(toast.id)} />) }
                    { renderReceiptElement() }
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(3px) scale(0.995); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .animate-fade-in { 
            animation: fadeIn 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
            will-change: opacity, transform;
            backface-visibility: hidden;
        }

        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @keyframes popup { 0% { transform: scale(0.9); opacity: 0; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        .animate-popup { animation: popup 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes toastSlide { 0% { transform: translate(-50%, -20px); opacity: 0; } 100% { transform: translate(-50%, 0); opacity: 1; } }
        .animate-toast { animation: toastSlide 0.3s ease-out forwards; left: 50%; }

        @keyframes shine { to { background-position: 200% center; } }
        .animate-shine {
          background: linear-gradient(to right, #9A1C1F 20%, #ff7e5f 40%, #ff7e5f 60%, #9A1C1F 80%);
          background-size: 200% auto;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          animation: shine 3s linear infinite;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; -webkit-overflow-scrolling: touch; }

        @media print { body { background: white !important; display: block !important; margin: 0; padding: 0; min-height: auto; } html { width: 58mm; } }
    </style>
</body>
</html>
