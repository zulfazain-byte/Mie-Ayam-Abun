<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#8B0000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>POS Mi Ayam Abun Pro</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.18.5/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.0/build/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&display=swap" rel="stylesheet">
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",

      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * {
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }
    input, textarea {
      -webkit-user-select: text;
      user-select: text;
    }
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      width: 100%;
      background: #1a1a1a;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    #root {
      height: 100%;
      width: 100%;
    }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes slideDown { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes bounceIn {
      0% { transform: scale(0.9) translateX(-50%); opacity: 0; }
      50% { transform: scale(1.05) translateX(-50%); }
      100% { transform: scale(1) translateX(-50%); opacity: 1; }
    }
    @keyframes shine { to { background-position: 200% center; } }
    .animate-fade-in { animation: fadeIn 0.25s ease-out forwards; }
    .animate-slide-up { animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-slide-down { animation: slideDown 0.25s ease-out forwards; }
    .animate-bounce-in { animation: bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; left: 50%; }
    .animate-shine {
      background: linear-gradient(to right, #8B0000 20%, #ff6b6b 40%, #ff6b6b 60%, #8B0000 80%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shine 3s linear infinite;
    }
    @media print {
      body { background: white !important; display: block !important; margin: 0; padding: 0; width: 58mm; }
      html { width: 58mm; }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useCallback } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      ShoppingBag, Printer, MessageCircle, Plus, Minus,
      Trash2, X, Store, CreditCard, Banknote, QrCode,
      Image as ImageIcon, History, Settings, Home, LayoutGrid,
      ArrowLeft, MoreVertical, Edit, Search, CheckCircle,
      AlertCircle, Clock, Utensils, Coffee, Calculator, Check,
      Receipt, BarChart3, LogOut, Save, FileText, Info, Download,
      Share2, FileSpreadsheet, TrendingUp, Database, UploadCloud, User
    } from 'lucide-react';

    // ============================================================================
    // INDEXEDDB WRAPPER (Offline Storage)
    // ============================================================================
    const DB_NAME = 'POSMiAyamDB';
    const DB_VERSION = 1;
    const openDB = () => {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (event) => {
          const db = event.target.result;
          if (!db.objectStoreNames.contains('transactions')) db.createObjectStore('transactions', { keyPath: 'id' });
          if (!db.objectStoreNames.contains('holdOrders')) db.createObjectStore('holdOrders', { keyPath: 'id' });
          if (!db.objectStoreNames.contains('config')) db.createObjectStore('config', { keyPath: 'key' });
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    };
    const idbAdd = async (storeName, data) => {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        tx.objectStore(storeName).put(data);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    };
    const idbGetAll = async (storeName) => {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readonly');
        const request = tx.objectStore(storeName).getAll();
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    };
    const idbDelete = async (storeName, id) => {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        tx.objectStore(storeName).delete(id);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    };
    const idbClear = async (storeName) => {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        tx.objectStore(storeName).clear();
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    };

    // ============================================================================
    // DATA
    // ============================================================================
    const MENU_DATABASE = [
      { id: 'm1', category: 'Makanan', name: 'Mie Ayam Original', price: 12000, icon: Utensils },
      { id: 'm2', category: 'Makanan', name: 'Tempe Kemul/Pcs', price: 1500, icon: Utensils },
      { id: 'b1', category: 'Minuman', name: 'Ice/Hot Teh Standar', price: 4000, icon: Coffee },
      { id: 'b2', category: 'Minuman', name: 'Ice Teh Jumbo', price: 6000, icon: Coffee },
      { id: 'b3', category: 'Minuman', name: 'Ice/Hot Jeruk', price: 6000, icon: Coffee },
      { id: 'b4', category: 'Minuman', name: 'Ice Bunga Rosella', price: 6000, icon: Coffee },
      { id: 'b5', category: 'Minuman', name: 'Ice Bunga Telang', price: 6000, icon: Coffee },
      { id: 'b6', category: 'Minuman', name: 'Ice Bunga Telang + Nipis', price: 7000, icon: Coffee },
      { id: 'b7', category: 'Minuman', name: 'Ice/Hot Americano', price: 6000, icon: Coffee },
      { id: 'b8', category: 'Minuman', name: 'Ice Lemon Tea', price: 5000, icon: Coffee },
      { id: 'b9', category: 'Minuman', name: 'Kopi Hitam', price: 5000, icon: Coffee },
      { id: 'b10', category: 'Minuman', name: 'Ice/Hot Coffemix', price: 5000, icon: Coffee },
      { id: 'b11', category: 'Minuman', name: 'Ice Teh Tarik', price: 6000, icon: Coffee },
      { id: 'b12', category: 'Minuman', name: 'Ice Good Day Freeze', price: 6000, icon: Coffee },
      { id: 'b13', category: 'Minuman', name: 'Ice/Hot Milo', price: 6000, icon: Coffee },
      { id: 'b14', category: 'Minuman', name: 'Ice/Hot Milo + Kental', price: 7000, icon: Coffee },
    ];

    const ORDER_TYPES = ['Dine In', 'Takeaway', 'Delivery', 'Online (Ojol)'];
    const PAYMENT_METHODS = [
      { id: 'cash', name: 'Tunai', icon: Banknote },
      { id: 'qris', name: 'QRIS', icon: QrCode },
      { id: 'transfer', name: 'Transfer', icon: CreditCard }
    ];

    const DEFAULT_STORE_CONFIG = {
      appName: 'MI AYAM ABUN',
      instagram: '@miayamabun.id',
      address: 'Dusun IV Kalibagor, Kec.Kalibagor, Kab.Banyumas, Jawa Tengah 53191',
      phone: '085848791020',
      taxRate: 0,
      serviceCharge: 0,
      receiptMode: 'thermal',
      autoPrint: true,
      logoUrl: '',
      bankName: 'BCA',
      bankAccount: '1234567890',
      qrisMerchantId: '936000010000000001' // dummy QRIS merchant PAN
    };

    // ============================================================================
    // UTILITY
    // ============================================================================
    const formatRp = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
    const generateId = () => Math.random().toString(36).substr(2, 9);
    const generateInvoiceNo = () => {
      const date = new Date();
      return `INV-${date.getFullYear()}${(date.getMonth()+1).toString().padStart(2,'0')}${date.getDate().toString().padStart(2,'0')}-${Math.floor(Math.random() * 1000).toString().padStart(3,'0')}`;
    };
    const formatDate = (dateString) => new Date(dateString).toLocaleDateString('id-ID', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

    // ============================================================================
    // COMPONENTS
    // ============================================================================
    const Button = React.memo(({ children, onClick, variant = 'primary', className = '', disabled = false, icon: Icon }) => {
      const baseStyle = "flex items-center justify-center gap-1.5 font-semibold rounded-2xl transition-all duration-150 active:scale-[0.97] disabled:opacity-50 disabled:active:scale-100 overflow-hidden relative";
      const variants = {
        primary: "bg-gradient-to-r from-[#8B0000] to-[#b22222] text-white hover:from-[#6d0000] hover:to-[#8B0000] shadow-lg shadow-[#8B0000]/20 py-2.5 px-4 text-sm",
        secondary: "bg-[#8B0000]/8 text-[#8B0000] hover:bg-[#8B0000]/15 py-2.5 px-4 text-sm",
        outline: "bg-transparent border-2 border-[#8B0000]/30 text-[#8B0000] hover:bg-[#8B0000]/5 py-2 px-3 text-sm",
        ghost: "bg-transparent text-gray-500 hover:bg-gray-100 py-2 px-3 text-sm",
        danger: "bg-red-50 text-red-600 hover:bg-red-100 border border-red-200 py-2.5 px-4 text-sm",
        success: "bg-gradient-to-r from-[#25D366] to-[#128C7E] text-white hover:from-[#1fb855] hover:to-[#0e6b5e] shadow-lg shadow-[#25D366]/20 py-2.5 px-4 text-sm"
      };
      return (
        <button onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className}`}>
          {Icon && <Icon className="w-4 h-4" />}
          {children}
        </button>
      );
    });

    const Toast = React.memo(({ message, type = 'success', onClose }) => {
      useEffect(() => { const timer = setTimeout(onClose, 2500); return () => clearTimeout(timer); }, [onClose]);
      const bg = type === 'success' ? 'bg-emerald-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500';
      const Icon = type === 'success' ? CheckCircle : type === 'error' ? AlertCircle : Info;
      return (
        <div className={`absolute top-3 left-1/2 -translate-x-1/2 z-[110] flex items-center gap-2 px-4 py-2.5 rounded-full text-white font-semibold text-xs shadow-2xl animate-bounce-in whitespace-nowrap ${bg}`}>
          <Icon className="w-3.5 h-3.5" />{message}
        </div>
      );
    });

    const StrukLogo = ({ logoUrl }) => (
      logoUrl ? <img src={logoUrl} className="w-12 h-12 object-contain mx-auto mb-1.5 rounded-xl" alt="logo" /> :
      <svg viewBox="0 0 100 100" className="w-12 h-12 mx-auto mb-1.5" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round">
        <path d="M10 45 C10 75, 30 90, 50 90 C70 90, 90 75, 90 45 Z" fill="#000" stroke="#000" />
        <path d="M10 45 L90 45" stroke="#000" strokeWidth="6"/>
        <path d="M30 45 Q35 25, 50 25 T70 45" />
        <path d="M40 45 Q45 15, 60 15 T80 45" />
        <path d="M20 45 Q30 35, 40 45" />
        <line x1="85" y1="10" x2="25" y2="45" strokeWidth="5" />
        <line x1="95" y1="15" x2="35" y2="45" strokeWidth="5" />
      </svg>
    );

    // ============================================================================
    // MAIN APP
    // ============================================================================
    function App() {
      const receiptRef = useRef(null);
      const fileInputRef = useRef(null);
      const [activeTab, setActiveTab] = useState('pos');
      const [toasts, setToasts] = useState([]);
      const [dialog, setDialog] = useState(null);
      const [isHeaderMenuOpen, setIsHeaderMenuOpen] = useState(false);

      // State dari IndexedDB (di-load saat mount)
      const [storeConfig, setStoreConfig] = useState(DEFAULT_STORE_CONFIG);
      const [transactions, setTransactions] = useState([]);
      const [holdOrders, setHoldOrders] = useState([]);
      const [shift, setShift] = useState({ isOpen: true, startTime: new Date().toISOString(), startCash: 0 });
      const [cart, setCart] = useState([]);
      const [orderInfo, setOrderInfo] = useState({ customerName: '', customerPhone: '', orderType: 'Dine In', tableNumber: '' });

      // Load initial data from IndexedDB
      useEffect(() => {
        const loadData = async () => {
          try {
            const configs = await idbGetAll('config');
            const configMap = {};
            configs.forEach(c => configMap[c.key] = c.value);
            if (configMap.storeConfig) setStoreConfig({ ...DEFAULT_STORE_CONFIG, ...configMap.storeConfig });
            if (configMap.shift) setShift(configMap.shift);
            const tx = await idbGetAll('transactions');
            setTransactions(tx.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)));
            const h = await idbGetAll('holdOrders');
            setHoldOrders(h);
          } catch (e) { console.warn('IndexedDB load fallback', e); }
        };
        loadData();
      }, []);

      // Sync to IndexedDB on change
      useEffect(() => { idbAdd('config', { key: 'storeConfig', value: storeConfig }); }, [storeConfig]);
      useEffect(() => { idbAdd('config', { key: 'shift', value: shift }); }, [shift]);
      useEffect(() => {
        const syncTx = async () => {
          await idbClear('transactions');
          for (let t of transactions) { await idbAdd('transactions', t); }
        };
        syncTx();
      }, [transactions]);
      useEffect(() => {
        const syncH = async () => {
          await idbClear('holdOrders');
          for (let h of holdOrders) { await idbAdd('holdOrders', h); }
        };
        syncH();
      }, [holdOrders]);

      const [showShiftModal, setShowShiftModal] = useState(false);
      const [shiftCashInput, setShiftCashInput] = useState('');
      const [discount, setDiscount] = useState({ type: 'nominal', value: 0 });
      const [isCartOpen, setIsCartOpen] = useState(false);
      const [selectedItemForAddon, setSelectedItemForAddon] = useState(null);
      const [selectedAddons, setSelectedAddons] = useState([]);
      const [addonNotes, setAddonNotes] = useState('');
      const [isCheckoutOpen, setIsCheckoutOpen] = useState(false);
      const [checkoutMethod, setCheckoutMethod] = useState('cash');
      const [cashGiven, setCashGiven] = useState('');
      const [receiptData, setReceiptData] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedCategory, setSelectedCategory] = useState('Semua');

      const showToast = useCallback((message, type = 'success') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
      }, []);
      const removeToast = useCallback((id) => setToasts(prev => prev.filter(t => t.id !== id)), []);

      const handleAddToCart = useCallback((item, addons = [], notes = '') => {
        const cartItemId = `${item.id}-${addons.map(a => a.id).join('-')}-${notes}`;
        setCart(prev => {
          const existing = prev.find(c => c.cartItemId === cartItemId);
          if (existing) return prev.map(c => c.cartItemId === cartItemId ? { ...c, qty: c.qty + 1 } : c);
          return [...prev, { ...item, cartItemId, addons, notes, qty: 1 }];
        });
        showToast(`${item.name} ditambahkan`);
        setSelectedItemForAddon(null);
      }, [showToast]);

      const updateCartQty = useCallback((cartItemId, delta) => {
        setCart(prev => prev.map(item => {
          if (item.cartItemId === cartItemId) return { ...item, qty: Math.max(0, item.qty + delta) };
          return item;
        }).filter(item => item.qty > 0));
      }, []);

      const clearCart = useCallback(() => {
        setDialog({
          type: 'confirm', title: 'Kosongkan Keranjang',
          message: 'Hapus semua pesanan?',
          onConfirm: () => { setCart([]); setDiscount({ type: 'nominal', value: 0 }); setDialog(null); }
        });
      }, []);

      const calculateCart = useCallback(() => {
        let subtotal = 0;
        cart.forEach(item => {
          let itemPrice = item.price;
          if (item.addons) item.addons.forEach(addon => itemPrice += addon.price);
          subtotal += (itemPrice * item.qty);
        });
        let discountAmount = discount.type === 'percent' ? subtotal * (discount.value / 100) : discount.value;
        const subtotalAfterDiscount = Math.max(0, subtotal - discountAmount);
        const taxAmount = subtotalAfterDiscount * (storeConfig.taxRate / 100);
        const serviceAmount = subtotalAfterDiscount * (storeConfig.serviceCharge / 100);
        const grandTotal = subtotalAfterDiscount + taxAmount + serviceAmount;
        const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
        return { subtotal, discountAmount, taxAmount, serviceAmount, grandTotal, totalItems };
      }, [cart, discount, storeConfig]);

      const cartCalculations = calculateCart();

      const saveToHold = useCallback(() => {
        if (cart.length === 0) return;
        const holdOrder = {
          id: generateId(), time: new Date().toISOString(), cart: [...cart],
          orderInfo: { ...orderInfo }, calculations: cartCalculations
        };
        setHoldOrders(prev => [holdOrder, ...prev]);
        setCart([]);
        setOrderInfo({ customerName: '', customerPhone: '', orderType: 'Dine In', tableNumber: '' });
        setIsCartOpen(false);
        showToast('Pesanan disimpan');
      }, [cart, orderInfo, cartCalculations, showToast]);

      const resumeHoldOrder = useCallback((holdOrder) => {
        setCart(holdOrder.cart);
        setOrderInfo(holdOrder.orderInfo);
        setHoldOrders(prev => prev.filter(h => h.id !== holdOrder.id));
        setIsCartOpen(true);
        setActiveTab('pos');
      }, []);

      const handlePrintOrJPG = useCallback((trx) => {
        setReceiptData(trx);
        if (storeConfig.receiptMode === 'jpg') {
          showToast('Menyiapkan struk JPG...', 'info');
          setTimeout(async () => {
            try {
              const canvas = await window.html2canvas(receiptRef.current, { scale: 2, backgroundColor: '#ffffff' });
              const link = document.createElement('a');
              link.download = `Struk-${trx.id}.jpg`;
              link.href = canvas.toDataURL('image/jpeg', 0.9);
              link.click();
              showToast('Struk JPG berhasil diunduh', 'success');
            } catch (err) { showToast('Gagal membuat JPG', 'error'); }
          }, 500);
        } else {
          setTimeout(() => window.print(), 300);
        }
      }, [storeConfig.receiptMode, showToast]);

      const handleShareWA = useCallback((trx) => {
        let text = `*INVOICE PEMESANAN*\n*${storeConfig.appName}*\n${storeConfig.address}\n\n`;
        text += `No. Nota: ${trx.id}\n`;
        text += `Tgl: ${new Date(trx.timestamp).toLocaleString('id-ID')}\n`;
        text += `Pelanggan: ${trx.orderInfo.customerName || 'Tamu'}\n`;
        text += `Tipe: ${trx.orderInfo.orderType}\n`;
        text += `--------------------------------\n`;
        trx.cart.forEach(item => {
          let itemTotal = item.price;
          if (item.addons) item.addons.forEach(a => itemTotal += a.price);
          text += `${item.qty}x ${item.name} = ${formatRp(item.qty * itemTotal)}\n`;
        });
        text += `--------------------------------\n`;
        if (trx.calculations.discountAmount > 0) text += `Diskon: -${formatRp(trx.calculations.discountAmount)}\n`;
        if (trx.calculations.taxAmount > 0) text += `PPN: ${formatRp(trx.calculations.taxAmount)}\n`;
        if (trx.calculations.serviceAmount > 0) text += `Layanan: ${formatRp(trx.calculations.serviceAmount)}\n`;
        text += `*TOTAL: ${formatRp(trx.calculations.grandTotal)}*\n`;
        text += `Bayar: ${trx.payment.method.toUpperCase()}\n\n`;
        text += `Terima kasih! 😊`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
      }, [storeConfig]);

      const exportExcel = useCallback((period) => {
        if (!window.XLSX) { showToast('Memuat modul Excel...', 'info'); return; }
        const now = new Date();
        let filtered = transactions;
        if (period === 'hari') filtered = transactions.filter(t => new Date(t.timestamp).toDateString() === now.toDateString());
        else if (period === 'minggu') { const oneWeekAgo = new Date(); oneWeekAgo.setDate(now.getDate() - 7);
          filtered = transactions.filter(t => new Date(t.timestamp) >= oneWeekAgo); } else if (period === 'bulan') { const oneMonthAgo = new Date(); oneMonthAgo.setMonth(now.getMonth() - 1);
          filtered = transactions.filter(t => new Date(t.timestamp) >= oneMonthAgo); }
        if (filtered.length === 0) { showToast(`Tidak ada data untuk ${period} ini`, 'error'); return; }
        const excelData = filtered.map(t => ({
          'ID': t.id, 'Waktu': new Date(t.timestamp).toLocaleString('id-ID'), 'Pelanggan': t.orderInfo.customerName || 'Tamu',
          'Tipe': t.orderInfo.orderType, 'Subtotal': t.calculations.subtotal, 'Diskon': t.calculations.discountAmount,
          'Pajak': t.calculations.taxAmount, 'Layanan': t.calculations.serviceAmount, 'Total': t.calculations.grandTotal,
          'Bayar': t.payment.method.toUpperCase(), 'Uang Masuk': t.payment.cashGiven, 'Kembalian': t.payment.change
        }));
        const ws = XLSX.utils.json_to_sheet(excelData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Laporan");
        XLSX.writeFile(wb, `Laporan_${period}.xlsx`);
        showToast(`Ekspor Excel berhasil`, 'success');
      }, [transactions, showToast]);

      const handleBackup = useCallback(() => {
        const data = { storeConfig, transactions, holdOrders };
        const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Backup_POS_${new Date().toISOString().slice(0,10)}.json`;
        link.click();
        showToast('Backup berhasil diunduh', 'success');
      }, [storeConfig, transactions, holdOrders, showToast]);

      const handleRestore = useCallback((e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if(data.storeConfig) setStoreConfig({...DEFAULT_STORE_CONFIG, ...data.storeConfig});
            if(data.transactions) setTransactions(data.transactions);
            if(data.holdOrders) setHoldOrders(data.holdOrders);
            showToast('Data berhasil direstore!', 'success');
          } catch(err) { showToast('Format file tidak valid!', 'error'); }
        };
        reader.readAsText(file);
        if(fileInputRef.current) fileInputRef.current.value = '';
      }, [showToast]);

      const handleResetApp = useCallback(() => {

              <div className="p-3 border-b border-gray-100 flex items-center gap-2.5 bg-gray-50"><Printer className="w-4 h-4 text-emerald-500"/><h3 className="font-bold text-sm">Cetak & Operasional</h3></div>
              <div className="p-3 space-y-3">
                <div className="flex justify-between items-center"><span className="text-xs">Mode Struk</span><select value={storeConfig.receiptMode} onChange={e=>setStoreConfig({...storeConfig,receiptMode:e.target.value})} className="bg-gray-50 border rounded-lg px-2 py-1 text-xs"><option value="thermal">Thermal</option><option value="jpg">JPG</option></select></div>
                <div className="flex justify-between items-center"><span className="text-xs">Auto Cetak</span><div onClick={()=>setStoreConfig({...storeConfig,autoPrint:!storeConfig.autoPrint})} className={`w-11 h-6 rounded-full relative cursor-pointer transition ${storeConfig.autoPrint?'bg-[#8B0000]':'bg-gray-300'}`}><div className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-all ${storeConfig.autoPrint?'right-0.5':'left-0.5'}`}/></div></div>
                <button className="w-full text-[11px] font-bold py-2 rounded-lg bg-red-50 text-red-600 border border-red-200" onClick={()=>{ setDialog({type:'confirm',title:'Reset',message:'Hapus semua data?',onConfirm:()=>{ indexedDB.deleteDatabase(DB_NAME); window.location.reload(); }});}}>Reset Aplikasi</button>
              </div>
            </div>
          </div>
        </div>
      );

      const renderDialog = () => {
        if(!dialog) return null;
        return (
          <div className="absolute inset-0 z-[70] flex items-center justify-center bg-black/60 backdrop-blur-sm px-6 no-print animate-fade-in">
            <div className="bg-white rounded-3xl w-full max-w-xs p-5 shadow-2xl animate-slide-up">
              <h3 className="text-lg font-bold text-gray-800 mb-1.5">{dialog.title}</h3>
              {dialog.message && <p className="text-xs text-gray-600 mb-4">{dialog.message}</p>}
              {dialog.type==='prompt' && <input type="number" value={dialog.inputValue||''} onChange={e=>setDialog({...dialog,inputValue:e.target.value})} placeholder={dialog.placeholder} className="w-full bg-gray-50 border rounded-xl px-3 py-2.5 text-base font-bold mb-4 text-center" autoFocus/>}
              <div className="flex gap-2.5">
                <button className="flex-1 py-2.5 rounded-xl bg-gray-100 text-gray-700 font-semibold text-xs active:scale-95" onClick={()=>setDialog(null)}>Batal</button>
                <button className="flex-1 py-2.5 rounded-xl bg-gradient-to-r from-[#8B0000] to-[#b22222] text-white font-semibold text-xs active:scale-95 shadow-lg" onClick={()=>dialog.onConfirm(dialog.inputValue)}>Konfirmasi</button>
              </div>
            </div>
          </div>
        );
      };

      const renderCart = () => {
        if(!isCartOpen) return null;
        return (
          <div className="absolute inset-0 z-40 flex flex-col bg-gray-50 no-print animate-slide-up">
            <div className="bg-white px-3 py-3 flex items-center justify-between border-b shadow-sm sticky top-0 z-10">
              <div className="flex items-center gap-2"><button onClick={()=>setIsCartOpen(false)} className="p-1.5 text-gray-600"><ArrowLeft className="w-5 h-5"/></button><h2 className="font-bold text-base">Pesanan</h2></div>
              <button onClick={clearCart} className="text-[10px] font-bold text-red-500 bg-red-50 px-2 py-1.5 rounded-lg"><Trash2 className="w-3.5 h-3.5"/> Kosongkan</button>
            </div>
            <div className="flex-1 overflow-y-auto scrollbar-hide pb-28">
              <section className="bg-white p-3 mb-1.5 space-y-3">
                <div className="flex gap-1.5 overflow-x-auto pb-1">
                  {ORDER_TYPES.map(type=>(<button key={type} onClick={()=>setOrderInfo({...orderInfo,orderType:type})} className={`px-3 py-1.5 rounded-full text-[11px] font-bold whitespace-nowrap ${orderInfo.orderType===type?'bg-[#8B0000] text-white':'bg-gray-50 text-gray-600 border'}`}>{type}</button>))}
                </div>
                <input type="text" value={orderInfo.customerName} onChange={e=>setOrderInfo({...orderInfo,customerName:e.target.value})} placeholder="Nama Pelanggan" className="w-full px-3 py-2 bg-gray-50 border rounded-lg text-xs"/>
                <input type="text" value={orderInfo.tableNumber} onChange={e=>setOrderInfo({...orderInfo,tableNumber:e.target.value})} placeholder="No Meja" className="w-full px-3 py-2 bg-gray-50 border rounded-lg text-xs"/>
              </section>
              <section className="bg-white p-3 mb-1.5">
                <h3 className="font-bold text-xs mb-3">Item ({cartCalculations.totalItems})</h3>
                {cart.map((item,idx)=>{
                  let itemTotal = item.price;
                  if(item.addons) item.addons.forEach(a=>itemTotal+=a.price);
                  itemTotal *= item.qty;
                  return (
                    <div key={item.cartItemId} className="flex gap-2.5 pb-3 border-b border-gray-50 last:border-0">
                      <div className="flex flex-col items-center bg-gray-50 rounded-lg w-9 border">
                        <button onClick={()=>updateCartQty(item.cartItemId,1)} className="w-full h-7 flex items-center justify-center"><Plus className="w-3.5 h-3.5"/></button>
                        <span className="font-bold text-xs">{item.qty}</span>
                        <button onClick={()=>updateCartQty(item.cartItemId,-1)} className="w-full h-7 flex items-center justify-center"><Minus className="w-3.5 h-3.5"/></button>
                      </div>
                      <div className="flex-1">
                        <div className="flex justify-between"><p className="font-bold text-xs">{item.name}</p><p className="font-bold text-xs text-[#8B0000]">{formatRp(itemTotal)}</p></div>
                        {item.addons?.length>0 && <div className="text-[10px] text-gray-500">{item.addons.map(a=><div key={a.id}>+ {a.name}</div>)}</div>}
                        {item.notes && <p className="text-[10px] text-orange-600 bg-orange-50 p-1 rounded mt-1">"{item.notes}"</p>}
                      </div>
                    </div>
                  )
                })}
              </section>
              <section className="bg-white p-3">
                <div className="space-y-1.5 text-xs">
                  <div className="flex justify-between"><span>Subtotal</span><span>{formatRp(cartCalculations.subtotal)}</span></div>
                  <div className="flex justify-between text-blue-600 cursor-pointer" onClick={()=>setDialog({type:'prompt',title:'Diskon',placeholder:'Nominal',inputValue:discount.value?discount.value.toString():'',onConfirm:(val)=>{setDiscount({type:'nominal',value:Number(val)||0});setDialog(null);}})}><span>Diskon <Edit className="w-3 h-3 inline"/></span><span>-{formatRp(cartCalculations.discountAmount)}</span></div>
                  {storeConfig.taxRate>0 && <div className="flex justify-between"><span>PPN {storeConfig.taxRate}%</span><span>{formatRp(cartCalculations.taxAmount)}</span></div>}
                  {storeConfig.serviceCharge>0 && <div className="flex justify-between"><span>Layanan {storeConfig.serviceCharge}%</span><span>{formatRp(cartCalculations.serviceAmount)}</span></div>}
                  <div className="border-t pt-2.5 mt-2.5 flex justify-between"><span className="font-bold">TOTAL</span><span className="text-xl font-black text-[#8B0000]">{formatRp(cartCalculations.grandTotal)}</span></div>
                </div>
              </section>
            </div>
            <div className="absolute bottom-0 left-0 right-0 bg-white p-3 border-t flex gap-2.5 pb-[max(env(safe-area-inset-bottom),0.75rem)]">
              <button className="flex-1 py-2.5 rounded-xl bg-[#8B0000]/8 text-[#8B0000] font-bold text-xs" onClick={saveToHold}><Save className="w-4 h-4"/> Simpan</button>
              <button className="flex-[2] py-2.5 rounded-xl bg-gradient-to-r from-[#8B0000] to-[#b22222] text-white font-bold text-xs" onClick={()=>{setIsCheckoutOpen(true);setCheckoutMethod('cash');setCashGiven('');}}>Bayar</button>
            </div>
          </div>
        );
      };

      const renderCheckout = () => {
        if(!isCheckoutOpen) return null;
        const handleNumpad = (val) => { if(val==='C') setCashGiven(''); else if(val==='000') setCashGiven(prev=>prev?prev+'000':prev); else setCashGiven(prev=>prev+val); };
        const amountToPay = cartCalculations.grandTotal;
        const change = Number(cashGiven) - amountToPay;
        const isReady = checkoutMethod!=='cash' || Number(cashGiven)>=amountToPay;
        return (
          <div className="absolute inset-0 z-50 flex flex-col bg-gray-50 no-print animate-slide-up">
            <div className="bg-white px-3 py-3 flex items-center gap-2 border-b"><button onClick={()=>setIsCheckoutOpen(false)}><ArrowLeft className="w-5 h-5"/></button><h2 className="font-bold text-base">Pembayaran</h2></div>
            <div className="flex-1 overflow-y-auto">
              <div className="bg-gradient-to-br from-[#8B0000] to-[#5c0000] text-white p-5 text-center"><p className="text-xs opacity-70">Total</p><p className="text-3xl font-black">{formatRp(amountToPay)}</p></div>
              <div className="p-3 bg-white"><div className="grid grid-cols-3 gap-2">
                {PAYMENT_METHODS.map(m=><button key={m.id} onClick={()=>{setCheckoutMethod(m.id);setCashGiven('');}} className={`py-2.5 rounded-xl border-2 flex flex-col items-center gap-1 ${checkoutMethod===m.id?'border-[#8B0000] bg-[#8B0000]/8 text-[#8B0000]':'border-gray-100 text-gray-500'}`}><m.icon className="w-5 h-5"/><span className="text-[10px] font-bold">{m.name}</span></button>)}
              </div></div>
              {checkoutMethod==='cash'? (
                <div className="p-3 bg-white space-y-3">
                  <div className="bg-gray-50 rounded-xl p-3.5 text-right"><p className="text-[10px] text-gray-400">Uang Diterima</p><p className={`text-xl font-bold ${cashGiven?'text-gray-800':'text-gray-300'}`}>{cashGiven?formatRp(Number(cashGiven)):'Rp 0'}</p></div>
                  {Number(cashGiven)>0 && <div className={`p-3 rounded-xl flex justify-between ${change>=0?'bg-green-50 text-green-700':'bg-red-50 text-red-700'}`}><span>Kembalian</span><span className="font-black">{change>=0?formatRp(change):'Kurang '+formatRp(Math.abs(change))}</span></div>}
                  <div className="flex gap-1.5"><button onClick={()=>setCashGiven(amountToPay.toString())} className="px-3 py-1.5 bg-blue-50 text-blue-700 text-[11px] font-bold rounded-lg">Uang Pas</button><button onClick={()=>setCashGiven('50000')} className="px-3 py-1.5 bg-gray-100 text-[11px] font-bold rounded-lg">50K</button><button onClick={()=>setCashGiven('100000')} className="px-3 py-1.5 bg-gray-100 text-[11px] font-bold rounded-lg">100K</button></div>
                  <div className="grid grid-cols-3 gap-2 mt-3">
                    {['1','2','3','4','5','6','7','8','9','C','0','000'].map(key=><button key={key} onClick={()=>handleNumpad(key)} className={`py-3 text-lg font-bold rounded-xl active:scale-95 ${key==='C'?'bg-red-50 text-red-600':'bg-gray-50'}`}>{key}</button>)}
                  </div>
                </div>
              ): checkoutMethod==='qris'? renderQrisPayment() : renderTransferPayment()}
            </div>
            <div className="absolute bottom-0 left-0 right-0 bg-white p-3 border-t pb-[max(env(safe-area-inset-bottom),0.75rem)]">
              <button className="w-full py-3 rounded-xl bg-gradient-to-r from-[#8B0000] to-[#b22222] text-white font-bold text-sm disabled:opacity-50" disabled={!isReady} onClick={()=>processTransaction({method:checkoutMethod,cashGiven:checkoutMethod==='cash'?Number(cashGiven):amountToPay,change:checkoutMethod==='cash'?change:0})}>Selesaikan</button>
            </div>
          </div>
        );
      };

      const renderBottomNav = () => {
        const items = [
          { id:'dashboard', label:'Home', icon:Home },
          { id:'pos', label:'Kasir', icon:LayoutGrid },
          { id:'history', label:'Riwayat', icon:History },
          { id:'settings', label:'Setelan', icon:Settings }
        ];
        return (
          <div className="absolute bottom-0 left-0 right-0 bg-white/90 backdrop-blur border-t border-gray-200 flex justify-around px-1 py-1.5 pb-[max(env(safe-area-inset-bottom),0.25rem)] z-30 no-print">
            {items.map(item=>{
              const isActive = activeTab===item.id;
              return (
                <button key={item.id} onClick={()=>setActiveTab(item.id)} className={`flex flex-col items-center justify-center w-14 py-1 rounded-xl transition-all duration-200 ${isActive?'text-[#8B0000]':'text-gray-400'}`}>
                  <div className={`relative flex items-center justify-center w-9 h-7 rounded-full mb-0.5 ${isActive?'bg-[#8B0000]/10':''}`}>
                    <item.icon className={`w-5 h-5 ${isActive?'stroke-[2.5] scale-110':'stroke-[1.8]'}`}/>
                  </div>
                  <span className="text-[10px] font-bold">{item.label}</span>
                </button>
              )
            })}
          </div>
        );
      };

      const renderReceipt = () => {
        if(!receiptData) return null;
        const { id, timestamp, cart, orderInfo, calculations, payment } = receiptData;
        const content = (
          <div className="w-[280px] bg-white text-black font-mono text-[11px] leading-tight p-4 pb-6">
            <StrukLogo logoUrl={storeConfig.logoUrl} />
            <h1 className="text-sm font-extrabold mb-0.5 text-center">{storeConfig.appName}</h1>
            <p className="text-[9px] text-center whitespace-pre-line">{storeConfig.address}</p>
            <p className="text-[9px] text-center">{storeConfig.instagram}</p>
            <div className="border-b border-dashed my-1.5"/>
            <table className="w-full text-[10px]"><tbody>
              <tr><td className="w-12">Tgl</td><td>: {new Date(timestamp).toLocaleString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}</td></tr>
              <tr><td>No</td><td>: {id}</td></tr>
              <tr><td>Plg</td><td>: {orderInfo.customerName||'-'}</td></tr>
            </tbody></table>
            <div className="border-b border-dashed mb-1.5"/>
            <div className="text-[10px]">
              {cart.map(item=>{
                let itemTotal = item.price;
                if(item.addons) item.addons.forEach(a=>itemTotal+=a.price);
                return (<div key={item.cartItemId} className="mb-1"><div className="flex justify-between font-bold"><span>{item.name}</span></div>{item.addons?.length>0 && <div className="pl-2 text-[9px]">{item.addons.map(a=><div key={a.id}>+ {a.name}</div>)}</div>}<div className="flex justify-between pl-2"><span>{item.qty} x {itemTotal.toLocaleString('id-ID')}</span><span>{(item.qty*itemTotal).toLocaleString('id-ID')}</span></div></div>)
              })}
            </div>
            <div className="border-b border-dashed mb-1"/>
            <table className="w-full text-[10px]"><tbody>
              <tr><td>Subtotal</td><td className="text-right">{calculations.subtotal.toLocaleString('id-ID')}</td></tr>
              {calculations.discountAmount>0 && <tr><td>Diskon</td><td className="text-right">-{calculations.discountAmount.toLocaleString('id-ID')}</td></tr>}
              {calculations.taxAmount>0 && <tr><td>PPN</td><td className="text-right">{calculations.taxAmount.toLocaleString('id-ID')}</td></tr>}
              {calculations.serviceAmount>0 && <tr><td>Layanan</td><td className="text-right">{calculations.serviceAmount.toLocaleString('id-ID')}</td></tr>}
              <tr className="font-extrabold text-xs"><td className="pt-0.5">TOTAL</td><td className="text-right pt-0.5">{calculations.grandTotal.toLocaleString('id-ID')}</td></tr>
              <tr><td colSpan="2"><div className="border-b border-dashed my-0.5"/></td></tr>
              <tr><td>{payment.method.toUpperCase()}</td><td className="text-right">{payment.cashGiven.toLocaleString('id-ID')}</td></tr>
              <tr><td>KEMBALI</td><td className="text-right">{payment.change.toLocaleString('id-ID')}</td></tr>
            </tbody></table>
            <div className="text-center mt-3 text-[10px]"><p>Terima Kasih</p><p>Selamat Menikmati</p></div>
          </div>
        );
        return (
          <>
            <div className="absolute top-[-9999px] left-[-9999px] z-[-9999] no-print"><div ref={receiptRef}>{content}</div></div>
            <div className="hidden print:block w-[58mm] mx-auto text-black bg-white font-mono text-[10px] p-0 m-0">{content}</div>
          </>
        );
      };

      return (
        <div className="w-full h-full bg-[#1a1a1a] relative flex justify-center overflow-hidden font-sans text-gray-800">
          <div className="w-full h-full sm:max-w-[430px] bg-white relative flex flex-col overflow-hidden shadow-2xl">
            <header className="bg-gradient-to-r from-[#8B0000] to-[#b22222] text-white px-4 py-3 pt-[max(env(safe-area-inset-top),0.5rem)] flex items-center justify-between z-20 shrink-0 no-print overflow-visible">
              <div className="flex items-center gap-3">
                <div className="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center backdrop-blur border border-white/30 shadow-inner">
                  {storeConfig.logoUrl ? <img src={storeConfig.logoUrl} className="w-8 h-8 object-contain rounded-lg" alt="logo"/> :
                  <img src="https://cdn-icons-png.flaticon.com/512/3081/3081367.png" className="w-8 h-8 brightness-0 invert" alt="logo"/>}
                </div>
                <div>
                  <h1 className="text-xl font-black tracking-wide leading-tight drop-shadow-md">{storeConfig.appName}</h1>
                  <div className="flex items-center gap-1.5 text-[10px] bg-white/20 w-max px-2.5 py-1 rounded-full mt-1 backdrop-blur-sm">
                    <span className={`w-2 h-2 rounded-full ${shift.isOpen?'bg-green-400':'bg-red-400'}`}></span>
                    {shift.isOpen?'Kasir Aktif':'Kasir Tutup'}
                  </div>
                </div>
              </div>
              <div className="relative" style={{zIndex:100}}>
                <button onClick={()=>setIsHeaderMenuOpen(!isHeaderMenuOpen)} className="p-2 bg-white/15 rounded-xl hover:bg-white/25 active:scale-95 transition-colors">
                  <MoreVertical className="w-5 h-5"/>
                </button>
                {isHeaderMenuOpen && (
                  <div className="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-2xl border border-gray-100 py-1 text-gray-800 animate-slide-down origin-top-right z-[200]">
                    <button onClick={handleResetApp} className="w-full text-left px-3 py-2.5 text-xs hover:bg-red-50 flex items-center gap-2 text-red-600 font-bold"><AlertCircle className="w-3.5 h-3.5"/> Reset Data</button>
                    <div className="border-b"/>
                    <button onClick={()=>window.location.reload()} className="w-full text-left px-3 py-2.5 text-xs hover:bg-gray-50 flex items-center gap-2 text-gray-700 font-bold"><svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg> Muat Ulang</button>
                  </div>
                )}
              </div>
            </header>
            <main className="flex-1 overflow-hidden relative no-print bg-gray-50" onClick={()=>isHeaderMenuOpen && setIsHeaderMenuOpen(false)}>
              {activeTab==='dashboard' && renderDashboard()}
              {activeTab==='pos' && renderPOS()}
              {activeTab==='history' && renderHistory()}
              {activeTab==='settings' && renderSettings()}
            </main>
            {!isCartOpen && !isCheckoutOpen && renderBottomNav()}
            {renderCart()}
            {renderCheckout()}
            {renderDialog()}
            {toasts.map(toast=><Toast key={toast.id} message={toast.message} type={toast.type} onClose={()=>removeToast(toast.id)}/>)}
            {showShiftModal && (
              <div className="absolute inset-0 z-[80] flex items-center justify-center bg-black/60 backdrop-blur-sm px-6 no-print animate-fade-in">
                <div className="bg-white rounded-3xl w-full max-w-xs p-5 shadow-2xl animate-slide-up">
                  <h3 className="text-lg font-bold mb-1.5">Buka Shift</h3>
                  <input type="number" value={shiftCashInput} onChange={e=>setShiftCashInput(e.target.value)} placeholder="Saldo Awal" className="w-full bg-gray-50 border rounded-xl px-3 py-2.5 text-base font-bold mb-4 text-center" autoFocus/>
                  <div className="flex gap-2.5"><button className="flex-1 py-2.5 rounded-xl bg-gray-100 font-semibold text-xs" onClick={()=>setShowShiftModal(false)}>Batal</button><button className="flex-1 py-2.5 rounded-xl bg-gradient-to-r from-[#8B0000] to-[#b22222] text-white font-semibold text-xs" onClick={()=>{setShift({isOpen:true,startTime:new Date().toISOString(),startCash:Number(shiftCashInput)||0});setShowShiftModal(false);showToast('Shift Dibuka');}}>Buka</button></div>
                </div>
              </div>
            )}
          </div>
          {renderReceipt()}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
