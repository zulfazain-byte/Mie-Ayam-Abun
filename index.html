<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Mi Ayam Abun - Kasir Digital</title>
  <!-- Ganti href di bawah dengan URL gambar/favicon Anda -->
  <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍜</text></svg>">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f3f4f6; display: flex; justify-content: center; }
    #root { width: 100%; max-width: 480px; min-height: 100vh; background: white; box-shadow: 0 0 40px rgba(0,0,0,0.1); position: relative; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes bounceIn { 0% { transform: scale(0.9) translateX(-50%); opacity:0; } 50% { transform: scale(1.05) translateX(-50%); } 100% { transform: scale(1) translateX(-50%); opacity:1; } }
    @keyframes pulseSoft { 0%,100% { opacity:0.8; transform:scale(1); } 50% { opacity:1; transform:scale(1.02); } }
    @keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1); }
    .animate-bounce-in { animation: bounceIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275); left:50%; }
    .animate-pulse-soft { animation: pulseSoft 2s infinite; }
    .animate-spin-slow { animation: spinSlow 4s linear infinite; }
    .scrollbar-hide::-webkit-scrollbar { display:none; }
    .scrollbar-hide { -ms-overflow-style:none; scrollbar-width:none; }
    @media print { body { background:white!important; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo, useRef } = React;
    
    // Icons as simple components
    const Icon = ({ type, className = "", size = 20 }) => {
      const icons = {
        plus: "➕", minus: "➖", trash: "🗑️", x: "✖️", store: "🏪",
        creditCard: "💳", banknote: "💵", qrCode: "📱", image: "🖼️",
        history: "📋", settings: "⚙️", home: "🏠", layoutGrid: "📦",
        search: "🔍", checkCircle: "✅", alertCircle: "⚠️", clock: "🕒",
        utensils: "🍜", coffee: "☕", calculator: "🧮", receipt: "🧾",
        barChart: "📊", save: "💾", download: "⬇️", share: "📤",
        messageCircle: "💬", printer: "🖨️", edit: "✏️", moreVertical: "⋮",
        arrowLeft: "⬅️", chevronRight: "›", heart: "❤️", star: "⭐",
        sun: "☀️", moon: "🌙"
      };
      return <span className={className} style={{fontSize:size}}>{icons[type] || "•"}</span>;
    };

    // Data Konfigurasi
    const MENU_DATABASE = [
      { id: 'm1', category: 'Makanan', name: 'Mie Ayam Original', price: 12000, icon: 'utensils' },
      { id: 'm2', category: 'Makanan', name: 'Tempe Kemul/Pcs', price: 1500, icon: 'utensils' },
      { id: 'b1', category: 'Minuman', name: 'Ice/Hot Teh Standar', price: 4000, icon: 'coffee' },
      { id: 'b2', category: 'Minuman', name: 'Ice Teh Jumbo', price: 6000, icon: 'coffee' },
      { id: 'b3', category: 'Minuman', name: 'Ice/Hot Jeruk', price: 6000, icon: 'coffee' },
      { id: 'b4', category: 'Minuman', name: 'Ice Bunga Rosella', price: 6000, icon: 'coffee' },
      { id: 'b5', category: 'Minuman', name: 'Ice Bunga Telang', price: 6000, icon: 'coffee' },
      { id: 'b6', category: 'Minuman', name: 'Ice Bunga Telang + Nipis', price: 7000, icon: 'coffee' },
      { id: 'b7', category: 'Minuman', name: 'Ice/Hot Americano', price: 6000, icon: 'coffee' },
      { id: 'b8', category: 'Minuman', name: 'Ice Lemon Tea', price: 5000, icon: 'coffee' },
      { id: 'b9', category: 'Minuman', name: 'Kopi Hitam', price: 5000, icon: 'coffee' },
      { id: 'b10', category: 'Minuman', name: 'Ice/Hot Coffemix', price: 5000, icon: 'coffee' },
      { id: 'b11', category: 'Minuman', name: 'Ice Teh Tarik', price: 6000, icon: 'coffee' },
      { id: 'b12', category: 'Minuman', name: 'Ice Good Day Freeze', price: 6000, icon: 'coffee' },
      { id: 'b13', category: 'Minuman', name: 'Ice/Hot Milo', price: 6000, icon: 'coffee' },
      { id: 'b14', category: 'Minuman', name: 'Ice/Hot Milo + Kental', price: 7000, icon: 'coffee' },
    ];

    const ORDER_TYPES = ['Dine In', 'Takeaway', 'Delivery', 'Online (Ojol)'];
    const PAYMENT_METHODS = [
      { id: 'cash', name: 'Tunai', icon: 'banknote' },
      { id: 'qris', name: 'QRIS', icon: 'qrCode' },
      { id: 'transfer', name: 'Transfer', icon: 'creditCard' }
    ];

    const formatRp = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
    const generateId = () => Math.random().toString(36).substr(2, 9);
    const generateInvoiceNo = () => {
      const now = new Date();
      return `INV-${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2,'0')}${now.getDate().toString().padStart(2,'0')}-${Math.floor(Math.random()*1000).toString().padStart(3,'0')}`;
    };
    const formatDate = (dateString) => new Date(dateString).toLocaleDateString('id-ID', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });

    // Button Component
    const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false, iconType }) => {
      const base = "flex items-center justify-center gap-2 font-bold rounded-xl transition-all active:scale-95 disabled:opacity-50 disabled:active:scale-100";
      const vars = {
        primary: "bg-[#9A1C1F] text-white hover:bg-[#7a1518] shadow-lg shadow-[#9A1C1F]/30 py-3 px-4",
        secondary: "bg-[#9A1C1F]/10 text-[#9A1C1F] hover:bg-[#9A1C1F]/20 py-3 px-4",
        outline: "bg-transparent border-2 border-[#9A1C1F] text-[#9A1C1F] hover:bg-[#9A1C1F]/5 py-2.5 px-4",
        ghost: "bg-transparent text-gray-600 hover:bg-gray-100 py-2 px-3",
        danger: "bg-red-50 text-red-600 hover:bg-red-100 py-3 px-4",
        success: "bg-[#25D366] text-white hover:bg-[#20bd5a] shadow-lg shadow-[#25D366]/30 py-3 px-4"
      };
      return (
        <button onClick={onClick} disabled={disabled} className={`${base} ${vars[variant]} ${className}`}>
          {iconType && <Icon type={iconType} size={20} />}
          {children}
        </button>
      );
    };

    // Toast Notification
    const Toast = ({ message, type = 'success', onClose }) => {
      useEffect(() => {
        const t = setTimeout(onClose, 3000);
        return () => clearTimeout(t);
      }, [onClose]);
      const bg = type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : type === 'info' ? 'bg-blue-500' : 'bg-gray-800';
      const icon = type === 'success' ? 'checkCircle' : type === 'error' ? 'alertCircle' : 'info';
      return (
        <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[100] flex items-center gap-2 px-4 py-3 rounded-full text-white font-medium text-sm shadow-xl animate-bounce-in whitespace-nowrap ${bg}`}>
          <Icon type={icon} size={16} />
          {message}
        </div>
      );
    };

    // Footer Credit
    const FooterCredit = () => (
      <div className="fixed bottom-[72px] left-0 right-0 flex justify-center z-20 pointer-events-none px-4">
        <div className="bg-white/80 backdrop-blur-md px-4 py-1.5 rounded-full shadow-lg border border-gray-200/60 animate-pulse-soft select-none">
          <p className="text-xs font-medium text-gray-500 flex items-center gap-1.5">
            <Icon type="heart" size={12} className="text-red-400" />
            Dibuat oleh <span className="font-extrabold text-[#9A1C1F]">Dhiya'Ulhag Zulfa Zain</span>
            <Icon type="star" size={12} className="text-yellow-500 animate-spin-slow" />
          </p>
        </div>
      </div>
    );

    // Main App
    const App = () => {
      const receiptRef = useRef(null);
      const [activeTab, setActiveTab] = useState('pos');
      const [toasts, setToasts] = useState([]);
      const [dialog, setDialog] = useState(null);

      // Load state from localStorage
      const [transactions, setTransactions] = useState(() => {
        try { return JSON.parse(localStorage.getItem('tx')) || []; } catch { return []; }
      });
      const [holdOrders, setHoldOrders] = useState(() => {
        try { return JSON.parse(localStorage.getItem('hold')) || []; } catch { return []; }
      });
      const [storeConfig, setStoreConfig] = useState(() => {
        try { return JSON.parse(localStorage.getItem('config')) || {
          appName: 'MI AYAM ABUN', instagram: '@miayamabun.id',
          address: 'Jl. Raya Kuliner No. 1, Kota', phone: '081234567890',
          taxRate: 0, serviceCharge: 0, receiptMode: 'thermal', autoPrint: true
        }} catch { return { appName: 'MI AYAM ABUN', instagram: '@miayamabun.id', address: 'Jl. Raya Kuliner No. 1, Kota', phone: '081234567890', taxRate:0, serviceCharge:0, receiptMode:'thermal', autoPrint:true }; }
      });
      const [shift, setShift] = useState(() => {
        try { return JSON.parse(localStorage.getItem('shift')) || { isOpen: false, startTime: null, startCash:0 }; } catch { return { isOpen:false, startTime:null, startCash:0 }; }
      });

      // Save to localStorage on change
      useEffect(() => localStorage.setItem('tx', JSON.stringify(transactions)), [transactions]);
      useEffect(() => localStorage.setItem('hold', JSON.stringify(holdOrders)), [holdOrders]);
      useEffect(() => localStorage.setItem('config', JSON.stringify(storeConfig)), [storeConfig]);
      useEffect(() => localStorage.setItem('shift', JSON.stringify(shift)), [shift]);

      // Cart & order
      const [cart, setCart] = useState([]);
      const [orderInfo, setOrderInfo] = useState({ customerName:'', customerPhone:'', orderType:'Dine In', tableNumber:'' });
      const [discount, setDiscount] = useState({ type:'nominal', value:0 });
      const [isCartOpen, setIsCartOpen] = useState(false);
      const [isCheckoutOpen, setIsCheckoutOpen] = useState(false);
      const [checkoutMethod, setCheckoutMethod] = useState('cash');
      const [cashGiven, setCashGiven] = useState('');
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedCategory, setSelectedCategory] = useState('Semua');
      const [selectedItemForAddon, setSelectedItemForAddon] = useState(null);
      const [selectedAddons, setSelectedAddons] = useState([]);
      const [addonNotes, setAddonNotes] = useState('');
      const [receiptData, setReceiptData] = useState(null);

      const showToast = (msg, type='success') => {
        const id = Date.now();
        setToasts(prev => [...prev, {id, message:msg, type}]);
      };
      const removeToast = (id) => setToasts(prev => prev.filter(t => t.id !== id));

      const handleAddToCart = (item, addons=[], notes='') => {
        const cartItemId = `${item.id}-${addons.map(a=>a.id).join('-')}-${notes}`;
        setCart(prev => {
          const existing = prev.find(c => c.cartItemId === cartItemId);
          if (existing) return prev.map(c => c.cartItemId === cartItemId ? {...c, qty:c.qty+1} : c);
          return [...prev, {...item, cartItemId, addons, notes, qty:1}];
        });
        showToast(`${item.name} ditambahkan`);
        setSelectedItemForAddon(null);
      };

      const updateCartQty = (cartItemId, delta) => {
        setCart(prev => prev.map(i => i.cartItemId===cartItemId ? {...i, qty:i.qty+delta} : i).filter(i => i.qty>0));
      };

      const clearCart = () => {
        setDialog({
          type:'confirm', title:'Kosongkan Keranjang',
          message:'Hapus semua pesanan?',
          onConfirm: () => { setCart([]); setDiscount({type:'nominal',value:0}); setDialog(null); }
        });
      };

      const cartCalculations = useMemo(() => {
        let subtotal = 0;
        cart.forEach(item => {
          let itemPrice = item.price;
          if (item.addons) item.addons.forEach(a => itemPrice += a.price);
          subtotal += itemPrice * item.qty;
        });
        let discountAmount = discount.type==='percent' ? subtotal * (discount.value/100) : discount.value;
        const afterDiscount = subtotal - discountAmount;
        const taxAmount = afterDiscount * (storeConfig.taxRate/100);
        const serviceAmount = afterDiscount * (storeConfig.serviceCharge/100);
        const grandTotal = afterDiscount + taxAmount + serviceAmount;
        const totalItems = cart.reduce((sum,i)=>sum+i.qty,0);
        return { subtotal, discountAmount, taxAmount, serviceAmount, grandTotal, totalItems };
      }, [cart, discount, storeConfig.taxRate, storeConfig.serviceCharge]);

      const saveToHold = () => {
        if (cart.length===0) return;
        const hold = { id:generateId(), time:new Date().toISOString(), cart:[...cart], orderInfo:{...orderInfo}, calculations:cartCalculations };
        setHoldOrders(prev => [hold, ...prev]);
        setCart([]); setOrderInfo({ customerName:'', customerPhone:'', orderType:'Dine In', tableNumber:'' });
        setIsCartOpen(false);
        showToast('Pesanan disimpan (Hold)');
      };

      const resumeHoldOrder = (hold) => {
        setCart(hold.cart); setOrderInfo(hold.orderInfo);
        setHoldOrders(prev => prev.filter(h => h.id !== hold.id));
        setIsCartOpen(true); setActiveTab('pos');
      };

      const handlePrintOrJPG = (trx) => {
        setReceiptData(trx);
        if (storeConfig.receiptMode === 'jpg') {
          showToast('Menyiapkan struk JPG...', 'info');
          setTimeout(async () => {
            try {
              if (!window.html2canvas) {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                document.body.appendChild(script);
                await new Promise(res => script.onload = res);
              }
              const canvas = await window.html2canvas(receiptRef.current, { scale:2, backgroundColor:'#ffffff' });
              const link = document.createElement('a');
              link.download = `Struk-${trx.id}.jpg`;
              link.href = canvas.toDataURL('image/jpeg', 0.9);
              link.click();
              showToast('Struk JPG diunduh');
            } catch { showToast('Gagal membuat JPG', 'error'); }
          }, 500);
        } else {
          setTimeout(() => window.print(), 300);
        }
      };

      const handleShareWA = (trx) => {
        let text = `*INVOICE*\n*${storeConfig.appName}*\n\nNo: ${trx.id}\nTgl: ${new Date(trx.timestamp).toLocaleString('id-ID')}\nPelanggan: ${trx.orderInfo.customerName||'Tamu'}\n--------------------------------\n`;
        trx.cart.forEach(item => {
          let itemTotal = item.price;
          if (item.addons) item.addons.forEach(a => itemTotal += a.price);
          text += `${item.qty}x ${item.name} = ${formatRp(item.qty*itemTotal)}\n`;
        });
        text += `--------------------------------\n`;
        if (trx.calculations.discountAmount) text += `Diskon: -${formatRp(trx.calculations.discountAmount)}\n`;
        if (trx.calculations.taxAmount) text += `PPN: ${formatRp(trx.calculations.taxAmount)}\n`;
        if (trx.calculations.serviceAmount) text += `Layanan: ${formatRp(trx.calculations.serviceAmount)}\n`;
        text += `*TOTAL: ${formatRp(trx.calculations.grandTotal)}*\nPembayaran: ${trx.payment.method.toUpperCase()}\n\nTerima kasih! 😊`;
        const phone = trx.orderInfo.customerPhone || storeConfig.phone;
        window.open(`https://wa.me/${phone.replace(/^0/,'62')}?text=${encodeURIComponent(text)}`, '_blank');
      };

      const exportCSV = (period) => {
        const now = new Date();
        let filtered = transactions;
        if (period==='hari') filtered = transactions.filter(t => new Date(t.timestamp).toDateString()===now.toDateString());
        else if (period==='minggu') {
          const d = new Date(); d.setDate(d.getDate()-7);
          filtered = transactions.filter(t => new Date(t.timestamp) >= d);
        } else {
          const d = new Date(); d.setMonth(d.getMonth()-1);
          filtered = transactions.filter(t => new Date(t.timestamp) >= d);
        }
        if (filtered.length===0) { showToast('Tidak ada data', 'error'); return; }
        let csv = "data:text/csv;charset=utf-8,ID,Waktu,Pelanggan,Tipe,Subtotal,Diskon,Pajak,Layanan,Total,Metode\n";
        filtered.forEach(t => {
          csv += `${t.id},${new Date(t.timestamp).toLocaleString('id-ID').replace(/,/g,'')},${t.orderInfo.customerName||'Tamu'},${t.orderInfo.orderType},${t.calculations.subtotal},${t.calculations.discountAmount},${t.calculations.taxAmount},${t.calculations.serviceAmount},${t.calculations.grandTotal},${t.payment.method}\n`;
        });
        const link = document.createElement('a');
        link.href = encodeURI(csv);
        link.download = `Laporan_${period}.csv`;
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
        showToast('CSV diekspor');
      };

      const processTransaction = (paymentDetails) => {
        const newTrx = {
          id: generateInvoiceNo(),
          timestamp: new Date().toISOString(),
          cart: [...cart],
          orderInfo: {...orderInfo},
          calculations: cartCalculations,
          payment: paymentDetails,
          cashier: 'Admin'
        };
        setTransactions(prev => [newTrx, ...prev]);
        if (storeConfig.autoPrint) handlePrintOrJPG(newTrx);
        setCart([]);
        setOrderInfo({ customerName:'', customerPhone:'', orderType:'Dine In', tableNumber:'' });
        setDiscount({ type:'nominal', value:0 });
        setIsCheckoutOpen(false); setIsCartOpen(false);
        showToast('Transaksi Berhasil!');
      };

      // Render helpers (simplified for brevity)
      const renderDashboard = () => {
        const today = new Date().toDateString();
        const todayTx = transactions.filter(t => new Date(t.timestamp).toDateString()===today);
        const totalSales = todayTx.reduce((s,t)=>s+t.calculations.grandTotal,0);
        const totalOrders = todayTx.length;

        const last7Days = Array.from({length:7}, (_,i) => { const d=new Date(); d.setDate(d.getDate()-(6-i)); return d; });
        const maxSales = Math.max(...last7Days.map(d => transactions.filter(t => new Date(t.timestamp).toDateString()===d.toDateString()).reduce((s,t)=>s+t.calculations.grandTotal,0)), 1);

        return (
          <div className="p-4 space-y-6 pb-24 animate-fade-in overflow-y-auto h-full bg-gray-50">
            <div className="bg-[#9A1C1F] text-white p-6 rounded-3xl shadow-xl relative overflow-hidden">
              <div className="absolute top-0 right-0 p-4 opacity-10"><Icon type="store" size={80}/></div>
              <h2 className="text-sm opacity-80 mb-1">Penjualan Hari Ini</h2>
              <p className="text-3xl font-extrabold mb-4">{formatRp(totalSales)}</p>
              <div className="flex items-center gap-2 text-sm bg-white/10 p-3 rounded-2xl w-max">
                <Icon type="receipt" size={16}/> {totalOrders} Transaksi
              </div>
            </div>
            <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
              <h3 className="font-bold mb-4 flex items-center gap-2"><Icon type="barChart" size={20} className="text-[#9A1C1F]"/> Analisis Penjualan</h3>
              <div className="flex items-end gap-2 h-32 pb-2 border-b border-gray-100">
                {last7Days.map((date,i) => {
                  const dateStr = date.toDateString();
                  const daySales = transactions.filter(t => new Date(t.timestamp).toDateString()===dateStr).reduce((s,t)=>s+t.calculations.grandTotal,0);
                  const height = (daySales/maxSales)*100;
                  return (
                    <div key={i} className="flex-1 flex flex-col items-center justify-end gap-1">
                      <div className="w-full bg-[#9A1C1F] rounded-t-sm" style={{height:`${height}%`, minHeight:4}}></div>
                      <span className="text-[9px] text-gray-500">{date.toLocaleDateString('id-ID',{weekday:'short'})}</span>
                    </div>
                  );
                })}
              </div>
              <div className="mt-4 flex gap-2">
                <button onClick={()=>exportCSV('hari')} className="px-3 py-2 bg-blue-50 text-blue-700 text-xs font-bold rounded-xl">Hari Ini</button>
                <button onClick={()=>exportCSV('minggu')} className="px-3 py-2 bg-blue-50 text-blue-700 text-xs font-bold rounded-xl">Minggu Ini</button>
                <button onClick={()=>exportCSV('bulan')} className="px-3 py-2 bg-blue-50 text-blue-700 text-xs font-bold rounded-xl">Bulan Ini</button>
              </div>
            </div>
            <div className="grid grid-cols-2 gap-4">
              <div className="bg-white p-4 rounded-2xl shadow-sm border">
                <div className="bg-orange-100 w-10 h-10 rounded-xl flex items-center justify-center mb-3"><Icon type="clock" size={20} className="text-orange-600"/></div>
                <p className="text-xs text-gray-500">Status Shift</p>
                <p className="font-bold">{shift.isOpen?'Buka':'Tutup'}</p>
              </div>
              <div className="bg-white p-4 rounded-2xl shadow-sm border">
                <div className="bg-emerald-100 w-10 h-10 rounded-xl flex items-center justify-center mb-3"><Icon type="save" size={20} className="text-emerald-600"/></div>
                <p className="text-xs text-gray-500">Pesanan Ditahan</p>
                <p className="font-bold">{holdOrders.length} Bill</p>
              </div>
            </div>
          </div>
        );
      };

      const renderPOS = () => {
        const categories = ['Semua', ...new Set(MENU_DATABASE.map(i=>i.category))];
        const filtered = MENU_DATABASE.filter(item => 
          item.name.toLowerCase().includes(searchQuery.toLowerCase()) &&
          (selectedCategory==='Semua' || item.category===selectedCategory)
        );
        return (
          <div className="flex flex-col h-full bg-gray-50 animate-fade-in">
            <div className="p-4 bg-white sticky top-0 z-10 shadow-sm border-b">
              <div className="relative mb-3">
                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><Icon type="search" size={20}/></span>
                <input type="text" placeholder="Cari menu..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)}
                  className="w-full bg-gray-100 rounded-xl py-3 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-[#9A1C1F]/20"/>
              </div>
              <div className="flex gap-2 overflow-x-auto scrollbar-hide pb-1">
                {categories.map(cat => (
                  <button key={cat} onClick={()=>setSelectedCategory(cat)}
                    className={`px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap ${selectedCategory===cat?'bg-[#9A1C1F] text-white':'bg-gray-100 text-gray-600'}`}>
                    {cat}
                  </button>
                ))}
              </div>
            </div>
            <div className="flex-1 overflow-y-auto p-4 pb-32 space-y-6">
              {[...new Set(filtered.map(i=>i.category))].map(cat => (
                <section key={cat}>
                  <h2 className="text-base font-extrabold mb-3 flex items-center gap-2"><div className="w-1 h-4 bg-[#9A1C1F] rounded-full"></div>{cat}</h2>
                  <div className="grid grid-cols-2 gap-3">
                    {filtered.filter(i=>i.category===cat).map(item => (
                      <div key={item.id} onClick={()=>{
                        if (item.addons) { setSelectedItemForAddon(item); setSelectedAddons([]); setAddonNotes(''); }
                        else handleAddToCart(item);
                      }} className="bg-white rounded-2xl p-3 shadow-sm border border-gray-200 active:scale-95 transition-all cursor-pointer flex flex-col justify-between min-h-[110px] relative overflow-hidden group hover:border-[#9A1C1F]/50 hover:shadow-md">
                        <div className="absolute -right-4 -top-4 w-16 h-16 bg-gray-50 rounded-full opacity-50 group-hover:bg-[#9A1C1F]/5"></div>
                        <div className="relative z-10">
                          <Icon type={item.icon} size={20} className="text-gray-400 mb-2 group-hover:text-[#9A1C1F]"/>
                          <h3 className="font-bold text-sm leading-tight mb-1">{item.name}</h3>
                        </div>
                        <div className="flex justify-between items-end relative z-10">
                          <p className="text-[#9A1C1F] font-extrabold text-sm">{formatRp(item.price)}</p>
                          <div className="w-6 h-6 rounded-full bg-gray-100 flex items-center justify-center group-hover:bg-[#9A1C1F] group-hover:text-white transition-colors">
                            <Icon type="plus" size={16}/>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </section>
              ))}
            </div>
            {cartCalculations.totalItems > 0 && (
              <div className="fixed bottom-[80px] left-0 right-0 max-w-md mx-auto px-4 z-20">
                <button onClick={()=>setIsCartOpen(true)}
                  className="w-full bg-[#9A1C1F] text-white p-4 rounded-2xl shadow-xl shadow-[#9A1C1F]/30 flex items-center justify-between animate-slide-up">
                  <div className="flex items-center gap-3">
                    <div className="bg-white/20 px-3 py-1.5 rounded-xl font-bold text-sm">{cartCalculations.totalItems} Item</div>
                    <span className="font-medium text-sm">Lihat Keranjang</span>
                  </div>
                  <p className="font-bold text-lg">{formatRp(cartCalculations.grandTotal)}</p>
                </button>
              </div>
            )}
          </div>
        );
      };

      // Bottom navigation
      const NavItem = ({ tab, label, iconType }) => (
        <button onClick={()=>setActiveTab(tab)} className={`flex flex-col items-center justify-center w-16 p-2 rounded-xl transition-all ${activeTab===tab?'text-[#9A1C1F]':'text-gray-400'}`}>
          <div className={`w-10 h-8 rounded-full flex items-center justify-center mb-1 ${activeTab===tab?'bg-[#9A1C1F]/10':''}`}>
            <Icon type={iconType} size={20}/>
          </div>
          <span className="text-[10px] font-bold">{label}</span>
        </button>
      );

      return (
        <>
          <header className="bg-[#9A1C1F] text-white p-4 pt-[max(env(safe-area-inset-top),1rem)] flex justify-between items-center z-10 shrink-0 print:hidden">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center"><Icon type="image" size={20}/></div>
              <div>
                <h1 className="text-lg font-black tracking-wide">{storeConfig.appName}</h1>
                <div className="flex items-center gap-1.5 text-[10px] bg-black/20 px-2 py-0.5 rounded-full mt-0.5">
                  <span className={`w-2 h-2 rounded-full ${shift.isOpen?'bg-green-400':'bg-red-400'}`}></span>
                  {shift.isOpen?'Kasir Aktif':'Kasir Tutup'}
                </div>
              </div>
            </div>
            <button className="p-2 bg-white/10 rounded-full"><Icon type="moreVertical" size={20}/></button>
          </header>

          <main className="flex-1 overflow-hidden relative print:hidden">
            {activeTab==='dashboard' && renderDashboard()}
            {activeTab==='pos' && renderPOS()}
            {/* History & Settings similar but omitted for brevity in this snippet; full code would include them */}
          </main>

          {!isCartOpen && !isCheckoutOpen && (
            <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t flex justify-around px-2 py-2 pb-[max(env(safe-area-inset-bottom),0.5rem)] z-30 print:hidden shadow-[0_-5px_15px_-5px_rgba(0,0,0,0.05)]">
              <NavItem tab="dashboard" label="Home" iconType="home"/>
              <NavItem tab="pos" label="Kasir" iconType="layoutGrid"/>
              <NavItem tab="history" label="Riwayat" iconType="history"/>
              <NavItem tab="settings" label="Setelan" iconType="settings"/>
            </div>
          )}

          <FooterCredit />

          {/* Toasts */}
          {toasts.map(t => <Toast key={t.id} message={t.message} type={t.type} onClose={()=>removeToast(t.id)}/>)}
        </>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
