<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#9A1C1F">
  <title>POS Mi Ayam Abun</title>

  <!-- 1. PWA Manifest (Di-generate dinamis agar tetap 1 file HTML) -->
  <script>
    const manifestJSON = {
      "name": "POS Mi Ayam Abun Pro",
      "short_name": "POS Abun",
      "start_url": window.location.href,
      "display": "standalone",
      "background_color": "#F9F6F0",
      "theme_color": "#9A1C1F",
      "icons": [{
        "src": "https://cdn-icons-png.flaticon.com/512/3081/3081367.png",
        "sizes": "512x512",
        "type": "image/png",
        "purpose": "any maskable"
      }]
    };
    const manifestBlob = new Blob([JSON.stringify(manifestJSON)], {type: 'application/json'});
    document.write('<link rel="manifest" href="' + URL.createObjectURL(manifestBlob) + '">');
  </script>

  <!-- 2. PWA Service Worker (Dengan error handling untuk mode preview) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        try {
          const swCode = "self.addEventListener('install', (e) => { self.skipWaiting(); }); self.addEventListener('activate', (e) => { e.waitUntil(self.clients.claim()); }); self.addEventListener('fetch', (e) => { });";
          const swBlob = new Blob([swCode], { type: 'application/javascript' });
          navigator.serviceWorker.register(URL.createObjectURL(swBlob))
            .then(() => console.log('✅ PWA Service Worker aktif! Aplikasi siap di-install.'))
            .catch((err) => console.warn('⚠️ Mode Preview: Service Worker dilewati (Blob URL tidak didukung di sini).', err));
        } catch (e) {
          console.warn('⚠️ Service Worker gagal dimuat.', e);
        }
      });
    }
  </script>

  <!-- 3. Memuat Tailwind CSS & HTML2Canvas -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <!-- 4. Konfigurasi ES Modules untuk memuat React dan Icon secara On-The-Fly -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#333] m-0 p-0 overflow-x-hidden">
  
  <div id="root"></div>

  <!-- KODE UTAMA REACT (Di-*compile* otomatis oleh Babel di Browser) -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      ShoppingBag, Printer, MessageCircle, Plus, Minus, 
      Trash2, X, Store, CreditCard, Banknote, QrCode, 
      Image as ImageIcon, History, Settings, Home, LayoutGrid, 
      ChevronRight, ArrowLeft, MoreVertical, Edit, Search, 
      CheckCircle, AlertCircle, Clock, Utensils, Coffee,
      Calculator, ChevronDown, Check, Receipt, BarChart3,
      LogOut, Save, FileText, Info, Download, Share2, FileSpreadsheet
    } from 'lucide-react';

    // ============================================================================
    // 1. DATA & KONFIGURASI AWAL (DATABASE MOCK)
    // ============================================================================

    const MENU_DATABASE = [
      { id: 'm1', category: 'Makanan', name: 'Mie Ayam Original', price: 12000, icon: Utensils },
      { id: 'm2', category: 'Makanan', name: 'Tempe Kemul/Pcs', price: 1500, icon: Utensils },
      { id: 'b1', category: 'Minuman', name: 'Ice/Hot Teh Standar', price: 4000, icon: Coffee },
      { id: 'b2', category: 'Minuman', name: 'Ice Teh Jumbo', price: 6000, icon: Coffee },
      { id: 'b3', category: 'Minuman', name: 'Ice/Hot Jeruk', price: 6000, icon: Coffee },
      { id: 'b4', category: 'Minuman', name: 'Ice Bunga Rosella', price: 6000, icon: Coffee },
      { id: 'b5', category: 'Minuman', name: 'Ice Bunga Telang', price: 6000, icon: Coffee },
      { id: 'b6', category: 'Minuman', name: 'Ice Bunga Telang + Nipis', price: 7000, icon: Coffee },
      { id: 'b7', category: 'Minuman', name: 'Ice/Hot Americano', price: 6000, icon: Coffee },
      { id: 'b8', category: 'Minuman', name: 'Ice Lemon Tea', price: 5000, icon: Coffee },
      { id: 'b9', category: 'Minuman', name: 'Kopi Hitam', price: 5000, icon: Coffee },
      { id: 'b10', category: 'Minuman', name: 'Ice/Hot Coffemix', price: 5000, icon: Coffee },
      { id: 'b11', category: 'Minuman', name: 'Ice Teh Tarik', price: 6000, icon: Coffee },
      { id: 'b12', category: 'Minuman', name: 'Ice Good Day Freeze', price: 6000, icon: Coffee },
      { id: 'b13', category: 'Minuman', name: 'Ice/Hot Milo', price: 6000, icon: Coffee },
      { id: 'b14', category: 'Minuman', name: 'Ice/Hot Milo + Kental', price: 7000, icon: Coffee },
    ];

    const ORDER_TYPES = ['Dine In', 'Takeaway', 'Delivery', 'Online (Ojol)'];
    const PAYMENT_METHODS = [
      { id: 'cash', name: 'Tunai', icon: Banknote },
      { id: 'qris', name: 'QRIS', icon: QrCode },
      { id: 'transfer', name: 'Transfer', icon: CreditCard }
    ];

    // ============================================================================
    // 2. UTILITY FUNCTIONS
    // ============================================================================

    const formatRp = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
    const generateId = () => Math.random().toString(36).substr(2, 9);
    const generateInvoiceNo = () => {
      const date = new Date();
      return `INV-${date.getFullYear()}${(date.getMonth()+1).toString().padStart(2,'0')}${date.getDate().toString().padStart(2,'0')}-${Math.floor(Math.random() * 1000).toString().padStart(3,'0')}`;
    };
    const formatDate = (dateString) => {
      const options = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
      return new Date(dateString).toLocaleDateString('id-ID', options);
    };

    // ============================================================================
    // 3. KOMPONEN UI GLOBAL (REUSABLE)
    // ============================================================================

    const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false, icon: Icon }) => {
      const baseStyle = "flex items-center justify-center gap-2 font-bold rounded-xl transition-all active:scale-95 disabled:opacity-50 disabled:active:scale-100";
      const variants = {
        primary: "bg-[#9A1C1F] text-white hover:bg-[#7a1518] shadow-lg shadow-[#9A1C1F]/30 py-3 px-4",
        secondary: "bg-[#9A1C1F]/10 text-[#9A1C1F] hover:bg-[#9A1C1F]/20 py-3 px-4",
        outline: "bg-transparent border-2 border-[#9A1C1F] text-[#9A1C1F] hover:bg-[#9A1C1F]/5 py-2.5 px-4",
        ghost: "bg-transparent text-gray-600 hover:bg-gray-100 py-2 px-3",
        danger: "bg-red-50 text-red-600 hover:bg-red-100 py-3 px-4",
        success: "bg-[#25D366] text-white hover:bg-[#20bd5a] shadow-lg shadow-[#25D366]/30 py-3 px-4"
      };

      return (
        <button onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className}`}>
          {Icon && <Icon className="w-5 h-5" />}
          {children}
        </button>
      );
    };

    const Toast = ({ message, type = 'success', onClose }) => {
      useEffect(() => {
        const timer = setTimeout(onClose, 3000);
        return () => clearTimeout(timer);
      }, [onClose]);

      const bg = type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : type === 'info' ? 'bg-blue-500' : 'bg-gray-800';
      const Icon = type === 'success' ? CheckCircle : type === 'error' ? AlertCircle : Info;

      return (
        <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[100] flex items-center gap-2 px-4 py-3 rounded-full text-white font-medium text-sm shadow-xl transition-all animate-bounce-in whitespace-nowrap ${bg}`}>
          <Icon className="w-4 h-4" />
          {message}
        </div>
      );
    };

    // ============================================================================
    // 4. MAIN APP COMPONENT
    // ============================================================================

    function App() {
      const receiptRef = useRef(null);
      const [activeTab, setActiveTab] = useState('pos');
      const [toasts, setToasts] = useState([]);
      
      const [dialog, setDialog] = useState(null);

      const [shift, setShift] = useState({ isOpen: false, startTime: null, startCash: 0 });
      const [showShiftModal, setShowShiftModal] = useState(false);
      const [shiftCashInput, setShiftCashInput] = useState('');

      const [cart, setCart] = useState([]);
      const [orderInfo, setOrderInfo] = useState({
        customerName: '',
        customerPhone: '',
        orderType: 'Dine In',
        tableNumber: ''
      });
      const [discount, setDiscount] = useState({ type: 'nominal', value: 0 });
      
      const [transactions, setTransactions] = useState([]);
      const [holdOrders, setHoldOrders] = useState([]);

      const [isCartOpen, setIsCartOpen] = useState(false);
      const [selectedItemForAddon, setSelectedItemForAddon] = useState(null);
      const [selectedAddons, setSelectedAddons] = useState([]);
      const [addonNotes, setAddonNotes] = useState('');

      const [isCheckoutOpen, setIsCheckoutOpen] = useState(false);
      const [checkoutMethod, setCheckoutMethod] = useState('cash');
      const [cashGiven, setCashGiven] = useState('');
      
      const [receiptData, setReceiptData] = useState(null);

      const [searchQuery, setSearchQuery] = useState('');
      const [selectedCategory, setSelectedCategory] = useState('Semua');

      const [storeConfig, setStoreConfig] = useState({
        appName: 'MI AYAM ABUN',
        instagram: '@miayamabun.id',
        address: 'Jl. Raya Kuliner No. 1, Kota',
        phone: '081234567890',
        taxRate: 0,
        serviceCharge: 0,
        receiptMode: 'thermal', 
        autoPrint: true
      });

      useEffect(() => {
        document.body.style.overflowX = 'hidden';
        document.body.classList.add('flex', 'justify-center');
      }, []);

      const showToast = (message, type = 'success') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
      };
      const removeToast = (id) => setToasts(prev => prev.filter(t => t.id !== id));

      const handleAddToCart = (item, addons = [], notes = '') => {
        const cartItemId = `${item.id}-${addons.map(a => a.id).join('-')}-${notes}`;
        setCart(prev => {
          const existing = prev.find(c => c.cartItemId === cartItemId);
          if (existing) {
            return prev.map(c => c.cartItemId === cartItemId ? { ...c, qty: c.qty + 1 } : c);
          }
          return [...prev, { ...item, cartItemId, addons, notes, qty: 1 }];
        });
        showToast(`${item.name} ditambahkan`);
        setSelectedItemForAddon(null);
      };

      const updateCartQty = (cartItemId, delta) => {
        setCart(prev => prev.map(item => {
          if (item.cartItemId === cartItemId) {
            return { ...item, qty: item.qty + delta };
          }
          return item;
        }).filter(item => item.qty > 0));
      };

      const clearCart = () => {
        setDialog({
          type: 'confirm',
          title: 'Kosongkan Keranjang',
          message: 'Apakah Anda yakin ingin menghapus semua pesanan?',
          onConfirm: () => {
            setCart([]);
            setDiscount({ type: 'nominal', value: 0 });
            setDialog(null);
          }
        });
      };

      const calculateCart = () => {
        let subtotal = 0;
        cart.forEach(item => {
          let itemPrice = item.price;
          if (item.addons) item.addons.forEach(addon => itemPrice += addon.price);
          subtotal += (itemPrice * item.qty);
        });

        let discountAmount = discount.type === 'percent' ? subtotal * (discount.value / 100) : discount.value;
        const subtotalAfterDiscount = subtotal - discountAmount;
        const taxAmount = subtotalAfterDiscount * (storeConfig.taxRate / 100);
        const serviceAmount = subtotalAfterDiscount * (storeConfig.serviceCharge / 100);
        const grandTotal = subtotalAfterDiscount + taxAmount + serviceAmount;
        const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);

        return { subtotal, discountAmount, taxAmount, serviceAmount, grandTotal, totalItems };
      };

      const cartCalculations = calculateCart();

      const saveToHold = () => {
        if (cart.length === 0) return;
        const holdOrder = {
          id: generateId(),
          time: new Date().toISOString(),
          cart: [...cart],
          orderInfo: { ...orderInfo },
          calculations: cartCalculations
        };
        setHoldOrders(prev => [holdOrder, ...prev]);
        setCart([]);
        setOrderInfo({ customerName: '', customerPhone: '', orderType: 'Dine In', tableNumber: '' });
        setIsCartOpen(false);
        showToast('Pesanan berhasil disimpan (Hold)', 'success');
      };

      const resumeHoldOrder = (holdOrder) => {
        setCart(holdOrder.cart);
        setOrderInfo(holdOrder.orderInfo);
        setHoldOrders(prev => prev.filter(h => h.id !== holdOrder.id));
        setIsCartOpen(true);
        setActiveTab('pos');
      };

      const handlePrintOrJPG = (trx) => {
        setReceiptData(trx);
        if (storeConfig.receiptMode === 'jpg') {
          showToast('Menyiapkan struk JPG...', 'info');
          setTimeout(async () => {
            try {
              if (!window.html2canvas) {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                document.body.appendChild(script);
                await new Promise(res => script.onload = res);
              }
              const canvas = await window.html2canvas(receiptRef.current, { scale: 2, backgroundColor: '#ffffff' });
              const link = document.createElement('a');
              link.download = `Struk-${trx.id}.jpg`;
              link.href = canvas.toDataURL('image/jpeg', 0.9);
              link.click();
              showToast('Struk JPG berhasil diunduh', 'success');
            } catch (err) {
              showToast('Gagal membuat JPG', 'error');
            }
          }, 500);
        } else {
          setTimeout(() => window.print(), 300);
        }
      };

      const handleShareWA = (trx) => {
        let text = `*INVOICE PEMESANAN*\n*${storeConfig.appName}*\n\n`;
        text += `No. Nota: ${trx.id}\n`;
        text += `Tgl: ${new Date(trx.timestamp).toLocaleString('id-ID')}\n`;
        text += `Pelanggan: ${trx.orderInfo.customerName || 'Tamu'}\n`;
        text += `Tipe: ${trx.orderInfo.orderType}\n`;
        text += `--------------------------------\n`;
        
        trx.cart.forEach(item => {
          let itemTotal = item.price;
          if (item.addons) item.addons.forEach(a => itemTotal += a.price);
          text += `${item.qty}x ${item.name} = ${formatRp(item.qty * itemTotal)}\n`;
        });
        
        text += `--------------------------------\n`;
        if (trx.calculations.discountAmount > 0) text += `Diskon: -${formatRp(trx.calculations.discountAmount)}\n`;
        if (trx.calculations.taxAmount > 0) text += `PPN: ${formatRp(trx.calculations.taxAmount)}\n`;
        if (trx.calculations.serviceAmount > 0) text += `Layanan: ${formatRp(trx.calculations.serviceAmount)}\n`;
        text += `*TOTAL TAGIHAN: ${formatRp(trx.calculations.grandTotal)}*\n`;
        text += `Pembayaran: ${trx.payment.method.toUpperCase()}\n\n`;
        text += `Terima kasih atas kunjungannya! 😊`;

        if (storeConfig.receiptMode === 'jpg') {
           text += `\n\n*(Struk format gambar JPG juga dapat Anda unduh/lampirkan jika diperlukan)*`;
        }

        const phone = trx.orderInfo.customerPhone || storeConfig.phone;
        const waLink = `https://wa.me/${phone.replace(/^0/, '62')}?text=${encodeURIComponent(text)}`;
        window.open(waLink, '_blank');
      };

      const exportCSV = (period) => {
        const now = new Date();
        let filtered = transactions;
        if (period === 'hari') {
          filtered = transactions.filter(t => new Date(t.timestamp).toDateString() === now.toDateString());
        } else if (period === 'minggu') {
          const oneWeekAgo = new Date();
          oneWeekAgo.setDate(now.getDate() - 7);
          filtered = transactions.filter(t => new Date(t.timestamp) >= oneWeekAgo);
        } else if (period === 'bulan') {
          const oneMonthAgo = new Date();
          oneMonthAgo.setMonth(now.getMonth() - 1);
          filtered = transactions.filter(t => new Date(t.timestamp) >= oneMonthAgo);
        }

        if (filtered.length === 0) {
          showToast(`Tidak ada data untuk ${period} ini`, 'error');
          return;
        }

        let csvContent = "data:text/csv;charset=utf-8,";
        csvContent += "ID Transaksi,Waktu,Pelanggan,Tipe,Subtotal,Diskon,Pajak,Layanan,Total,Metode Pembayaran\n";

        filtered.forEach(t => {
          const row = [
            t.id,
            new Date(t.timestamp).toLocaleString('id-ID').replace(/,/g, ''),
            t.orderInfo.customerName || 'Tamu',
            t.orderInfo.orderType,
            t.calculations.subtotal,
            t.calculations.discountAmount,
            t.calculations.taxAmount,
            t.calculations.serviceAmount,
            t.calculations.grandTotal,
            t.payment.method
          ];
          csvContent += row.join(",") + "\n";
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `Laporan_Penjualan_${period}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast(`Berhasil ekspor CSV`, 'success');
      };

      const processTransaction = (paymentDetails) => {
        const newTransaction = {
          id: generateInvoiceNo(),
          timestamp: new Date().toISOString(),
          cart: [...cart],
          orderInfo: { ...orderInfo },
          calculations: cartCalculations,
          payment: paymentDetails,
          cashier: 'Admin'
        };

        setTransactions(prev => [newTransaction, ...prev]);
        
        if (storeConfig.autoPrint) {
           handlePrintOrJPG(newTransaction);
        }

        setCart([]);
        setOrderInfo({ customerName: '', customerPhone: '', orderType: 'Dine In', tableNumber: '' });
        setDiscount({ type: 'nominal', value: 0 });
        setIsCheckoutOpen(false);
        setIsCartOpen(false);
        showToast('Transaksi Berhasil!', 'success');
      };

      // ========================== RENDERS ========================== //

      const renderDashboard = () => {
        const today = new Date().toDateString();
        const todayTransactions = transactions.filter(t => new Date(t.timestamp).toDateString() === today);
        const totalSales = todayTransactions.reduce((sum, t) => sum + t.calculations.grandTotal, 0);
        const totalOrders = todayTransactions.length;

        const getLast7Days = () => {
           const days = [];
           for(let i=6; i>=0; i--) {
              const d = new Date();
              d.setDate(d.getDate() - i);
              days.push(d);
           }
           return days;
        };

        const maxSales7D = Math.max(...getLast7Days().map(d => transactions.filter(t => new Date(t.timestamp).toDateString() === d.toDateString()).reduce((sum, t) => sum + t.calculations.grandTotal, 0)), 1);

        return (
          <div className="p-4 space-y-6 pb-24 animate-fade-in overflow-y-auto h-full">
            <div className="bg-[#9A1C1F] text-white p-6 rounded-3xl shadow-xl relative overflow-hidden">
              <div className="absolute top-0 right-0 p-4 opacity-10"><Store className="w-32 h-32" /></div>
              <h2 className="text-sm font-medium opacity-80 mb-1">Penjualan Hari Ini</h2>
              <p className="text-3xl font-extrabold tracking-tight mb-4">{formatRp(totalSales)}</p>
              <div className="flex items-center gap-4 text-sm bg-white/10 p-3 rounded-2xl backdrop-blur-sm w-max border border-white/20">
                <div className="flex items-center gap-2"><Receipt className="w-4 h-4" /> {totalOrders} Transaksi</div>
              </div>
            </div>

            <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
               <h3 className="font-bold text-gray-800 mb-4 flex items-center gap-2"><BarChart3 className="w-5 h-5 text-[#9A1C1F]" /> Analisis Penjualan</h3>
               <div className="flex items-end gap-2 h-32 mt-4 pb-2 border-b border-gray-100">
                 {getLast7Days().map((date, idx) => {
                    const dateStr = date.toDateString();
                    const daySales = transactions.filter(t => new Date(t.timestamp).toDateString() === dateStr).reduce((sum, t) => sum + t.calculations.grandTotal, 0);
                    const height = (daySales / maxSales7D) * 100;
                    return (
                       <div key={idx} className="flex-1 flex flex-col items-center justify-end gap-1 group">
                          <div className="w-full bg-[#9A1C1F] rounded-t-sm transition-all group-hover:opacity-80" style={{height: `${height}%`, minHeight: '4px'}}></div>
                          <span className="text-[9px] text-gray-500 font-medium">{date.toLocaleDateString('id-ID', {weekday:'short'})}</span>
                       </div>
                    )
                 })}
               </div>

               <div className="mt-4">
                  <p className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Ekspor Laporan (CSV/Excel)</p>
                  <div className="flex gap-2 overflow-x-auto scrollbar-hide pb-2">
                     <button onClick={() => exportCSV('hari')} className="px-3 py-2 bg-blue-50 text-blue-700 text-xs font-bold rounded-xl whitespace-nowrap flex items-center gap-1 border border-blue-100"><FileSpreadsheet className="w-3 h-3" /> Hari Ini</button>
                     <button onClick={() => exportCSV('minggu')} className="px-3 py-2 bg-blue-50 text-blue-700 text-xs font-bold rounded-xl whitespace-nowrap flex items-center gap-1 border border-blue-100"><FileSpreadsheet className="w-3 h-3" /> Minggu Ini</button>
                     <button onClick={() => exportCSV('bulan')} className="px-3 py-2 bg-blue-50 text-blue-700 text-xs font-bold rounded-xl whitespace-nowrap flex items-center gap-1 border border-blue-100"><FileSpreadsheet className="w-3 h-3" /> Bulan Ini</button>
                  </div>
               </div>
            </div>

            <div className="grid grid-cols-2 gap-4">
              <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                <div className="bg-orange-100 w-10 h-10 rounded-xl flex items-center justify-center text-orange-600 mb-3"><Clock className="w-5 h-5" /></div>
                <p className="text-xs text-gray-500 font-medium">Status Shift</p>
                <p className="font-bold text-gray-800">{shift.isOpen ? 'Buka' : 'Tutup'}</p>
                {!shift.isOpen && <Button variant="outline" className="mt-3 text-xs py-1.5 px-2" onClick={() => { setShowShiftModal(true); setShiftCashInput(''); }}>Buka Shift</Button>}
              </div>
              <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                 <div className="bg-emerald-100 w-10 h-10 rounded-xl flex items-center justify-center text-emerald-600 mb-3"><Save className="w-5 h-5" /></div>
                <p className="text-xs text-gray-500 font-medium">Pesanan Ditahan</p>
                <p className="font-bold text-gray-800">{holdOrders.length} Bill</p>
                 {holdOrders.length > 0 && <Button variant="secondary" className="mt-3 text-xs py-1.5 px-2" onClick={() => setActiveTab('history')}>Lihat</Button>}
              </div>
            </div>

            <div className="mt-8 text-center pb-4">
              <div className="inline-flex items-center justify-center gap-1.5 px-4 py-2 rounded-full bg-red-50 border border-red-100 shadow-sm transition-all hover:scale-105 cursor-default">

                     <div className="flex justify-between text-gray-600"><span>Subtotal</span><span>{formatRp(cartCalculations.subtotal)}</span></div>
                     <div className="flex justify-between items-center text-gray-600">
                       <span className="flex items-center gap-1 cursor-pointer text-blue-600 hover:underline" onClick={() => {
                         setDialog({ type: 'prompt', title: 'Potongan Harga', placeholder: 'Diskon (Rp)', inputValue: discount.value > 0 ? discount.value.toString() : '', onConfirm: (val) => { setDiscount({ type: 'nominal', value: Number(val) || 0 }); setDialog(null); } });
                       }}>Diskon (Rp) <Edit className="w-3 h-3" /></span>
                       <span className="text-red-500">- {formatRp(cartCalculations.discountAmount)}</span>
                     </div>
                     {storeConfig.taxRate > 0 && <div className="flex justify-between text-gray-600"><span>PPN ({storeConfig.taxRate}%)</span><span>{formatRp(cartCalculations.taxAmount)}</span></div>}
                     {storeConfig.serviceCharge > 0 && <div className="flex justify-between text-gray-600"><span>Layanan ({storeConfig.serviceCharge}%)</span><span>{formatRp(cartCalculations.serviceAmount)}</span></div>}
                     <div className="border-t border-dashed border-gray-300 pt-3 mt-3 flex justify-between items-center"><span className="font-bold text-gray-800">TOTAL TAGIHAN</span><span className="text-2xl font-black text-[#9A1C1F]">{formatRp(cartCalculations.grandTotal)}</span></div>
                   </div>
                </section>
              )}
            </div>

            <div className="fixed bottom-0 left-0 right-0 sm:max-w-md sm:mx-auto bg-white p-4 border-t border-gray-200 shadow-[0_-10px_20px_-5px_rgba(0,0,0,0.1)] pb-[max(env(safe-area-inset-bottom),1rem)] flex gap-3 z-20">
               <Button variant="secondary" className="flex-1" onClick={saveToHold} disabled={cart.length === 0}><Save className="w-5 h-5" /> Simpan</Button>
               <Button variant="primary" className="flex-[2]" onClick={() => { setIsCheckoutOpen(true); setCheckoutMethod('cash'); setCashGiven(''); }} disabled={cart.length === 0}>Bayar Sekarang</Button>
            </div>
          </div>
        );
      };

      const renderCheckout = () => {
        if (!isCheckoutOpen) return null;
        const handleNumpad = (val) => {
          if (val === 'C') setCashGiven(''); else if (val === '000') setCashGiven(prev => prev ? prev + '000' : prev); else setCashGiven(prev => prev + val);
        };
        const amountToPay = cartCalculations.grandTotal;
        const change = Number(cashGiven) - amountToPay;
        const isReadyToPay = checkoutMethod !== 'cash' || (checkoutMethod === 'cash' && Number(cashGiven) >= amountToPay);

        return (
          <div className="fixed inset-0 z-50 flex flex-col bg-gray-50 sm:max-w-md sm:mx-auto animate-slide-up print:hidden">
            <div className="bg-white px-4 py-4 flex items-center gap-3 border-b shadow-sm pt-[max(env(safe-area-inset-top),1rem)]"><button onClick={() => setIsCheckoutOpen(false)} className="p-2 -ml-2 text-gray-600"><ArrowLeft className="w-6 h-6" /></button><h2 className="font-bold text-lg text-gray-800">Pembayaran</h2></div>
            <div className="flex-1 overflow-y-auto">
              <div className="bg-[#9A1C1F] text-white p-6 text-center shadow-inner"><p className="text-sm opacity-80 mb-1">Total Tagihan</p><p className="text-4xl font-black tracking-tight">{formatRp(amountToPay)}</p></div>
              <div className="p-4 bg-white border-b border-gray-100">
                <label className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3 block">Metode Pembayaran</label>
                <div className="grid grid-cols-3 gap-3">
                  {PAYMENT_METHODS.map(m => (
                    <button key={m.id} onClick={() => { setCheckoutMethod(m.id); setCashGiven(''); }} className={`py-3 rounded-xl border-2 flex flex-col items-center gap-2 transition-all ${checkoutMethod === m.id ? 'border-[#9A1C1F] bg-[#9A1C1F]/10 text-[#9A1C1F]' : 'border-gray-100 text-gray-500 bg-gray-50'}`}>
                      <m.icon className="w-6 h-6" /><span className="text-xs font-bold">{m.name}</span>
                    </button>
                  ))}
                </div>
              </div>

              {checkoutMethod === 'cash' && (
                <div className="p-4 bg-white space-y-4">
                  <div className="bg-gray-50 border border-gray-200 rounded-2xl p-4 text-right"><p className="text-xs font-bold text-gray-400 mb-1">Uang Diterima</p><p className={`text-2xl font-bold ${cashGiven ? 'text-gray-800' : 'text-gray-300'}`}>{cashGiven ? formatRp(Number(cashGiven)) : 'Rp 0'}</p></div>
                  {Number(cashGiven) > 0 && <div className={`p-4 rounded-xl flex justify-between items-center border ${change >= 0 ? 'bg-green-50 border-green-200 text-green-700' : 'bg-red-50 border-red-200 text-red-700'}`}><span className="font-bold text-sm">Kembalian</span><span className="font-black text-lg">{change >= 0 ? formatRp(change) : 'Kurang ' + formatRp(Math.abs(change))}</span></div>}
                  <div className="flex gap-2 overflow-x-auto pb-1 scrollbar-hide">
                    <button onClick={() => setCashGiven(amountToPay.toString())} className="px-4 py-2 bg-blue-50 text-blue-700 font-bold text-sm rounded-xl border border-blue-200 whitespace-nowrap active:scale-95">Uang Pas</button>
                    <button onClick={() => setCashGiven('50000')} className="px-4 py-2 bg-gray-100 text-gray-700 font-bold text-sm rounded-xl border border-gray-200 active:scale-95">50K</button>
                    <button onClick={() => setCashGiven('100000')} className="px-4 py-2 bg-gray-100 text-gray-700 font-bold text-sm rounded-xl border border-gray-200 active:scale-95">100K</button>
                  </div>
                  <div className="grid grid-cols-3 gap-2 mt-4">
                    {['1','2','3','4','5','6','7','8','9','C','0','000'].map(key => <button key={key} onClick={() => handleNumpad(key)} className={`py-4 text-xl font-bold rounded-2xl active:scale-95 transition-transform ${key === 'C' ? 'bg-red-100 text-red-600' : 'bg-gray-100 text-gray-800'}`}>{key}</button>)}
                  </div>
                </div>
              )}
              
              {checkoutMethod !== 'cash' && (
                 <div className="p-8 text-center bg-white h-full flex flex-col justify-center">
                    <div className="w-32 h-32 bg-gray-100 rounded-2xl mx-auto flex items-center justify-center border-2 border-dashed border-gray-300 mb-4"><QrCode className="w-12 h-12 text-gray-400" /></div>
                    <p className="text-gray-500 text-sm">Pastikan pelanggan telah mentransfer dana sebesar <b>{formatRp(amountToPay)}</b> sebelum memproses transaksi.</p>
                 </div>
              )}
            </div>

            <div className="p-4 bg-white border-t border-gray-200 pb-[max(env(safe-area-inset-bottom),1rem)]">
              <Button variant="primary" className="w-full text-lg py-4 shadow-[#9A1C1F]/40" disabled={!isReadyToPay} onClick={() => processTransaction({ method: checkoutMethod, cashGiven: checkoutMethod === 'cash' ? Number(cashGiven) : amountToPay, change: checkoutMethod === 'cash' ? change : 0 })}>
                Selesaikan Transaksi
              </Button>
            </div>
          </div>
        );
      };

      const renderBottomNav = () => {
        const navItems = [
          { id: 'dashboard', label: 'Home', icon: Home },
          { id: 'pos', label: 'Kasir', icon: LayoutGrid },
          { id: 'history', label: 'Riwayat', icon: History },
          { id: 'settings', label: 'Setelan', icon: Settings }
        ];

        return (
          <div className="fixed bottom-0 left-0 right-0 sm:max-w-md sm:mx-auto bg-white border-t border-gray-200 flex justify-around px-2 py-2 pb-[max(env(safe-area-inset-bottom),0.5rem)] z-30 print:hidden shadow-[0_-5px_15px_-5px_rgba(0,0,0,0.05)]">
            {navItems.map(item => {
              const isActive = activeTab === item.id;
              return (
                <button key={item.id} onClick={() => setActiveTab(item.id)} className={`flex flex-col items-center justify-center w-16 p-2 rounded-xl transition-all ${isActive ? 'text-[#9A1C1F]' : 'text-gray-400 hover:text-gray-600'}`}>
                  <div className={`relative flex items-center justify-center w-10 h-8 rounded-full mb-1 transition-all ${isActive ? 'bg-[#9A1C1F]/10' : 'bg-transparent'} `}>
                     <item.icon className={`w-5 h-5 ${isActive ? 'fill-current opacity-20 absolute' : 'hidden'}`} />
                     <item.icon className={`w-5 h-5 relative z-10 ${isActive ? 'stroke-[2.5]' : 'stroke-2'}`} />
                  </div>
                  <span className={`text-[10px] font-bold ${isActive ? 'text-[#9A1C1F]' : ''}`}>{item.label}</span>
                </button>
              )
            })}
          </div>
        );
      };
      
      const renderReceiptElement = () => {
        if (!receiptData) return null;
        const { id, timestamp, cart, orderInfo, calculations, payment, cashier } = receiptData;

        return (
          <>
            <div className="absolute top-[-9999px] left-[-9999px] z-[-9999] print:hidden">
              <div ref={receiptRef} className="w-[300px] bg-white text-black font-mono text-[12px] leading-tight p-5">
                <div className="text-center mb-3">
                  <h1 className="text-base font-extrabold mb-1">{storeConfig.appName}</h1>
                  <p>{storeConfig.address}</p>
                  <p>{storeConfig.instagram}</p>
                  <div className="border-b border-black border-dashed my-2"></div>
                </div>
                <table className="w-full mb-2">
                  <tbody>
                    <tr><td className="w-14">Tgl</td><td>: {new Date(timestamp).toLocaleString('id-ID', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'})}</td></tr>
                    <tr><td>No</td><td>: {id}</td></tr>
                    <tr><td>Pelanggan</td><td>: {orderInfo.customerName || '-'}</td></tr>
                  </tbody>
                </table>
                <div className="border-b border-black border-dashed mb-2"></div>
                <div className="w-full mb-2">
                  {cart.map(item => {
                     let itemTotal = item.price;
                     if (item.addons) item.addons.forEach(a => itemTotal += a.price);
                     return (
                       <div key={item.cartItemId} className="mb-1">
                         <div className="flex justify-between font-bold"><span>{item.name}</span></div>
                         {item.addons && item.addons.length > 0 && <div className="pl-2 text-[10px]">{item.addons.map(a => <div key={a.id}>+ {a.name}</div>)}</div>}
                         <div className="flex justify-between pl-2"><span>{item.qty} x {itemTotal.toLocaleString('id-ID')}</span><span>{(item.qty * itemTotal).toLocaleString('id-ID')}</span></div>
                       </div>
                     );
                  })}
                </div>
                <div className="border-b border-black border-dashed mb-1"></div>
                <table className="w-full mb-2">
                  <tbody>
                    <tr><td>Subtotal</td><td className="text-right">{calculations.subtotal.toLocaleString('id-ID')}</td></tr>
                    {calculations.discountAmount > 0 && <tr><td>Diskon</td><td className="text-right">-{calculations.discountAmount.toLocaleString('id-ID')}</td></tr>}
                    {calculations.taxAmount > 0 && <tr><td>PPN</td><td className="text-right">{calculations.taxAmount.toLocaleString('id-ID')}</td></tr>}
                    {calculations.serviceAmount > 0 && <tr><td>Layanan</td><td className="text-right">{calculations.serviceAmount.toLocaleString('id-ID')}</td></tr>}
                    <tr className="font-extrabold text-[14px]"><td className="pt-1">TOTAL</td><td className="text-right pt-1">{calculations.grandTotal.toLocaleString('id-ID')}</td></tr>
                    <tr><td colSpan="2"><div className="border-b border-black border-dashed my-1"></div></td></tr>
                    <tr><td>{payment.method.toUpperCase()}</td><td className="text-right">{payment.cashGiven.toLocaleString('id-ID')}</td></tr>
                    <tr><td>KEMBALI</td><td className="text-right">{payment.change.toLocaleString('id-ID')}</td></tr>
                  </tbody>
                </table>
                <div className="text-center mt-4"><p>Terima Kasih</p><p>Selamat Menikmati</p></div>
              </div>
            </div>

            <div className="hidden print:block w-full max-w-[58mm] mx-auto text-black bg-white font-mono text-[11px] leading-tight p-0 m-0">
                <div className="text-center mb-3">
                  <h1 className="text-base font-extrabold mb-1">{storeConfig.appName}</h1>
                  <p>{storeConfig.address}</p>
                  <p>{storeConfig.instagram}</p>
                  <div className="border-b border-black border-dashed my-2"></div>
                </div>
                <table className="w-full mb-2">
                  <tbody>
                    <tr><td className="w-14">Tgl</td><td>: {new Date(timestamp).toLocaleString('id-ID', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'})}</td></tr>
                    <tr><td>No</td><td>: {id}</td></tr>
                    <tr><td>Pelanggan</td><td>: {orderInfo.customerName || '-'}</td></tr>
                  </tbody>
                </table>
                <div className="border-b border-black border-dashed mb-2"></div>
                <div className="w-full mb-2">
                  {cart.map(item => {
                     let itemTotal = item.price;
                     if (item.addons) item.addons.forEach(a => itemTotal += a.price);
                     return (
                       <div key={item.cartItemId} className="mb-1">
                         <div className="flex justify-between font-bold"><span>{item.name}</span></div>
                         {item.addons && item.addons.length > 0 && <div className="pl-2 text-[10px]">{item.addons.map(a => <div key={a.id}>+ {a.name}</div>)}</div>}
                         <div className="flex justify-between pl-2"><span>{item.qty} x {itemTotal.toLocaleString('id-ID')}</span><span>{(item.qty * itemTotal).toLocaleString('id-ID')}</span></div>
                       </div>
                     );
                  })}
                </div>
                <div className="border-b border-black border-dashed mb-1"></div>
                <table className="w-full mb-2">
                  <tbody>
                    <tr><td>Subtotal</td><td className="text-right">{calculations.subtotal.toLocaleString('id-ID')}</td></tr>
                    {calculations.discountAmount > 0 && <tr><td>Diskon</td><td className="text-right">-{calculations.discountAmount.toLocaleString('id-ID')}</td></tr>}
                    {calculations.taxAmount > 0 && <tr><td>PPN</td><td className="text-right">{calculations.taxAmount.toLocaleString('id-ID')}</td></tr>}
                    {calculations.serviceAmount > 0 && <tr><td>Layanan</td><td className="text-right">{calculations.serviceAmount.toLocaleString('id-ID')}</td></tr>}
                    <tr className="font-extrabold text-[12px]"><td className="pt-1">TOTAL</td><td className="text-right pt-1">{calculations.grandTotal.toLocaleString('id-ID')}</td></tr>
                    <tr><td colSpan="2"><div className="border-b border-black border-dashed my-1"></div></td></tr>
                    <tr><td>{payment.method.toUpperCase()}</td><td className="text-right">{payment.cashGiven.toLocaleString('id-ID')}</td></tr>
                    <tr><td>KEMBALI</td><td className="text-right">{payment.change.toLocaleString('id-ID')}</td></tr>
                  </tbody>
                </table>
                <div className="text-center mt-4"><p>Terima Kasih</p></div>
            </div>
          </>
        );
      };

      return (
        <div className="w-full min-h-screen relative flex justify-center overflow-hidden font-sans text-gray-800">
          <div className="w-full sm:max-w-md bg-white min-h-screen relative shadow-2xl flex flex-col overflow-hidden">
            <header className="bg-[#9A1C1F] text-[#F9F6F0] p-4 pt-[max(env(safe-area-inset-top),1rem)] flex justify-between items-center z-10 shrink-0 print:hidden relative overflow-hidden">
              <div className="absolute inset-0 opacity-10" style={{ backgroundImage: 'radial-gradient(circle at 2px 2px, white 1px, transparent 0)', backgroundSize: '16px 16px' }}></div>
              <div className="flex items-center gap-3 relative z-10">
                <div className="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center backdrop-blur-md border border-white/30 shadow-inner">
                  <ImageIcon className="text-white w-5 h-5" />
                </div>
                <div>
                  <h1 className="text-lg font-black tracking-wide leading-tight">{storeConfig.appName}</h1>
                  <div className="flex items-center gap-1.5 text-[10px] bg-black/20 w-max px-2 py-0.5 rounded-full mt-0.5 shadow-sm">
                    <span className={`w-2 h-2 rounded-full ${shift.isOpen ? 'bg-green-400' : 'bg-red-400'}`}></span>
                    {shift.isOpen ? 'Kasir Aktif' : 'Kasir Tutup'}
                  </div>
                </div>
              </div>
              <button className="p-2 bg-white/10 rounded-full hover:bg-white/20 active:scale-95 transition-colors relative z-10"><MoreVertical className="w-5 h-5" /></button>
            </header>

            <main className="flex-1 overflow-hidden relative print:hidden">
              {activeTab === 'dashboard' && renderDashboard()}
              {activeTab === 'pos' && renderPOS()}
              {activeTab === 'history' && renderHistory()}
              {activeTab === 'settings' && renderSettings()}
            </main>

            {!isCartOpen && !isCheckoutOpen && renderBottomNav()}
            
            {renderAddonModal()}
            {renderCart()}
            {renderCheckout()}
            {renderDialog()}

            {toasts.map(toast => <Toast key={toast.id} message={toast.message} type={toast.type} onClose={() => removeToast(toast.id)} />)}
          </div>
          {renderReceiptElement()}
          <style dangerouslySetInnerHTML={{__html: `
            @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
            @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
            @keyframes bounceIn { 0% { transform: scale(0.9) translateX(-50%); opacity: 0; } 50% { transform: scale(1.05) translateX(-50%); } 100% { transform: scale(1) translateX(-50%); opacity: 1; } }
            @keyframes shine { to { background-position: 200% center; } }
            .animate-shine {
              background: linear-gradient(to right, #9A1C1F 20%, #ff7e5f 40%, #ff7e5f 60%, #9A1C1F 80%);
              background-size: 200% auto;
              -webkit-background-clip: text;
              -webkit-text-fill-color: transparent;
              animation: shine 3s linear infinite;
            }
            .scrollbar-hide::-webkit-scrollbar { display: none; }
            .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
            @media print { body { background: white !important; display: block !important; margin: 0; padding: 0; } html { width: 58mm; } }
          `}} />
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
