<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Mi Ayam Abun - Kasir Digital</title>
  <!-- Favicon (ganti dengan gambar sendiri jika perlu) -->
  <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍜</text></svg>">
  <!-- React & Babel dari CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- SheetJS untuk export Excel -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <style>
    /* Reset & Font */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
      background: #f3f4f6; 
      display: flex; 
      justify-content: center; 
    }
    #root { 
      width: 100%; 
      max-width: 480px; 
      min-height: 100vh; 
      background: white; 
      box-shadow: 0 0 40px rgba(0,0,0,0.1); 
      position: relative; 
      overflow: hidden;
    }
    /* Animasi Global */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes bounceIn { 
      0% { transform: scale(0.9) translateX(-50%); opacity: 0; } 
      50% { transform: scale(1.05) translateX(-50%); } 
      100% { transform: scale(1) translateX(-50%); opacity: 1; } 
    }
    @keyframes pulseSoft { 
      0%, 100% { opacity: 0.8; transform: scale(1); } 
      50% { opacity: 1; transform: scale(1.02); } 
    }
    @keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes cartBounce { 
      0% { transform: scale(1); } 
      50% { transform: scale(1.2); } 
      100% { transform: scale(1); } 
    }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-bounce-in { animation: bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; left: 50%; }
    .animate-pulse-soft { animation: pulseSoft 2s infinite; }
    .animate-spin-slow { animation: spinSlow 4s linear infinite; }
    .animate-cart-bounce { animation: cartBounce 0.3s ease; }
    /* Scrollbar hide */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    /* Utility */
    .transition-all { transition: all 0.2s ease; }
    .hover-scale:hover { transform: scale(1.02); }
    .active-scale:active { transform: scale(0.95); }
    @media print { 
      body { background: white !important; } 
      .no-print { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    // -------------------------------------------------------------------
    // 1. ICON KOMPONEN SEDERHANA (EMOJI + SVG UNTUK LOGO STRUK)
    // -------------------------------------------------------------------
    const Icon = ({ type, size = 20, className = "" }) => {
      const icons = {
        plus: "➕", minus: "➖", trash: "🗑️", x: "✖️",
        store: "🏪", creditCard: "💳", banknote: "💵", qrCode: "📱",
        image: "🖼️", history: "📋", settings: "⚙️", home: "🏠",
        layoutGrid: "📦", search: "🔍", checkCircle: "✅",
        alertCircle: "⚠️", clock: "🕒", utensils: "🍜",
        coffee: "☕", calculator: "🧮", receipt: "🧾",
        barChart: "📊", save: "💾", download: "⬇️", share: "📤",
        messageCircle: "💬", printer: "🖨️", edit: "✏️",
        moreVertical: "⋮", arrowLeft: "⬅️", chevronRight: "›",
        heart: "❤️", star: "⭐", sun: "☀️", moon: "🌙",
        backup: "📂", restore: "📥", excel: "📈", info: "ℹ️"
      };
      return <span className={className} style={{ fontSize: size, lineHeight: 1 }}>{icons[type] || "•"}</span>;
    };

    // Logo vektor hitam putih untuk struk
    const LogoVector = () => (
      <svg viewBox="0 0 100 100" width="50" height="50" fill="none" stroke="black" strokeWidth="5">
        <ellipse cx="50" cy="50" rx="45" ry="30" />
        <path d="M10,50 Q50,20 90,50" />
        <line x1="30" y1="60" x2="70" y2="60" />
        <line x1="35" y1="70" x2="65" y2="70" />
      </svg>
    );

    // -------------------------------------------------------------------
    // 2. DATA KONFIGURASI
    // -------------------------------------------------------------------
    const MENU_DATABASE = [
      { id: 'm1', category: 'Makanan', name: 'Mie Ayam Original', price: 12000, icon: 'utensils' },
      { id: 'm2', category: 'Makanan', name: 'Tempe Kemul/Pcs', price: 1500, icon: 'utensils' },
      { id: 'b1', category: 'Minuman', name: 'Ice/Hot Teh Standar', price: 4000, icon: 'coffee' },
      { id: 'b2', category: 'Minuman', name: 'Ice Teh Jumbo', price: 6000, icon: 'coffee' },
      { id: 'b3', category: 'Minuman', name: 'Ice/Hot Jeruk', price: 6000, icon: 'coffee' },
      { id: 'b4', category: 'Minuman', name: 'Ice Bunga Rosella', price: 6000, icon: 'coffee' },
      { id: 'b5', category: 'Minuman', name: 'Ice Bunga Telang', price: 6000, icon: 'coffee' },
      { id: 'b6', category: 'Minuman', name: 'Ice Bunga Telang + Nipis', price: 7000, icon: 'coffee' },
      { id: 'b7', category: 'Minuman', name: 'Ice/Hot Americano', price: 6000, icon: 'coffee' },
      { id: 'b8', category: 'Minuman', name: 'Ice Lemon Tea', price: 5000, icon: 'coffee' },
      { id: 'b9', category: 'Minuman', name: 'Kopi Hitam', price: 5000, icon: 'coffee' },
      { id: 'b10', category: 'Minuman', name: 'Ice/Hot Coffemix', price: 5000, icon: 'coffee' },
      { id: 'b11', category: 'Minuman', name: 'Ice Teh Tarik', price: 6000, icon: 'coffee' },
      { id: 'b12', category: 'Minuman', name: 'Ice Good Day Freeze', price: 6000, icon: 'coffee' },
      { id: 'b13', category: 'Minuman', name: 'Ice/Hot Milo', price: 6000, icon: 'coffee' },
      { id: 'b14', category: 'Minuman', name: 'Ice/Hot Milo + Kental', price: 7000, icon: 'coffee' },
    ];

    const ORDER_TYPES = ['Dine In', 'Takeaway', 'Delivery', 'Online (Ojol)'];
    const PAYMENT_METHODS = [
      { id: 'cash', name: 'Tunai', icon: 'banknote' },
      { id: 'qris', name: 'QRIS', icon: 'qrCode' },
      { id: 'transfer', name: 'Transfer', icon: 'creditCard' }
    ];

    // -------------------------------------------------------------------
    // 3. UTILITY FUNCTIONS
    // -------------------------------------------------------------------
    const formatRp = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
    const generateId = () => Math.random().toString(36).substr(2, 9);
    const generateInvoiceNo = () => {
      const now = new Date();
      return `INV-${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2,'0')}${now.getDate().toString().padStart(2,'0')}-${Math.floor(Math.random()*1000).toString().padStart(3,'0')}`;
    };
    const formatDate = (dateString) => new Date(dateString).toLocaleDateString('id-ID', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });

    // -------------------------------------------------------------------
    // 4. KOMPONEN UI
    // -------------------------------------------------------------------
    const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false, iconType }) => {
      const base = "flex items-center justify-center gap-2 font-bold rounded-xl transition-all active:scale-95 disabled:opacity-50 disabled:active:scale-100 hover:brightness-105";
      const vars = {
        primary: "bg-[#9A1C1F] text-white hover:bg-[#7a1518] shadow-lg shadow-[#9A1C1F]/30 py-3 px-4",
        secondary: "bg-[#9A1C1F]/10 text-[#9A1C1F] hover:bg-[#9A1C1F]/20 py-3 px-4",
        outline: "bg-transparent border-2 border-[#9A1C1F] text-[#9A1C1F] hover:bg-[#9A1C1F]/5 py-2.5 px-4",
        ghost: "bg-transparent text-gray-600 hover:bg-gray-100 py-2 px-3",
        danger: "bg-red-50 text-red-600 hover:bg-red-100 py-3 px-4",
        success: "bg-[#25D366] text-white hover:bg-[#20bd5a] shadow-lg shadow-[#25D366]/30 py-3 px-4",
        warning: "bg-amber-50 text-amber-700 hover:bg-amber-100 py-2 px-3",
      };
      return (
        <button onClick={onClick} disabled={disabled} className={`${base} ${vars[variant]} ${className}`}>
          {iconType && <Icon type={iconType} size={20} />}
          {children}
        </button>
      );
    };

    const Toast = ({ message, type = 'success', onClose }) => {
      useEffect(() => {
        const t = setTimeout(onClose, 3000);
        return () => clearTimeout(t);
      }, [onClose]);
      const bg = type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : type === 'info' ? 'bg-blue-500' : 'bg-gray-800';
      const icon = type === 'success' ? 'checkCircle' : type === 'error' ? 'alertCircle' : 'info';
      return (
        <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[100] flex items-center gap-2 px-4 py-3 rounded-full text-white font-medium text-sm shadow-xl animate-bounce-in whitespace-nowrap ${bg}`}>
          <Icon type={icon} size={16} />
          {message}
        </div>
      );
    };

    // -------------------------------------------------------------------
    // 5. FOOTER KREDIT
    // -------------------------------------------------------------------
    const FooterCredit = () => (
      <div className="fixed bottom-[72px] left-0 right-0 flex justify-center z-20 pointer-events-none px-4 no-print">
        <div className="bg-white/80 backdrop-blur-md px-4 py-1.5 rounded-full shadow-lg border border-gray-200/60 animate-pulse-soft select-none">
          <p className="text-xs font-medium text-gray-500 flex items-center gap-1.5">
            <Icon type="heart" size={12} className="text-red-400" />
            Dibuat oleh <span className="font-extrabold text-[#9A1C1F]">Dhiya'Ulhag Zulfa Zain</span>
            <Icon type="star" size={12} className="text-yellow-500 animate-spin-slow" />
          </p>
        </div>
      </div>
    );

    // -------------------------------------------------------------------
    // 6. APLIKASI UTAMA
    // -------------------------------------------------------------------
    const App = () => {
      const receiptRef = useRef(null);
      const fileInputRef = useRef(null);

      // State utama dengan localStorage
      const [transactions, setTransactions] = useState(() => {
        try { return JSON.parse(localStorage.getItem('tx')) || []; } catch { return []; }
      });
      const [holdOrders, setHoldOrders] = useState(() => {
        try { return JSON.parse(localStorage.getItem('hold')) || []; } catch { return []; }
      });
      const [storeConfig, setStoreConfig] = useState(() => {
        try { return JSON.parse(localStorage.getItem('config')) || {
          appName: 'MI AYAM ABUN', instagram: '@miayamabun.id',
          address: 'Jl. Raya Kuliner No. 1, Kota', phone: '081234567890',
          taxRate: 0, serviceCharge: 0, receiptMode: 'thermal', autoPrint: true
        }} catch { return { appName: 'MI AYAM ABUN', instagram: '@miayamabun.id', address: 'Jl. Raya Kuliner No. 1, Kota', phone: '081234567890', taxRate:0, serviceCharge:0, receiptMode:'thermal', autoPrint:true }; }
      });
      const [shift, setShift] = useState(() => {
        try { return JSON.parse(localStorage.getItem('shift')) || { isOpen: false, startTime: null, startCash:0 }; } catch { return { isOpen:false, startTime:null, startCash:0 }; }
      });

      // Simpan ke localStorage
      useEffect(() => localStorage.setItem('tx', JSON.stringify(transactions)), [transactions]);
      useEffect(() => localStorage.setItem('hold', JSON.stringify(holdOrders)), [holdOrders]);
      useEffect(() => localStorage.setItem('config', JSON.stringify(storeConfig)), [storeConfig]);
      useEffect(() => localStorage.setItem('shift', JSON.stringify(shift)), [shift]);

      // UI state
      const [activeTab, setActiveTab] = useState('dashboard');
      const [toasts, setToasts] = useState([]);
      const [dialog, setDialog] = useState(null);
      const [cart, setCart] = useState([]);
      const [orderInfo, setOrderInfo] = useState({ customerName:'', customerPhone:'', orderType:'Dine In', tableNumber:'' });
      const [discount, setDiscount] = useState({ type:'nominal', value:0 });
      const [isCartOpen, setIsCartOpen] = useState(false);
      const [isCheckoutOpen, setIsCheckoutOpen] = useState(false);
      const [checkoutMethod, setCheckoutMethod] = useState('cash');
      const [cashGiven, setCashGiven] = useState('');
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedCategory, setSelectedCategory] = useState('Semua');
      const [selectedItemForAddon, setSelectedItemForAddon] = useState(null);
      const [selectedAddons, setSelectedAddons] = useState([]);
      const [addonNotes, setAddonNotes] = useState('');
      const [receiptData, setReceiptData] = useState(null);
      const [cartBounce, setCartBounce] = useState(false); // untuk animasi keranjang

      // Toast
      const showToast = useCallback((msg, type='success') => {
        const id = Date.now();
        setToasts(prev => [...prev, {id, message:msg, type}]);
      }, []);
      const removeToast = useCallback((id) => setToasts(prev => prev.filter(t => t.id !== id)), []);

      // Cart logic
      const handleAddToCart = (item, addons=[], notes='') => {
        const cartItemId = `${item.id}-${addons.map(a=>a.id).join('-')}-${notes}`;
        setCart(prev => {
          const existing = prev.find(c => c.cartItemId === cartItemId);
          if (existing) return prev.map(c => c.cartItemId === cartItemId ? {...c, qty:c.qty+1} : c);
          return [...prev, {...item, cartItemId, addons, notes, qty:1}];
        });
        setCartBounce(true);
        setTimeout(() => setCartBounce(false), 300);
        showToast(`${item.name} ditambahkan`);
        setSelectedItemForAddon(null);
      };

      const updateCartQty = (cartItemId, delta) => {
        setCart(prev => prev.map(i => i.cartItemId===cartItemId ? {...i, qty:i.qty+delta} : i).filter(i => i.qty>0));
      };

      const clearCart = () => {
        setDialog({
          type:'confirm', title:'Kosongkan Keranjang', message:'Hapus semua pesanan?',
          onConfirm: () => { setCart([]); setDiscount({type:'nominal',value:0}); setDialog(null); }
        });
      };

      // Perhitungan keranjang
      const cartCalculations = useMemo(() => {
        let subtotal = 0;
        cart.forEach(item => {
          let itemPrice = item.price;
          if (item.addons) item.addons.forEach(a => itemPrice += a.price);
          subtotal += itemPrice * item.qty;
        });
        let discountAmount = discount.type==='percent' ? subtotal * (discount.value/100) : discount.value;
        const afterDiscount = subtotal - discountAmount;
        const taxAmount = afterDiscount * (storeConfig.taxRate/100);
        const serviceAmount = afterDiscount * (storeConfig.serviceCharge/100);
        const grandTotal = afterDiscount + taxAmount + serviceAmount;
        const totalItems = cart.reduce((sum,i)=>sum+i.qty,0);
        return { subtotal, discountAmount, taxAmount, serviceAmount, grandTotal, totalItems };
      }, [cart, discount, storeConfig.taxRate, storeConfig.serviceCharge]);

      // Hold & Resume
      const saveToHold = () => {
        if (cart.length===0) return;
        const hold = { id:generateId(), time:new Date().toISOString(), cart:[...cart], orderInfo:{...orderInfo}, calculations:cartCalculations };
        setHoldOrders(prev => [hold, ...prev]);
        setCart([]); setOrderInfo({ customerName:'', customerPhone:'', orderType:'Dine In', tableNumber:'' });
        setIsCartOpen(false); showToast('Pesanan disimpan (Hold)');
      };

      const resumeHoldOrder = (hold) => {
        setCart(hold.cart); setOrderInfo(hold.orderInfo);
        setHoldOrders(prev => prev.filter(h => h.id !== hold.id));
        setIsCartOpen(true); setActiveTab('pos');
      };

      // Proses transaksi
      const processTransaction = (paymentDetails) => {
        const newTrx = {
          id: generateInvoiceNo(),
          timestamp: new Date().toISOString(),
          cart: [...cart],
          orderInfo: {...orderInfo},
          calculations: cartCalculations,
          payment: paymentDetails,
          cashier: 'Admin'
        };
        setTransactions(prev => [newTrx, ...prev]);
        if (storeConfig.autoPrint) handlePrintOrJPG(newTrx);
        setCart([]); setOrderInfo({ customerName:'', customerPhone:'', orderType:'Dine In', tableNumber:'' });
        setDiscount({ type:'nominal', value:0 });
        setIsCheckoutOpen(false); setIsCartOpen(false);
        showToast('Transaksi Berhasil!');
      };

      // Print / JPG / WA
      const handlePrintOrJPG = (trx) => {
        setReceiptData(trx);
        if (storeConfig.receiptMode === 'jpg') {
          showToast('Menyiapkan struk JPG...', 'info');
          setTimeout(async () => {
            try {
              if (!window.html2canvas) {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                document.body.appendChild(script);
                await new Promise(res => script.onload = res);
              }
              const canvas = await window.html2canvas(receiptRef.current, { scale:2, backgroundColor:'#ffffff' });
              const link = document.createElement('a');
              link.download = `Struk-${trx.id}.jpg`;
              link.href = canvas.toDataURL('image/jpeg', 0.9);
              link.click();
              showToast('Struk JPG diunduh');
            } catch { showToast('Gagal membuat JPG', 'error'); }
          }, 500);
        } else {
          setTimeout(() => window.print(), 300);
        }
      };

      const handleShareWA = (trx) => {
        let text = `*INVOICE*\n*${storeConfig.appName}*\n\nNo: ${trx.id}\nTgl: ${new Date(trx.timestamp).toLocaleString('id-ID')}\nPelanggan: ${trx.orderInfo.customerName||'Tamu'}\n--------------------------------\n`;
        trx.cart.forEach(item => {
          let itemTotal = item.price;
          if (item.addons) item.addons.forEach(a => itemTotal += a.price);
          text += `${item.qty}x ${item.name} = ${formatRp(item.qty*itemTotal)}\n`;
        });
        text += `--------------------------------\n`;
        if (trx.calculations.discountAmount) text += `Diskon: -${formatRp(trx.calculations.discountAmount)}\n`;
        if (trx.calculations.taxAmount) text += `PPN: ${formatRp(trx.calculations.taxAmount)}\n`;
        if (trx.calculations.serviceAmount) text += `Layanan: ${formatRp(trx.calculations.serviceAmount)}\n`;
        text += `*TOTAL: ${formatRp(trx.calculations.grandTotal)}*\nPembayaran: ${trx.payment.method.toUpperCase()}\n\nTerima kasih! 😊`;
        const phone = trx.orderInfo.customerPhone || storeConfig.phone;
        window.open(`https://wa.me/${phone.replace(/^0/,'62')}?text=${encodeURIComponent(text)}`, '_blank');
      };

      // Export Excel (XLSX)
      const exportExcel = (period) => {
        const now = new Date();
        let filtered = transactions;
        if (period === 'hari') {
          filtered = transactions.filter(t => new Date(t.timestamp).toDateString() === now.toDateString());
        } else if (period === 'minggu') {
          const d = new Date(); d.setDate(d.getDate()-7);
          filtered = transactions.filter(t => new Date(t.timestamp) >= d);
        } else if (period === 'bulan') {
          const d = new Date(); d.setMonth(d.getMonth()-1);
          filtered = transactions.filter(t => new Date(t.timestamp) >= d);
        }
        if (filtered.length === 0) { showToast('Tidak ada data', 'error'); return; }

        const data = [['ID', 'Waktu', 'Pelanggan', 'Tipe', 'Subtotal', 'Diskon', 'Pajak', 'Layanan', 'Total', 'Metode']];
        filtered.forEach(t => {
          data.push([
            t.id,
            new Date(t.timestamp).toLocaleString('id-ID'),
            t.orderInfo.customerName || 'Tamu',
            t.orderInfo.orderType,
            t.calculations.subtotal,
            t.calculations.discountAmount,
            t.calculations.taxAmount,
            t.calculations.serviceAmount,
            t.calculations.grandTotal,
            t.payment.method
          ]);
        });
        const ws = XLSX.utils.aoa_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Penjualan");
        XLSX.writeFile(wb, `Laporan_Penjualan_${period}.xlsx`);
        showToast('Excel diekspor', 'success');
      };

      // Backup & Restore
      const handleBackup = () => {
        const backup = { transactions, holdOrders, storeConfig, shift };
        const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `backup_kasir_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('Data backup diunduh', 'success');
      };

      const handleRestore = (file) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = JSON.parse(e.target.result);
            if (data.transactions) setTransactions(data.transactions);
            if (data.holdOrders) setHoldOrders(data.holdOrders);
            if (data.storeConfig) setStoreConfig(data.storeConfig);
            if (data.shift) setShift(data.shift);
            showToast('Data berhasil dipulihkan!', 'success');
          } catch { showToast('File tidak valid', 'error'); }
        };
        reader.readAsText(file);
      };

      // -------------------------------------------------------------------
      // RENDER LAYAR
      // -------------------------------------------------------------------
      const renderDashboard = () => {
        const today = new Date().toDateString();
        const todayTx = transactions.filter(t => new Date(t.timestamp).toDateString() === today);
        const totalSales = todayTx.reduce((s,t) => s + t.calculations.grandTotal, 0);
        const totalOrders = todayTx.length;
        const avgTransaction = totalOrders ? totalSales / totalOrders : 0;

        // Item terlaris
        const itemCount = {};
        todayTx.forEach(tx => tx.cart.forEach(item => {
          const key = item.name;
          itemCount[key] = (itemCount[key] || 0) + item.qty;
        }));
        const topItems = Object.entries(itemCount).sort((a,b) => b[1]-a[1]).slice(0,5);

        // Metode pembayaran
        const methodCount = { cash:0, qris:0, transfer:0 };
        todayTx.forEach(tx => { if (methodCount[tx.payment.method] !== undefined) methodCount[tx.payment.method]++; });
        const popularMethod = Object.entries(methodCount).sort((a,b)=>b[1]-a[1])[0]?.[0] || '-';

        // Grafik 7 hari
        const last7Days = Array.from({length:7}, (_,i) => { const d=new Date(); d.setDate(d.getDate()-(6-i)); return d; });
        const salesPerDay = last7Days.map(date => {
          const ds = date.toDateString();
          return transactions.filter(t => new Date(t.timestamp).toDateString()===ds).reduce((s,t)=>s+t.calculations.grandTotal,0);
        });
        const maxSales = Math.max(...salesPerDay, 1);

        return (
          <div className="p-4 space-y-4 pb-24 animate-fade-in overflow-y-auto h-full bg-gray-50">
            {/* Header */}
            <div className="bg-[#9A1C1F] text-white p-5 rounded-3xl shadow-xl relative overflow-hidden">
              <div className="absolute top-0 right-0 p-4 opacity-10"><Icon type="store" size={80}/></div>
              <h2 className="text-sm opacity-80 mb-1">Ringkasan Hari Ini</h2>
              <p className="text-3xl font-extrabold mb-2">{formatRp(totalSales)}</p>
              <div className="flex gap-3 text-xs">
                <span className="bg-white/20 px-3 py-1 rounded-full"><Icon type="receipt" size={14}/> {totalOrders} Transaksi</span>
                <span className="bg-white/20 px-3 py-1 rounded-full">Rata² {formatRp(avgTransaction)}</span>
              </div>
            </div>

            {/* Statistik Cepat */}
            <div className="grid grid-cols-3 gap-3">
              <div className="bg-white p-3 rounded-2xl shadow-sm border text-center">
                <div className="text-2xl font-extrabold text-[#9A1C1F]">{totalOrders}</div>
                <div className="text-[10px] text-gray-500">Transaksi</div>
              </div>
              <div className="bg-white p-3 rounded-2xl shadow-sm border text-center">
                <div className="text-2xl font-extrabold text-amber-600">{topItems.length}</div>
                <div className="text-[10px] text-gray-500">Item Unik</div>
              </div>
              <div className="bg-white p-3 rounded-2xl shadow-sm border text-center">
                <div className="text-2xl font-extrabold text-green-600">{popularMethod.toUpperCase()}</div>
                <div className="text-[10px] text-gray-500">Pembayaran Populer</div>
              </div>
            </div>

            {/* Grafik Penjualan 7 Hari */}
            <div className="bg-white p-4 rounded-2xl shadow-sm border">
              <h3 className="font-bold text-sm mb-3 flex items-center gap-2"><Icon type="barChart" size={18}/> Penjualan 7 Hari</h3>
              <div className="flex items-end gap-1 h-24 pb-1 border-b border-gray-100">
                {salesPerDay.map((val, i) => {
                  const height = (val / maxSales) * 100;
                  return (
                    <div key={i} className="flex-1 flex flex-col items-center justify-end gap-1">
                      <div className="w-full bg-[#9A1C1F] rounded-t-sm transition-all hover:opacity-80" style={{height: `${height}%`, minHeight:4}}></div>
                      <span className="text-[8px] text-gray-400">{last7Days[i].toLocaleDateString('id-ID',{weekday:'short'})}</span>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Item Terlaris */}
            <div className="bg-white p-4 rounded-2xl shadow-sm border">
              <h3 className="font-bold text-sm mb-2 flex items-center gap-2"><Icon type="coffee" size={18}/> Item Terlaris Hari Ini</h3>
              {topItems.length === 0 ? <p className="text-xs text-gray-400">Belum ada transaksi</p> : (
                <div className="space-y-2">
                  {topItems.map(([name, qty], idx) => (
                    <div key={name} className="flex items-center justify-between text-sm">
                      <span className="flex items-center gap-2">
                        <span className="w-5 h-5 rounded-full bg-[#9A1C1F]/10 text-[#9A1C1F] text-[10px] flex items-center justify-center font-bold">{idx+1}</span>
                        {name}
                      </span>
                      <span className="font-bold">{qty}x</span>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Export & Backup */}
            <div className="flex flex-wrap gap-2">
              <button onClick={()=>exportExcel('hari')} className="px-3 py-2 bg-green-50 text-green-700 text-xs font-bold rounded-xl flex items-center gap-1"><Icon type="excel" size={14}/> Excel Hari Ini</button>
              <button onClick={()=>exportExcel('minggu')} className="px-3 py-2 bg-green-50 text-green-700 text-xs font-bold rounded-xl"><Icon type="excel" size={14}/> Excel Mingguan</button>
              <button onClick={()=>exportExcel('bulan')} className="px-3 py-2 bg-green-50 text-green-700 text-xs font-bold rounded-xl"><Icon type="excel" size={14}/> Excel Bulanan</button>
            </div>
          </div>
        );
      };

      const renderPOS = () => {
        const categories = ['Semua', ...new Set(MENU_DATABASE.map(i=>i.category))];
        const filteredMenu = MENU_DATABASE.filter(item => 
          item.name.toLowerCase().includes(searchQuery.toLowerCase()) &&
          (selectedCategory==='Semua' || item.category===selectedCategory)
        );
        return (
          <div className="flex flex-col h-full bg-gray-50 animate-fade-in">
            <div className="p-4 bg-white sticky top-0 z-10 shadow-sm border-b pt-[max(env(safe-area-inset-top),1rem)]">
              <div className="relative mb-3">
                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><Icon type="search" size={18}/></span>
                <input type="text" placeholder="Cari menu..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)}
                  className="w-full bg-gray-100 rounded-xl py-3 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-[#9A1C1F]/20"/>
              </div>
              <div className="flex gap-2 overflow-x-auto scrollbar-hide">
                {categories.map(cat => (
                  <button key={cat} onClick={()=>setSelectedCategory(cat)}
                    className={`px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-all ${selectedCategory===cat?'bg-[#9A1C1F] text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                    {cat}
                  </button>
                ))}
              </div>
            </div>
            <div className="flex-1 overflow-y-auto p-4 pb-32 space-y-6">
              {[...new Set(filteredMenu.map(i=>i.category))].map(cat => {
                const items = filteredMenu.filter(i=>i.category===cat);
                if (items.length===0) return null;
                return (
                  <section key={cat}>
                    <h2 className="text-base font-extrabold mb-3 flex items-center gap-2"><div className="w-1 h-4 bg-[#9A1C1F] rounded-full"/> {cat}</h2>
                    <div className="grid grid-cols-2 gap-3">
                      {items.map(item => (
                        <div key={item.id} onClick={()=>{
                          if (item.addons) { setSelectedItemForAddon(item); setSelectedAddons([]); setAddonNotes(''); }
                          else handleAddToCart(item);
                        }} className="bg-white rounded-2xl p-3 shadow-sm border border-gray-200 active:scale-95 hover:scale-[1.02] transition-all cursor-pointer flex flex-col justify-between min-h-[110px] relative overflow-hidden group">
                          <div className="absolute -right-4 -top-4 w-16 h-16 bg-gray-50 rounded-full opacity-50 group-hover:bg-[#9A1C1F]/5 transition-all"/>
                          <div className="relative z-10">
                            <Icon type={item.icon} size={20} className="text-gray-400 mb-2 group-hover:text-[#9A1C1F] transition-colors"/>
                            <h3 className="font-bold text-sm leading-tight mb-1">{item.name}</h3>
                          </div>
                          <div className="flex justify-between items-end relative z-10">
                            <p className="text-[#9A1C1F] font-extrabold text-sm">{formatRp(item.price)}</p>
                            <div className="w-6 h-6 rounded-full bg-gray-100 flex items-center justify-center group-hover:bg-[#9A1C1F] group-hover:text-white transition-all">
                              <Icon type="plus" size={16}/>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </section>
                );
              })}
            </div>
            {/* Floating cart button */}
            {cartCalculations.totalItems > 0 && (
              <div className={`fixed bottom-[80px] left-0 right-0 max-w-md mx-auto px-4 z-20 ${cartBounce ? 'animate-cart-bounce' : ''}`}>
                <button onClick={()=>setIsCartOpen(true)}
                  className="w-full bg-[#9A1C1F] text-white p-4 rounded-2xl shadow-xl shadow-[#9A1C1F]/30 flex items-center justify-between animate-slide-up hover:brightness-110 transition-all">
                  <div className="flex items-center gap-3">
                    <div className="bg-white/20 px-3 py-1.5 rounded-xl font-bold text-sm">{cartCalculations.totalItems} Item</div>
                    <span className="font-medium text-sm">Lihat Keranjang</span>
                  </div>
                  <p className="font-bold text-lg">{formatRp(cartCalculations.grandTotal)}</p>
                </button>
              </div>
            )}
          </div>
        );
      };

      // History & Hold
      const renderHistory = () => (
        <div className="p-4 pb-24 space-y-4 animate-fade-in overflow-y-auto h-full bg-gray-50">
          <h2 className="text-xl font-bold">Riwayat & Hold</h2>
          {holdOrders.length > 0 && (
            <div>
              <h3 className="font-bold text-sm text-[#9A1C1F] mb-2 flex items-center gap-2"><Icon type="clock" size={16}/> Pesanan Ditahan</h3>
              <div className="space-y-2">
                {holdOrders.map(order => (
                  <div key={order.id} className="bg-white p-3 rounded-2xl shadow-sm border border-orange-200">
                    <div className="flex justify-between items-start mb-1">
                      <div>
                        <p className="font-bold text-sm">{order.orderInfo.customerName||'Tamu'} - Meja {order.orderInfo.tableNumber||'-'}</p>
                        <p className="text-[10px] text-gray-400">{formatDate(order.time)}</p>
                      </div>
                      <span className="bg-orange-100 text-orange-700 px-2 py-0.5 rounded text-[10px] font-bold">HOLD</span>
                    </div>
                    <p className="text-sm font-semibold text-[#9A1C1F] mb-2">{formatRp(order.calculations.grandTotal)}</p>
                    <Button onClick={()=>resumeHoldOrder(order)} variant="outline" className="w-full text-xs py-1.5">Lanjutkan</Button>
                  </div>
                ))}
              </div>
            </div>
          )}
          <div>
            <h3 className="font-bold text-sm text-gray-500 mb-2">Transaksi Selesai</h3>
            {transactions.length===0 ? <p className="text-xs text-gray-400">Belum ada transaksi</p> : (
              <div className="space-y-2">
                {transactions.slice(0, 20).map(trx => (
                  <div key={trx.id} className="bg-white p-3 rounded-2xl shadow-sm border">
                    <div className="flex justify-between items-start">
                      <div>
                        <p className="font-bold text-xs text-gray-400">{trx.id}</p>
                        <p className="font-bold text-sm">{trx.orderInfo.customerName||'Tamu'}</p>
                      </div>
                      <p className="font-extrabold text-[#9A1C1F]">{formatRp(trx.calculations.grandTotal)}</p>
                    </div>
                    <div className="flex justify-between items-center text-[10px] text-gray-500 mt-1">
                      <span>{formatDate(trx.timestamp)}</span>
                      <span className="uppercase bg-gray-100 px-2 py-0.5 rounded font-semibold">{trx.payment.method}</span>
                    </div>
                    <div className="flex gap-2 mt-2">
                      <Button variant="secondary" className="text-xs py-1 flex-1" onClick={()=>handlePrintOrJPG(trx)}><Icon type="download" size={12}/> Cetak</Button>
                      <Button variant="success" className="text-xs py-1 flex-1" onClick={()=>handleShareWA(trx)}><Icon type="share" size={12}/> WA</Button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );

      // Settings
      const renderSettings = () => (
        <div className="p-4 pb-24 space-y-4 animate-fade-in overflow-y-auto h-full bg-gray-50">
          <h2 className="text-xl font-bold">Pengaturan</h2>
          <div className="bg-white rounded-2xl p-4 shadow-sm border space-y-3">
            <div><label className="text-xs font-bold text-gray-500">Nama Usaha</label>
              <input value={storeConfig.appName} onChange={e=>setStoreConfig({...storeConfig, appName:e.target.value})} className="w-full border rounded-xl px-3 py-2 text-sm"/></div>
            <div><label className="text-xs font-bold text-gray-500">Alamat</label>
              <textarea value={storeConfig.address} onChange={e=>setStoreConfig({...storeConfig, address:e.target.value})} className="w-full border rounded-xl px-3 py-2 text-sm h-16"/></div>
            <div className="grid grid-cols-2 gap-3">
              <div><label className="text-xs font-bold text-gray-500">Pajak (%)</label>
                <input type="number" value={storeConfig.taxRate} onChange={e=>setStoreConfig({...storeConfig, taxRate:Number(e.target.value)})} className="w-full border rounded-xl px-3 py-2 text-sm"/></div>
              <div><label className="text-xs font-bold text-gray-500">Service (%)</label>
                <input type="number" value={storeConfig.serviceCharge} onChange={e=>setStoreConfig({...storeConfig, serviceCharge:Number(e.target.value)})} className="w-full border rounded-xl px-3 py-2 text-sm"/></div>
            </div>
            <div className="flex items-center justify-between">
              <span className="text-xs font-bold">Auto Cetak Struk</span>
              <div onClick={()=>setStoreConfig({...storeConfig, autoPrint:!storeConfig.autoPrint})} className={`w-10 h-6 rounded-full relative cursor-pointer transition-colors ${storeConfig.autoPrint?'bg-[#9A1C1F]':'bg-gray-300'}`}>
                <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-all ${storeConfig.autoPrint?'right-1':'left-1'}`}></div>
              </div>
            </div>
          </div>
          {/* Backup & Restore */}
          <div className="bg-white rounded-2xl p-4 shadow-sm border space-y-3">
            <h3 className="font-bold text-sm flex items-center gap-2"><Icon type="backup" size={16}/> Backup & Restore</h3>
            <p className="text-xs text-gray-500">Simpan semua data (transaksi, hold, konfigurasi) ke file, atau pulihkan dari file.</p>
            <div className="flex gap-2">
              <Button variant="secondary" className="text-xs" iconType="download" onClick={handleBackup}>Backup Data</Button>
              <Button variant="warning" className="text-xs" iconType="restore" onClick={()=>fileInputRef.current.click()}>Restore Data</Button>
              <input type="file" ref={fileInputRef} className="hidden" accept=".json" onChange={e=> { if (e.target.files[0]) handleRestore(e.target.files[0]); e.target.value=''; }}/>
            </div>
          </div>
        </div>
      );

      // Bottom Nav
      const NavItem = ({ tab, label, iconType }) => (
        <button onClick={()=>setActiveTab(tab)} className={`flex flex-col items-center justify-center w-16 p-2 rounded-xl transition-all active:scale-90 ${activeTab===tab?'text-[#9A1C1F]':'text-gray-400 hover:text-gray-600'}`}>
          <div className={`w-10 h-8 rounded-full flex items-center justify-center mb-1 transition-colors ${activeTab===tab?'bg-[#9A1C1F]/10':''}`}>
            <Icon type={iconType} size={20}/>
          </div>
          <span className="text-[10px] font-bold">{label}</span>
        </button>
      );

      // ================= RECEIPT COMPONENT =================
      const ReceiptContent = ({ data }) => {
        if (!data) return null;
        const { id, timestamp, cart, orderInfo, calculations, payment } = data;
        return (
          <div ref={receiptRef} className="w-[300px] bg-white text-black font-mono text-[12px] leading-tight p-5" style={{fontFamily: 'monospace'}}>
            <div className="text-center mb-3">
              <LogoVector />
              <h1 className="text-base font-extrabold mt-1">{storeConfig.appName}</h1>
              <p>{storeConfig.address}</p>
              <p>{storeConfig.instagram}</p>
              <div className="border-b border-black border-dashed my-2"></div>
            </div>
            <table className="w-full mb-2">
              <tbody>
                <tr><td className="w-14">Tgl</td><td>: {new Date(timestamp).toLocaleString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}</td></tr>
                <tr><td>No</td><td>: {id}</td></tr>
                <tr><td>Pelanggan</td><td>: {orderInfo.customerName||'-'}</td></tr>
              </tbody>
            </table>
            <div className="border-b border-black border-dashed mb-2"></div>
            <div className="w-full mb-2">
              {cart.map(item => {
                let itemTotal = item.price;
                if (item.addons) item.addons.forEach(a => itemTotal += a.price);
                return (
                  <div key={item.cartItemId} className="mb-1">
                    <div className="flex justify-between font-bold"><span>{item.name}</span></div>
                    {item.addons && item.addons.map(a => <div key={a.id} className="pl-2 text-[10px]">+ {a.name}</div>)}
                    <div className="flex justify-between pl-2"><span>{item.qty} x {itemTotal.toLocaleString('id-ID')}</span><span>{(item.qty*itemTotal).toLocaleString('id-ID')}</span></div>
                  </div>
                );
              })}
            </div>
            <div className="border-b border-black border-dashed mb-1"></div>
            <table className="w-full mb-2">
              <tbody>
                <tr><td>Subtotal</td><td className="text-right">{calculations.subtotal.toLocaleString('id-ID')}</td></tr>
                {calculations.discountAmount > 0 && <tr><td>Diskon</td><td className="text-right">-{calculations.discountAmount.toLocaleString('id-ID')}</td></tr>}
                {calculations.taxAmount > 0 && <tr><td>PPN</td><td className="text-right">{calculations.taxAmount.toLocaleString('id-ID')}</td></tr>}
                {calculations.serviceAmount > 0 && <tr><td>Layanan</td><td className="text-right">{calculations.serviceAmount.toLocaleString('id-ID')}</td></tr>}
                <tr className="font-extrabold text-[14px]"><td className="pt-1">TOTAL</td><td className="text-right pt-1">{calculations.grandTotal.toLocaleString('id-ID')}</td></tr>
                <tr><td colSpan="2"><div className="border-b border-black border-dashed my-1"></div></td></tr>
                <tr><td>{payment.method.toUpperCase()}</td><td className="text-right">{payment.cashGiven.toLocaleString('id-ID')}</td></tr>
                <tr><td>KEMBALI</td><td className="text-right">{payment.change.toLocaleString('id-ID')}</td></tr>
              </tbody>
            </table>
            <div className="text-center mt-4"><p>Terima Kasih</p><p>Selamat Menikmati</p></div>
          </div>
        );
      };

      return (
        <>
          {/* Layout utama */}
          <header className="bg-[#9A1C1F] text-white p-4 pt-[max(env(safe-area-inset-top),1rem)] flex justify-between items-center z-10 shrink-0 no-print">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center"><Icon type="image" size={20}/></div>
              <div>
                <h1 className="text-lg font-black tracking-wide">{storeConfig.appName}</h1>
                <div className="flex items-center gap-1.5 text-[10px] bg-black/20 px-2 py-0.5 rounded-full mt-0.5">
                  <span className={`w-2 h-2 rounded-full ${shift.isOpen?'bg-green-400':'bg-red-400'}`}></span>
                  {shift.isOpen?'Kasir Aktif':'Kasir Tutup'}
                </div>
              </div>
            </div>
          </header>

          <main className="flex-1 overflow-hidden relative">
            {activeTab==='dashboard' && renderDashboard()}
            {activeTab==='pos' && renderPOS()}
            {activeTab==='history' && renderHistory()}
            {activeTab==='settings' && renderSettings()}
          </main>

          {!isCartOpen && !isCheckoutOpen && (
            <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t flex justify-around px-2 py-2 pb-[max(env(safe-area-inset-bottom),0.5rem)] z-30 no-print shadow-[0_-5px_15px_-5px_rgba(0,0,0,0.05)]">
              <NavItem tab="dashboard" label="Home" iconType="home"/>
              <NavItem tab="pos" label="Kasir" iconType="layoutGrid"/>
              <NavItem tab="history" label="Riwayat" iconType="history"/>
              <NavItem tab="settings" label="Setelan" iconType="settings"/>
            </div>
          )}

          <FooterCredit />

          {/* Receipt JPG/Print */}
          <div className="absolute top-[-9999px] left-[-9999px] z-[-9999] no-print">
            <ReceiptContent data={receiptData} />
          </div>
          <div className="hidden print:block w-full max-w-[58mm] mx-auto text-black bg-white font-mono text-[11px] leading-tight p-0 m-0">
            <ReceiptContent data={receiptData} />
          </div>

          {/* Toasts */}
          {toasts.map(t => <Toast key={t.id} message={t.message} type={t.type} onClose={()=>removeToast(t.id)}/>)}

          {/* Dialog */}
          {dialog && (
            <div className="fixed inset-0 z-70 flex items-center justify-center bg-black/60 backdrop-blur-sm px-4 animate-fade-in">
              <div className="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl animate-slide-up">
                <h3 className="text-xl font-bold mb-2">{dialog.title}</h3>
                {dialog.message && <p className="text-sm text-gray-600 mb-5">{dialog.message}</p>}
                {dialog.type==='prompt' && <input type="number" value={dialog.inputValue||''} onChange={e=>setDialog({...dialog, inputValue:e.target.value})} placeholder={dialog.placeholder} className="w-full border rounded-xl px-4 py-3 text-lg font-bold text-center mb-5" autoFocus/>}
                <div className="flex gap-3">
                  <Button variant="ghost" onClick={()=>setDialog(null)} className="flex-1 bg-gray-100">Batal</Button>
                  <Button variant="primary" onClick={()=>dialog.onConfirm(dialog.inputValue)} className="flex-1">Konfirmasi</Button>
                </div>
              </div>
            </div>
          )}
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
