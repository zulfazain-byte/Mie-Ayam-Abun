<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#9A1C1F">
  <title>POS Mi Ayam Abun</title>

  <!-- 1. PWA Manifest -->
  <script>
    const manifestJSON = {
      "name": "POS Mi Ayam Abun Pro",
      "short_name": "POS Abun",
      "start_url": window.location.href,
      "display": "standalone",
      "background_color": "#F9F6F0",
      "theme_color": "#9A1C1F",
      "icons": [{
        "src": "https://cdn-icons-png.flaticon.com/512/3081/3081367.png",
        "sizes": "512x512",
        "type": "image/png",
        "purpose": "any maskable"
      }]
    };
    const manifestBlob = new Blob([JSON.stringify(manifestJSON)], {type: 'application/json'});
    document.write('<link rel="manifest" href="' + URL.createObjectURL(manifestBlob) + '">');
  </script>

  <!-- 2. PWA Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        try {
          const swCode = "self.addEventListener('install', (e) => { self.skipWaiting(); }); self.addEventListener('activate', (e) => { e.waitUntil(self.clients.claim()); }); self.addEventListener('fetch', (e) => { });";
          const swBlob = new Blob([swCode], { type: 'application/javascript' });
          navigator.serviceWorker.register(URL.createObjectURL(swBlob))
            .then(() => console.log('✅ PWA Service Worker aktif! Aplikasi siap di-install.'))
            .catch((err) => console.warn('⚠️ Mode Preview: Service Worker dilewati.', err));
        } catch (e) {
          console.warn('⚠️ Service Worker gagal dimuat.', e);
        }
      });
    }
  </script>

  <!-- 3. CDN Libraries -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.18.5/package/dist/xlsx.full.min.js"></script>

  <!-- 4. ES Modules & Babel -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#333] m-0 p-0 overflow-hidden">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      ShoppingBag, Printer, MessageCircle, Plus, Minus, 
      Trash2, X, Store, CreditCard, Banknote, QrCode, 
      Image as ImageIcon, History, Settings, Home, LayoutGrid, 
      ArrowLeft, MoreVertical, Edit, Search, CheckCircle, 
      AlertCircle, Clock, Utensils, Coffee, Calculator, Check, 
      Receipt, BarChart3, LogOut, Save, FileText, Info, Download, 
      Share2, FileSpreadsheet, TrendingUp, Database, UploadCloud
    } from 'lucide-react';

    // ============================================================================
    // 1. DATA DATABASE
    // ============================================================================
    const MENU_DATABASE = [
      { id: 'm1', category: 'Makanan', name: 'Mie Ayam Original', price: 12000, icon: Utensils },
      { id: 'm2', category: 'Makanan', name: 'Tempe Kemul/Pcs', price: 1500, icon: Utensils },
      { id: 'b1', category: 'Minuman', name: 'Ice/Hot Teh Standar', price: 4000, icon: Coffee },
      { id: 'b2', category: 'Minuman', name: 'Ice Teh Jumbo', price: 6000, icon: Coffee },
      { id: 'b3', category: 'Minuman', name: 'Ice/Hot Jeruk', price: 6000, icon: Coffee },
      { id: 'b4', category: 'Minuman', name: 'Ice Bunga Rosella', price: 6000, icon: Coffee },
      { id: 'b5', category: 'Minuman', name: 'Ice Bunga Telang', price: 6000, icon: Coffee },
      { id: 'b6', category: 'Minuman', name: 'Ice Bunga Telang + Nipis', price: 7000, icon: Coffee },
      { id: 'b7', category: 'Minuman', name: 'Ice/Hot Americano', price: 6000, icon: Coffee },
      { id: 'b8', category: 'Minuman', name: 'Ice Lemon Tea', price: 5000, icon: Coffee },
      { id: 'b9', category: 'Minuman', name: 'Kopi Hitam', price: 5000, icon: Coffee },
      { id: 'b10', category: 'Minuman', name: 'Ice/Hot Coffemix', price: 5000, icon: Coffee },
      { id: 'b11', category: 'Minuman', name: 'Ice Teh Tarik', price: 6000, icon: Coffee },
      { id: 'b12', category: 'Minuman', name: 'Ice Good Day Freeze', price: 6000, icon: Coffee },
      { id: 'b13', category: 'Minuman', name: 'Ice/Hot Milo', price: 6000, icon: Coffee },
      { id: 'b14', category: 'Minuman', name: 'Ice/Hot Milo + Kental', price: 7000, icon: Coffee },
    ];

    const ORDER_TYPES = ['Dine In', 'Takeaway', 'Delivery', 'Online (Ojol)'];
    const PAYMENT_METHODS = [
      { id: 'cash', name: 'Tunai', icon: Banknote },
      { id: 'qris', name: 'QRIS', icon: QrCode },
      { id: 'transfer', name: 'Transfer', icon: CreditCard }
    ];

    const DEFAULT_STORE_CONFIG = {
      appName: 'MI AYAM ABUN',
      instagram: '@miayamabun.id',
      address: 'Dusun IV Kalibagor, Kec.Kalibagor, Kab.Banyumas, Jawa Tengah 53191',
      phone: '085848791020',
      taxRate: 0,
      serviceCharge: 0,
      receiptMode: 'thermal', 
      autoPrint: true
    };

    // ============================================================================
    // 2. UTILITY & COMPONENTS
    // ============================================================================
    const formatRp = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
    const generateId = () => Math.random().toString(36).substr(2, 9);
    const generateInvoiceNo = () => {
      const date = new Date();
      return `INV-${date.getFullYear()}${(date.getMonth()+1).toString().padStart(2,'0')}${date.getDate().toString().padStart(2,'0')}-${Math.floor(Math.random() * 1000).toString().padStart(3,'0')}`;
    };
    const formatDate = (dateString) => new Date(dateString).toLocaleDateString('id-ID', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

    const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false, icon: Icon }) => {
      const baseStyle = "flex items-center justify-center gap-2 font-bold rounded-xl transition-all duration-200 active:scale-95 disabled:opacity-50 disabled:active:scale-100 overflow-hidden relative";
      const variants = {
        primary: "bg-[#9A1C1F] text-white hover:bg-[#851619] shadow-lg shadow-[#9A1C1F]/30 py-3 px-4",
        secondary: "bg-[#9A1C1F]/10 text-[#9A1C1F] hover:bg-[#9A1C1F]/20 py-3 px-4",
        outline: "bg-transparent border-2 border-[#9A1C1F] text-[#9A1C1F] hover:bg-[#9A1C1F]/5 py-2.5 px-4",
        ghost: "bg-transparent text-gray-600 hover:bg-gray-100 py-2 px-3",
        danger: "bg-red-50 text-red-600 hover:bg-red-100 border border-red-200 py-3 px-4",
        success: "bg-[#25D366] text-white hover:bg-[#20bd5a] shadow-lg shadow-[#25D366]/30 py-3 px-4"
      };

      return (
        <button onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className}`}>
          {Icon && <Icon className="w-5 h-5" />}
          {children}
        </button>
      );
    };

    const Toast = ({ message, type = 'success', onClose }) => {
      useEffect(() => { const timer = setTimeout(onClose, 3000); return () => clearTimeout(timer); }, [onClose]);
      const bg = type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500';
      const Icon = type === 'success' ? CheckCircle : type === 'error' ? AlertCircle : Info;
      // Gunakan "absolute" bukan "fixed" agar terkunci di dalam kontainer HP (desktop view friendly)
      return (
        <div className={`absolute top-4 left-1/2 -translate-x-1/2 z-[100] flex items-center gap-2 px-4 py-3 rounded-full text-white font-medium text-sm shadow-xl transition-all animate-bounce-in whitespace-nowrap ${bg}`}>
          <Icon className="w-4 h-4" />{message}
        </div>
      );
    };

    const StrukLogo = () => (
      <svg viewBox="0 0 100 100" className="w-14 h-14 mx-auto mb-2" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round">
        <path d="M10 45 C10 75, 30 90, 50 90 C70 90, 90 75, 90 45 Z" fill="#000" stroke="#000" />
        <path d="M10 45 L90 45" stroke="#000" strokeWidth="6"/>
        <path d="M30 45 Q35 25, 50 25 T70 45" />
        <path d="M40 45 Q45 15, 60 15 T80 45" />
        <path d="M20 45 Q30 35, 40 45" />
        <line x1="85" y1="10" x2="25" y2="45" strokeWidth="5" />
        <line x1="95" y1="15" x2="35" y2="45" strokeWidth="5" />
      </svg>
    );

    // ============================================================================
    // 4. MAIN APP COMPONENT
    // ============================================================================
    function App() {
      const receiptRef = useRef(null);
      const fileInputRef = useRef(null);
      const [activeTab, setActiveTab] = useState('pos');
      const [toasts, setToasts] = useState([]);
      const [dialog, setDialog] = useState(null);
      const [isHeaderMenuOpen, setIsHeaderMenuOpen] = useState(false);

      // --- LOCAL STORAGE STATE ---
      const [storeConfig, setStoreConfig] = useState(() => {
        const saved = localStorage.getItem('pos_config');
        return saved ? { ...DEFAULT_STORE_CONFIG, ...JSON.parse(saved) } : DEFAULT_STORE_CONFIG;
      });
      const [transactions, setTransactions] = useState(() => {
        const saved = localStorage.getItem('pos_transactions');
        return saved ? JSON.parse(saved) : [];
      });
      const [holdOrders, setHoldOrders] = useState(() => {
        const saved = localStorage.getItem('pos_hold');
        return saved ? JSON.parse(saved) : [];
      });

      const [shift, setShift] = useState(() => {
        const saved = localStorage.getItem('pos_shift');
        return saved ? JSON.parse(saved) : { isOpen: false, startTime: null, startCash: 0 };
      });
      const [cart, setCart] = useState(() => {
        const saved = localStorage.getItem('pos_cart');
        return saved ? JSON.parse(saved) : [];
      });
      const [orderInfo, setOrderInfo] = useState(() => {
        const saved = localStorage.getItem('pos_orderInfo');
        return saved ? JSON.parse(saved) : { customerName: '', customerPhone: '', orderType: 'Dine In', tableNumber: '' };
      });

      // Synchronize with LocalStorage
      useEffect(() => { localStorage.setItem('pos_config', JSON.stringify(storeConfig)); }, [storeConfig]);
      useEffect(() => { localStorage.setItem('pos_transactions', JSON.stringify(transactions)); }, [transactions]);
      useEffect(() => { localStorage.setItem('pos_hold', JSON.stringify(holdOrders)); }, [holdOrders]);
      useEffect(() => { localStorage.setItem('pos_shift', JSON.stringify(shift)); }, [shift]);
      useEffect(() => { localStorage.setItem('pos_cart', JSON.stringify(cart)); }, [cart]);
      useEffect(() => { localStorage.setItem('pos_orderInfo', JSON.stringify(orderInfo)); }, [orderInfo]);

      const [showShiftModal, setShowShiftModal] = useState(false);
      const [shiftCashInput, setShiftCashInput] = useState('');

      const [discount, setDiscount] = useState({ type: 'nominal', value: 0 });
      
      const [isCartOpen, setIsCartOpen] = useState(false);
      const [selectedItemForAddon, setSelectedItemForAddon] = useState(null);
      const [selectedAddons, setSelectedAddons] = useState([]);
      const [addonNotes, setAddonNotes] = useState('');

      const [isCheckoutOpen, setIsCheckoutOpen] = useState(false);
      const [checkoutMethod, setCheckoutMethod] = useState('cash');
      const [cashGiven, setCashGiven] = useState('');
      const [receiptData, setReceiptData] = useState(null);

      const [searchQuery, setSearchQuery] = useState('');
      const [selectedCategory, setSelectedCategory] = useState('Semua');

      const showToast = (message, type = 'success') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
      };
      const removeToast = (id) => setToasts(prev => prev.filter(t => t.id !== id));

      const handleAddToCart = (item, addons = [], notes = '') => {
        const cartItemId = `${item.id}-${addons.map(a => a.id).join('-')}-${notes}`;
        setCart(prev => {
          const existing = prev.find(c => c.cartItemId === cartItemId);
          if (existing) return prev.map(c => c.cartItemId === cartItemId ? { ...c, qty: c.qty + 1 } : c);
          return [...prev, { ...item, cartItemId, addons, notes, qty: 1 }];
        });
        showToast(`${item.name} ditambahkan`);
        setSelectedItemForAddon(null);
      };

      const updateCartQty = (cartItemId, delta) => {
        setCart(prev => prev.map(item => {
          if (item.cartItemId === cartItemId) return { ...item, qty: item.qty + delta };
          return item;
        }).filter(item => item.qty > 0));
      };

      const clearCart = () => {
        setDialog({
          type: 'confirm', title: 'Kosongkan Keranjang',
          message: 'Apakah Anda yakin ingin menghapus semua pesanan?',
          onConfirm: () => { setCart([]); setDiscount({ type: 'nominal', value: 0 }); setDialog(null); }
        });
      };

      const calculateCart = () => {
        let subtotal = 0;
        cart.forEach(item => {
          let itemPrice = item.price;
          if (item.addons) item.addons.forEach(addon => itemPrice += addon.price);
          subtotal += (itemPrice * item.qty);
        });

        let discountAmount = discount.type === 'percent' ? subtotal * (discount.value / 100) : discount.value;
        const subtotalAfterDiscount = Math.max(0, subtotal - discountAmount);
        const taxAmount = subtotalAfterDiscount * (storeConfig.taxRate / 100);
        const serviceAmount = subtotalAfterDiscount * (storeConfig.serviceCharge / 100);
        const grandTotal = subtotalAfterDiscount + taxAmount + serviceAmount;
        const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);

        return { subtotal, discountAmount, taxAmount, serviceAmount, grandTotal, totalItems };
      };

      const cartCalculations = calculateCart();

      const saveToHold = () => {
        if (cart.length === 0) return;
        const holdOrder = {
          id: generateId(), time: new Date().toISOString(), cart: [...cart],
          orderInfo: { ...orderInfo }, calculations: cartCalculations
        };
        setHoldOrders(prev => [holdOrder, ...prev]);
        setCart([]); setOrderInfo({ customerName: '', customerPhone: '', orderType: 'Dine In', tableNumber: '' });
        setIsCartOpen(false); showToast('Pesanan berhasil disimpan', 'success');
      };

      const resumeHoldOrder = (holdOrder) => {
        setCart(holdOrder.cart); setOrderInfo(holdOrder.orderInfo);
        setHoldOrders(prev => prev.filter(h => h.id !== holdOrder.id));
        setIsCartOpen(true); setActiveTab('pos');
      };

      const handlePrintOrJPG = (trx) => {
        setReceiptData(trx);
        if (storeConfig.receiptMode === 'jpg') {
          showToast('Menyiapkan struk JPG...', 'info');
          setTimeout(async () => {
            try {
              if (!window.html2canvas) {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                document.body.appendChild(script);
                await new Promise(res => script.onload = res);
              }
              const canvas = await window.html2canvas(receiptRef.current, { scale: 2, backgroundColor: '#ffffff' });
              const link = document.createElement('a');
              link.download = `Struk-${trx.id}.jpg`;
              link.href = canvas.toDataURL('image/jpeg', 0.9);
              link.click();
              showToast('Struk JPG berhasil diunduh', 'success');
            } catch (err) { showToast('Gagal membuat JPG', 'error'); }
          }, 500);
        } else {
          setTimeout(() => window.print(), 300);
        }
      };

      const handleShareWA = (trx) => {
        let text = `*INVOICE PEMESANAN*\n*${storeConfig.appName}*\n${storeConfig.address}\n\n`;
        text += `No. Nota: ${trx.id}\n`;
        text += `Tgl: ${new Date(trx.timestamp).toLocaleString('id-ID')}\n`;
        text += `Pelanggan: ${trx.orderInfo.customerName || 'Tamu'}\n`;
        text += `Tipe: ${trx.orderInfo.orderType}\n`;
        text += `--------------------------------\n`;
        
        trx.cart.forEach(item => {
          let itemTotal = item.price;
          if (item.addons) item.addons.forEach(a => itemTotal += a.price);
          text += `${item.qty}x ${item.name} = ${formatRp(item.qty * itemTotal)}\n`;
        });
        
        text += `--------------------------------\n`;
        if (trx.calculations.discountAmount > 0) text += `Diskon: -${formatRp(trx.calculations.discountAmount)}\n`;
        if (trx.calculations.taxAmount > 0) text += `PPN: ${formatRp(trx.calculations.taxAmount)}\n`;
        if (trx.calculations.serviceAmount > 0) text += `Layanan: ${formatRp(trx.calculations.serviceAmount)}\n`;
        text += `*TOTAL TAGIHAN: ${formatRp(trx.calculations.grandTotal)}*\n`;
        text += `Pembayaran: ${trx.payment.method.toUpperCase()}\n\n`;
        text += `Terima kasih atas kunjungannya! 😊`;

        const waLink = `https://wa.me/?text=${encodeURIComponent(text)}`;
        window.open(waLink, '_blank');
      };

      const exportExcel = (period) => {
        if (!window.XLSX) { showToast('Memuat modul Excel...', 'info'); return; }
        const now = new Date();
        let filtered = transactions;
        if (period === 'hari') {
          filtered = transactions.filter(t => new Date(t.timestamp).toDateString() === now.toDateString());
        } else if (period === 'minggu') {
          const oneWeekAgo = new Date(); oneWeekAgo.setDate(now.getDate() - 7);
          filtered = transactions.filter(t => new Date(t.timestamp) >= oneWeekAgo);
        } else if (period === 'bulan') {
          const oneMonthAgo = new Date(); oneMonthAgo.setMonth(now.getMonth() - 1);
          filtered = transactions.filter(t => new Date(t.timestamp) >= oneMonthAgo);
        }

        if (filtered.length === 0) { showToast(`Tidak ada data untuk ${period} ini`, 'error'); return; }

        const excelData = filtered.map(t => ({
          'ID Transaksi': t.id,
          'Waktu': new Date(t.timestamp).toLocaleString('id-ID'),
          'Pelanggan': t.orderInfo.customerName || 'Tamu',
          'Tipe Pesanan': t.orderInfo.orderType,
          'Subtotal (Rp)': t.calculations.subtotal,
          'Diskon (Rp)': t.calculations.discountAmount,
          'Pajak (Rp)': t.calculations.taxAmount,
          'Layanan (Rp)': t.calculations.serviceAmount,
          'Total Akhir (Rp)': t.calculations.grandTotal,
          'Metode Bayar': t.payment.method.toUpperCase(),
          'Uang Diterima (Rp)': t.payment.cashGiven,
          'Kembalian (Rp)': t.payment.change
        }));

        const ws = XLSX.utils.json_to_sheet(excelData);
        const wscols = [{wch:15}, {wch:20}, {wch:15}, {wch:15}, {wch:15}, {wch:15}, {wch:15}, {wch:15}, {wch:15}, {wch:15}, {wch:15}, {wch:15}];
        ws['!cols'] = wscols;

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Laporan Penjualan");
        
        XLSX.writeFile(wb, `Laporan_Penjualan_${period}.xlsx`);
        showToast(`Berhasil ekspor Excel (.xlsx)`, 'success');
      };

      const handleBackup = () => {
        const data = { storeConfig, transactions, holdOrders };
        const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Backup_POS_Abun_${new Date().toISOString().slice(0,10)}.json`;
        link.click();
        showToast('Backup berhasil diunduh', 'success');
      };

      const handleRestore = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if(data.storeConfig) setStoreConfig(data.storeConfig);
            if(data.transactions) setTransactions(data.transactions);
            if(data.holdOrders) setHoldOrders(data.holdOrders);
            showToast('Data berhasil direstore!', 'success');
          } catch(err) { showToast('Format file tidak valid!', 'error'); }
        };
        reader.readAsText(file);
      };

      const handleResetApp = () => {
        setDialog({
          type: 'confirm',
          title: 'Reset Aplikasi',
          message: 'Seluruh data transaksi dan pengaturan akan dihapus secara permanen. Lanjutkan?',
          onConfirm: () => {
            localStorage.clear();
            window.location.reload();
          }
        });
        setIsHeaderMenuOpen(false);
      };

      const processTransaction = (paymentDetails) => {
        const newTransaction = {
          id: generateInvoiceNo(), timestamp: new Date().toISOString(), cart: [...cart],
          orderInfo: { ...orderInfo }, calculations: cartCalculations, payment: paymentDetails, cashier: 'Admin'
        };

        setTransactions(prev => [newTransaction, ...prev]);
        if (storeConfig.autoPrint) handlePrintOrJPG(newTransaction);

        setCart([]); setOrderInfo({ customerName: '', customerPhone: '', orderType: 'Dine In', tableNumber: '' });
        setDiscount({ type: 'nominal', value: 0 }); setIsCheckoutOpen(false); setIsCartOpen(false);
        showToast('Transaksi Berhasil!', 'success');
      };

      // ========================== RENDERS ========================== //

      const renderDashboard = () => {
        const today = new Date().toDateString();
        const todayTransactions = transactions.filter(t => new Date(t.timestamp).toDateString() === today);
        const totalSales = todayTransactions.reduce((sum, t) => sum + t.calculations.grandTotal, 0);
        const totalOrders = todayTransactions.length;
        const avgOrder = totalOrders > 0 ? totalSales / totalOrders : 0;

        const itemCounts = {};
        transactions.forEach(trx => { trx.cart.forEach(item => { itemCounts[item.name] = (itemCounts[item.name] || 0) + item.qty; }); });
        const bestSellers = Object.entries(itemCounts).sort((a,b) => b[1] - a[1]).slice(0,3);

        const getLast7Days = () => {
           const days = [];
           for(let i=6; i>=0; i--) { const d = new Date(); d.setDate(d.getDate() - i); days.push(d); }
           return days;
        };
        const maxSales7D = Math.max(...getLast7Days().map(d => transactions.filter(t => new Date(t.timestamp).toDateString() === d.toDateString()).reduce((sum, t) => sum + t.calculations.grandTotal, 0)), 1);

        return (
          <div className="absolute inset-0 flex flex-col animate-fade-in">
            <div className="flex-1 overflow-y-auto p-4 space-y-6 pb-24">
              <div className="bg-[#9A1C1F] text-white p-6 rounded-3xl shadow-xl relative overflow-hidden transform transition-all duration-300 hover:scale-[1.02]">
                <div className="absolute top-0 right-0 p-4 opacity-10"><Store className="w-32 h-32" /></div>
                <h2 className="text-sm font-medium opacity-80 mb-1">Pendapatan Hari Ini</h2>
                <p className="text-3xl font-extrabold tracking-tight mb-4">{formatRp(totalSales)}</p>
                <div className="flex gap-2">
                  <div className="flex items-center gap-1.5 text-xs bg-white/10 px-3 py-1.5 rounded-full backdrop-blur-sm border border-white/20">
                    <Receipt className="w-3.5 h-3.5" /> {totalOrders} Trx
                  </div>
                  <div className="flex items-center gap-1.5 text-xs bg-white/10 px-3 py-1.5 rounded-full backdrop-blur-sm border border-white/20">
                    <TrendingUp className="w-3.5 h-3.5" /> Avg: {formatRp(avgOrder)}

                {isHeaderMenuOpen && (
                  <div className="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-xl overflow-hidden border border-gray-100 py-1 text-gray-800 animate-slide-up origin-top-right">
                    <button onClick={handleResetApp} className="w-full text-left px-4 py-3 text-sm hover:bg-red-50 flex items-center gap-2 text-red-600 font-bold transition-colors">
                      <AlertCircle className="w-4 h-4" /> Reset Data Aplikasi
                    </button>
                    <div className="border-b border-gray-100"></div>
                    <button onClick={() => window.location.reload()} className="w-full text-left px-4 py-3 text-sm hover:bg-gray-50 flex items-center gap-2 text-gray-700 font-bold transition-colors">
                      <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                      Muat Ulang
                    </button>
                  </div>
                )}
              </div>
            </header>

            <main className="flex-1 overflow-hidden relative print:hidden bg-gray-50" onClick={() => isHeaderMenuOpen && setIsHeaderMenuOpen(false)}>
              {activeTab === 'dashboard' && renderDashboard()}
              {activeTab === 'pos' && renderPOS()}
              {activeTab === 'history' && renderHistory()}
              {activeTab === 'settings' && renderSettings()}
            </main>

            {!isCartOpen && !isCheckoutOpen && renderBottomNav()}
            
            {renderAddonModal()}
            {renderCart()}
            {renderCheckout()}
            {renderDialog()}

            {toasts.map(toast => <Toast key={toast.id} message={toast.message} type={toast.type} onClose={() => removeToast(toast.id)} />)}
          </div>
          {renderReceiptElement()}
          <style dangerouslySetInnerHTML={{__html: `
            @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
            @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
            @keyframes bounceIn { 0% { transform: scale(0.9) translateX(-50%); opacity: 0; } 50% { transform: scale(1.05) translateX(-50%); } 100% { transform: scale(1) translateX(-50%); opacity: 1; } }
            @keyframes shine { to { background-position: 200% center; } }
            .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
            .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
            .animate-bounce-in { animation: bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; left: 50%; }
            .animate-shine {
              background: linear-gradient(to right, #9A1C1F 20%, #ff7e5f 40%, #ff7e5f 60%, #9A1C1F 80%);
              background-size: 200% auto;
              -webkit-background-clip: text;
              -webkit-text-fill-color: transparent;
              animation: shine 3s linear infinite;
            }
            .scrollbar-hide::-webkit-scrollbar { display: none; }
            .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
            @media print { body { background: white !important; display: block !important; margin: 0; padding: 0; } html { width: 58mm; } }
          `}} />
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
